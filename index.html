type:"bucket_sort",title:"Совместные или несовместные?",instruction:"Бросают кубик. Разбей пары событий: могут произойти одновременно или нет?",items:[{id:"a",text:"A={чётное}, B={кратное 3}: оба выполнены при 6"},{id:"b",text:"A={выпало 1}, B={выпало 6}"},{id:"c",text:"A={выпало >4}, B={выпало нечётное}: оба при 5"},{id:"d",text:"A={выпало чётное}, B={выпало нечётное}"}],buckets:[{id:"comp",label:"Совместные (могут случиться вместе)",correct:["a","c"]},{id:"incomp",label:"Несовместные (исключают друг друга)",correct:["b","d"]}],feedbackOk:"Верно! P(A∪B) для совместных требует вычесть P(A∩B).",feedbackWrong:"Совместные = A∩B ≠ ∅. Несовместные = A∩B = ∅."}],misconceptions:[{error:"«P(A∪B) = P(A) + P(B) всегда»",reality:"Это верно только для несовместных событий. Если P(A∩B) > 0, сложение без поправки даст завышенный результат: пересечение входит в оба слагаемых."},{error:"«P(A∪B) может превысить 1»",reality:"P(A∪B) ≤ 1 всегда. Если при подсчёте получается больше 1 — значит формула применена неверно."}],glossary:[{term:"Формула сложения",def:"P(A∪B) = P(A) + P(B) − P(A∩B). Для несовместных: P(A∪B) = P(A) + P(B)."},{term:"Совместные события",def:"A и B, P(A∩B) > 0 — могут произойти одновременно. Для них нельзя просто складывать вероятности."},{term:"Принцип включений-исключений",def:"При объединении двух множеств (событий) пересечение попадает в сумму дважды — его нужно вычесть один раз."},{term:"Несовместные события",def:"A∩B = ∅: не могут произойти одновременно. P(A∪B) = P(A) + P(B)."}],finalQuiz:[{q:"P(A)=0.3, P(B)=0.5, события несовместны. P(A∪B) = ?",options:["0.15","0.8","0.2","1"],correct:1,explanation:"Несовместные: P(A∪B) = 0.3 + 0.5 = 0.8.",level:"recognize"},{q:"P(A)=0.6, P(B)=0.5, P(A∩B)=0.3. P(A∪B) = ?",options:["1.1","0.8","0.3","0.9"],correct:1,explanation:"P(A∪B) = 0.6 + 0.5 − 0.3 = 0.8.",level:"apply"},{q:"P(A∪B) = 0.7, P(A) = 0.4, P(B) = 0.5. P(A∩B) = ?",options:["0.2","0.3","0.1","0.7"],correct:0,explanation:"P(A∩B) = P(A)+P(B)−P(A∪B) = 0.4+0.5−0.7 = 0.2.",level:"apply"},{q:"Студент сдаёт экзамен. P(отлично)=0.3, P(хорошо)=0.4. P(отлично или хорошо) = ?",options:["0.12","0.7","0.1","1"],correct:1,explanation:"Оценки несовместны (нельзя получить две сразу). P = 0.3+0.4 = 0.7.",level:"apply"},{q:"Почему в формуле P(A∪B) вычитается P(A∩B)?",options:["Чтобы результат был меньше","Чтобы не считать пересечение дважды","Это поправка на зависимость","Пересечение — лишнее событие"],correct:1,explanation:"При сложении P(A)+P(B) пересечение A∩B входит в оба слагаемых — его учли два раза. Вычитаем один раз.",level:"analyze"}],didYouKnow:["Формула сложения вероятностей — частный случай принципа включений-исключений Пуанкаре, который работает для любого числа множеств. Для трёх событий: P(A∪B∪C) = P(A)+P(B)+P(C) − P(A∩B) − P(A∩C) − P(B∩C) + P(A∩B∩C)."],bridge:"Мы научились складывать вероятности событий. Следующий шаг — умножать: правило умножения для зависимых и независимых событий.",remember:["P(A∪B) = P(A) + P(B) − P(A∩B) — общая формула","Несовместные: P(A∩B) = 0, поэтому P(A∪B) = P(A) + P(B)","P(A∪B) ≤ 1 всегда","Вычитаем пересечение, чтобы не считать дважды"],selfCheck:[{q:"P(A)=0.2, P(B)=0.3, несовместны. P(A∪B) = ?",a:"0.5"},{q:"P(A)=0.5, P(B)=0.4, P(A∩B)=0.1. P(A∪B) = ?",a:"0.8"},{q:"Зачем вычитать P(A∩B)?",a:"Пересечение входит в P(A) и в P(B) — его учли дважды, нужно вычесть один раз"}],interactives:[{type:"process-graph",title:"Формула сложения: двигай ползунки P(A), P(B), P(A∩B) — видишь P(A∪B)"}],illustration:"prob_addition.svg",illustrationAlt:"Диаграмма Эйлера и формула P(A∪B)=P(A)+P(B)−P(A∩B); для несовместных P(A∩B)=0"},9102:{id:"9102",blockId:"block-6",title:"Правило умножения вероятностей",hook:"Два броска монеты. P(орёл и орёл) = 1/2 × 1/2 = 1/4. Независимые события — перемножаются.",summary:{what:"Для независимых событий: P(A∩B) = P(A) × P(B). Общий случай: P(A∩B) = P(A) × P(B|A).",facts:"A и B независимы, если P(B|A) = P(B): знание о наступлении A не меняет вероятность B.",dontConfuse:"P(A и B) ≠ P(A) + P(B). Сложение — для объединения. Умножение — для пересечения.",trick:"Независимость → умножай. Зависимость → используй условную вероятность."},trainers:[{id:"t1",type:"case",title:"Независимые события",question:"P(A) = 0.6, P(B) = 0.5. A и B независимы. P(A∩B) = ?",options:["1.1","0.3","0.1","0.55"],correct:1,explanation:"P(A∩B) = P(A)·P(B) = 0.6 × 0.5 = 0.3."},{type:"ranking",title:"Порядок доказательства независимости",instruction:"Расставь действия для проверки независимости событий в правильном порядке",items:[{id:"a",text:"Вычислить P(A) и P(B) отдельно"},{id:"b",text:"Вычислить P(A∩B)"},{id:"c",text:"Сравнить P(A∩B) с P(A)·P(B)"},{id:"d",text:"Если равны — события независимы"}],order:["a","b","c","d"]},{type:"builder",id:"builder_mult_9102",title:"Собери формулу умножения",instruction:"Для независимых событий. Собери P(A∩B)",blocks:["P(A∩B)","=","P(A)","·","P(B)"],answer:["P(A∩B)","=","P(A)","·","P(B)"],feedbackOk:"P(A∩B) = P(A)·P(B) — только для независимых событий!",feedbackWrong:"Для независимых: P(A∩B) = P(A) × P(B)"}],misconceptions:[{error:"«P(A∩B) = P(A) + P(B) всегда»",reality:"Сложение — для P(A∪B). Для P(A∩B) при независимых: умножение. Смешивать нельзя."},{error:"«Независимые события — это события, которые не связаны по смыслу»",reality:"Независимость — строгое математическое понятие: P(A|B) = P(A). Смысловая связь не определяет независимость. Два броска кубика независимы по определению."}],glossary:[{term:"Независимые события",def:"P(B|A) = P(B): наступление A не меняет вероятность B."},{term:"Правило умножения",def:"P(A∩B) = P(A) × P(B) для независимых событий."},{term:"Произведение вероятностей",def:"P(A∩B)=P(A)·P(B) для независимых событий. Для зависимых: P(A)·P(B|A)."},{term:"Зависимые события",def:"События A и B зависимы, если P(B|A) ≠ P(B). Для них P(A∩B) = P(A)·P(B|A) — формула умножения для зависимых событий."}],finalQuiz:[{q:"P(A) = 0.4, P(B) = 0.3, независимы. P(A∩B) = ?",options:["0.7","0.12","0.1","0.5"],correct:1,explanation:"P(A∩B) = P(A)×P(B) — только для НЕЗАВИСИМЫХ событий. Смысл: события не влияют друг на друга.",level:"understand"},{q:"Монета дважды. P(орёл оба раза) = ?",options:["1/2","1/4","1/3","1"],correct:1,explanation:"P(О)×P(О) = 0.5×0.5 = 0.25 = 1/4. Монеты независимы.",level:"apply"},{q:"Монету бросают 3 раза. P(три орла подряд) = ?",options:["1/2","1/4","1/8","3/8"],correct:2,explanation:"При 3 бросках: P(3 орла) = (1/2)³ = 1/8. С каждым броском вероятность уменьшается.",level:"analyze"},{q:"P(A)=0.6, P(B)=0.5, независимы. P(A∩B) = ?",options:["1.1","0.3","0.1","0.55"],correct:1,explanation:"P(A∩B) = P(A)·P(B) = 0.6·0.5 = 0.3.",level:"apply"},{q:"P(A|B) = P(A). Что это означает?",options:["A и B несовместны","A и B независимы","A и B противоположны","B входит в A"],correct:1,explanation:"Если P(A|B) = P(A), знание B не меняет P(A) — это определение независимости.",level:"analyze"}],didYouKnow:["Независимость событий — ключевое свойство в криптографии. В 1949 году Клод Шеннон доказал, что идеальное шифрование достигается только при полной статистической независимости ключа от открытого текста."],bridge:"Умножение для независимых событий освоено. Следующая тема — условная вероятность, когда события зависят друг от друга.",illustration:"prob_multiplication.svg",illustrationAlt:"Две формулы: независимые P(A∩B)=P(A)·P(B) и зависимые P(A∩B)=P(A)·P(B|A)",remember:["Независимые события: P(A∩B) = P(A)·P(B)","Зависимые: P(A∩B) = P(A)·P(B|A)","Два броска монеты — независимые события"],selfCheck:[{q:"P(A)=0.3, P(B)=0.5, независимы. P(A∩B) = ?",a:"0.15"},{q:"Два ораля подряд у честной монеты. P = ?",a:"1/4"},{q:"Два независимых события A и B. Как найти P(A и B)?",a:"P(A∩B) = P(A) · P(B) — умножить вероятности"}],interactives:[{type:"tap-and-reveal",title:"Правило умножения: разбор формулы",instruction:"Нажми — разберём каждый элемент",cols:1,cards:[{front:"P(A∩B) — что это?",back:"Вероятность того, что произойдут оба события: и A, и B одновременно"},{front:"P(B|A) — условная вероятность",back:"Вероятность B при условии, что A уже произошло. Пространство сужается до A."},{front:"Когда P(A∩B) = P(A)·P(B)?",back:"Только когда A и B независимы. Тогда P(B|A) = P(B) — A не влияет на B."},{front:"Пример: урна с 3 красными и 7 синими",back:"P(красный, затем красный без возврата) = 3/10 · 2/9 = 6/90 = 1/15"}]}],recap:"Ты глубоко разобрал формулу сложения вероятностей и научился применять её к задачам."},9103:{id:"9103",blockId:"block-6",title:"Условная вероятность. Независимые события",hook:"Тест на редкую болезнь. Точность — 99%. Результат положительный. Вероятность, что ты болен, — 99%? Совсем нет. Условная вероятность изменит твой ответ.",summary:{what:"P(A|B) = P(A∩B) / P(B). Условная вероятность — пересечение делённое на условие.",facts:"Независимость: P(A|B) = P(A) — знание о B не меняет вероятность A. P(A∩B) = P(A)·P(B).",dontConfuse:"P(A|B) ≠ P(B|A). Вероятность болезни при положительном тесте ≠ вероятность положительного теста при болезни.",trick:"Нарисуй схему: что дано (P(A∩B) и P(B)), что найти (P(A|B)). Подставляй в формулу P(A|B) = P(A∩B)/P(B)."},trainers:[{id:"t1",type:"case",title:"Условная вероятность",question:"P(A∩B) = 0.3, P(B) = 0.5. P(A|B) = ?",options:["0.6","0.15","0.3","0.8"],correct:0,explanation:"P(A|B) = P(A∩B)/P(B) = 0.3/0.5 = 0.6."},{id:"t2",type:"highlight",title:"Условная вероятность",text:"Условная вероятность P(B|A) — это вероятность события B при условии, что событие A уже произошло. Пространство исходов сужается до A.",targets:["P(B|A)","вероятность события B при условии","A уже произошло","пространство исходов сужается"],instruction:"Выдели определение и суть условной вероятности"}],misconceptions:[{error:"«P(A|B) = P(B|A)»",reality:"Это разные величины. P(рак|тест+) — вероятность болезни при положительном тесте. P(тест+|рак) — вероятность положительного теста при наличии болезни. Смешение этих величин — распространённая ошибка."},{error:"«Условная вероятность P(A|B) > P(A) всегда»",reality:"Условная вероятность может быть больше, меньше или равна безусловной. Равна P(A) — если A и B независимы."}],glossary:[{term:"Условная вероятность P(A|B)",def:"P(A|B) = P(A∩B)/P(B) — вероятность A при условии, что B уже наступило."},{term:"Независимые события",def:"P(A|B) = P(A): знание о B не меняет вероятность A. P(A∩B)=P(A)·P(B)."},{term:"Зависимые события",def:"P(A|B) ≠ P(A): знание о B изменяет вероятность A."},{term:"Условная вероятность",def:"P(A|B) = P(A∩B)/P(B) — вероятность события A при условии, что событие B уже произошло."}],finalQuiz:[{q:"P(A∩B) = 0.12, P(B) = 0.4. P(A|B) = ?",options:["0.3","0.048","0.12","3"],correct:0,explanation:"P(A|B) = P(A∩B)/P(B) = 0.12/0.4 = 0.3. Условная вероятность сужает пространство до B.",level:"apply"},{q:"P(A|B) = P(A) означает:",options:["A и B несовместны","A и B независимы","A = B","P(B) = 0"],correct:1,explanation:"Независимость: знание B не меняет вероятность A. Формально P(A|B) = P(A).",level:"understand"},{q:"P(A∩B)=0.18, P(A)=0.6. P(B|A) = ?",options:["0.3","0.108","0.42","3"],correct:0,explanation:"P(B|A) = P(A∩B)/P(A) = 0.18/0.6 = 0.3.",level:"apply"},{q:"A и B независимы, P(A)=0.4, P(B)=0.5. P(A∩B) = ?",options:["0.1","0.2","0.45","0.9"],correct:1,explanation:"Независимые: P(A∩B) = P(A)·P(B) = 0.4·0.5 = 0.2.",level:"apply"},{q:"P(A|B) = 0.6 и P(A) = 0.6. Что можно сказать о событиях A и B?",options:["A и B зависимы","A и B независимы","A и B несовместны","A ⊆ B"],correct:1,explanation:"P(A|B) = P(A) — критерий независимости событий.",level:"analyze"}],didYouKnow:["Понятие условной вероятности ввёл Пьер-Симон Лаплас в «Аналитической теории вероятностей» (1812). Его идеи об обновлении вероятностей при новых данных лежат в основе современных рекомендательных систем."],recap:"← Правило умножения для независимых событий освоено. Условная вероятность — следующий уровень.",illustration:"conditional_prob.svg",illustrationAlt:"Сужение пространства Ω до B: P(A|B)=P(A∩B)/P(B), визуализация условной вероятности",remember:["P(A|B) = P(A∩B) / P(B) — условная вероятность","A и B независимы: P(A|B) = P(A)","Независимость ≠ несовместность"],selfCheck:[{q:"P(A∩B)=0.12, P(B)=0.4. P(A|B) = ?",a:"0.3"},{q:"P(A|B) = P(A). Что это значит?",a:"A и B независимы"},{q:"Сформулируй критерий независимости двух событий A и B.",a:"A и B независимы, если P(A∩B) = P(A)·P(B), или эквивалентно P(A|B) = P(A)."}],interactives:[{type:"compare-two",title:"Независимые vs Зависимые события",left:{label:"Независимые",items:["P(A|B) = P(A)","P(A∩B) = P(A)·P(B)","Знание B не меняет P(A)","Пример: два броска монеты"],detail:"P(орёл во втором броске) не зависит от первого. P(A∩B) = 0.5 × 0.5 = 0.25."},right:{label:"Зависимые",items:["P(A|B) ≠ P(A)","P(A∩B) = P(A)·P(B|A)","Знание B меняет P(A)","Пример: карты без возврата"],detail:"Вытащили туза. P(второй туз) = 3/51, а не 4/52 — зависит от первого."},keyDifference:"Независимость — математическое условие P(A|B) = P(A), не просто «нет смысловой связи»."}],bridge:"Следующий шаг — визуализировать сложный вероятностный эксперимент деревом."},9104:{id:"9104",blockId:"block-6",title:"Представление случайного эксперимента деревом",hook:"Дерево вероятностей: на каждой ветке — исход, на каждой ветви — вероятность. Произведение по пути — вероятность сценария.",summary:{what:"Дерево вероятностей: уровни = шаги эксперимента, ветви = исходы с их вероятностями, листья = конечные исходы.",facts:"Вероятность пути = произведение вероятностей по ветвям. Сумма вероятностей всех листьев = 1.",dontConfuse:"Вероятности одного уровня суммируются в 1. Вероятности разных уровней — перемножаются.",trick:"Заполняй дерево слева направо: сначала структуру, потом вероятности ветвей, потом вероятности листьев."},trainers:[{id:"t1",type:"case",title:"Вероятность пути",question:"Дерево: P(A) = 0.6, P(B|A) = 0.4. Вероятность пути A→B:",options:["1.0","0.24","0.4","0.6"],correct:1,explanation:"P(A∩B) = P(A)·P(B|A) = 0.6 × 0.4 = 0.24."},{id:"t2",type:"highlight",title:"Дерево эксперимента",text:"Дерево эксперимента изображает все возможные исходы последовательного опыта. Каждый путь от корня до листа — один составной исход. Его вероятность — произведение P на пути.",targets:["все возможные исходы","путь от корня до листа","один составной исход","произведение P на пути"],instruction:"Выдели структуру дерева и правило вычисления"}],misconceptions:[{error:"«Вероятности на ветвях одного узла могут не равняться 1»",reality:"Вероятности всех ветвей одного узла всегда суммируются в 1 — они покрывают все возможные продолжения."},{error:"«В дереве вероятностей на каждой ветви должно быть одинаковое число»",reality:"Из каждого узла выходит столько ветвей, сколько возможных исходов. У монеты — 2 ветви, у кубика — 6. Они могут быть разными на разных уровнях."}],glossary:[{term:"Дерево вероятностей",def:"Граф-дерево, где ветви помечены вероятностями, а вероятность пути = произведению вероятностей ветвей."},{term:"Путь в дереве вероятностей",def:"Последовательность ветвей от корня до листа. Вероятность пути = произведению вероятностей ветвей."},{term:"Произведение по ветвям",def:"Вероятность конкретного сценария в дереве = произведению вероятностей всех его ветвей."},{term:"Лист дерева вероятностей",def:"Конечная вершина дерева. Соответствует одному полному исходу составного эксперимента; его вероятность — произведение вероятностей по пути от корня."}],finalQuiz:[{q:"Ветви узла: 0.3 и ?, вероятности должны суммироваться в 1. ? = ",options:["0.3","0.7","1","0"],correct:1,explanation:"Из каждого узла вероятности ветвей дают 1. Если одна ветвь 0.3, вторая = 1−0.3 = 0.7.",level:"understand"},{q:"Сумма вероятностей всех листьев дерева:",options:["0","0.5","1","Зависит от дерева"],correct:2,explanation:"Каждый лист — один полный исход. Дерево охватывает всё пространство, сумма = 1.",level:"understand"},{q:"Дерево: P(A)=0.7, P(B|A)=0.3. Вероятность пути A→B = ?",options:["0.21","0.42","0.7","0.3"],correct:0,explanation:"Вероятность пути = произведение вероятностей рёбер. P(A)×P(B|A) = 0.7×0.3 = 0.21.",level:"apply"},{q:"Дерево: P(A)=0.6, P(B|A)=0.4, P(B|Ā)=0.1. P(A∩B) = ?",options:["0.06","0.1","0.24","0.4"],correct:2,explanation:"P(A∩B) = P(A)·P(B|A) = 0.6·0.4 = 0.24.",level:"apply"},{q:"В дереве испытания два уровня: 1-й — {A, Ā}, 2-й от A — {B, B̄}. Сумма вероятностей всех 4 листьев:",options:["0.5","P(A)+P(Ā)","1","2"],correct:2,explanation:"Пути покрывают все исходы без повторений, поэтому сумма вероятностей листьев = 1.",level:"understand"}],didYouKnow:["Деревья решений в машинном обучении — прямое применение деревьев вероятностей. В 1986 году Росс Куинлан создал алгоритм ID3, который строит дерево, минимизируя неопределённость (энтропию)."],illustration:"probability_tree.svg",illustrationAlt:"Дерево двух бросков монеты: ветви ОО,ОР,РО,РР, каждая с вероятностью 1/4",remember:["Сумма вероятностей ветвей одного узла = 1","Сумма вероятностей всех листьев = 1","P(пути) = произведение вероятностей рёбер по пути"],selfCheck:[{q:"P(A)=0.6, P(B|A)=0.4. P(A∩B) = ?",a:"0.24"},{q:"Сумма вероятностей всех листьев дерева = ?",a:"1"},{q:"Как вычислить вероятность конкретного пути в дереве испытания?",a:"Вероятность пути = произведение вероятностей всех рёбер вдоль этого пути от корня до листа."}],interactives:[{type:"tree-diagram-builder",title:"Построй дерево двух бросков монеты"}],bridge:"Применим всё изученное к решению комплексных задач на вероятность.",recap:"Ты научился строить дерево эксперимента и по нему находить вероятности каждого исхода."},9105:{id:"9105",blockId:"block-6",title:"Решение практических задач",hook:"Колода карт, урна с шарами, честный кубик — как применить формулы сложения и умножения в реальных задачах? Разберём шаг за шагом.",summary:{what:"Применение P(A∪B) = P(A)+P(B)−P(A∩B) и P(A∩B) = P(A)·P(B|A) к реальным задачам: карты, шары, кубик.",facts:"Алгоритм: 1) определи Ω; 2) найди P(A) и P(B); 3) реши — совместны ли события; 4) применяй нужную формулу.",dontConfuse:"Без возврата → зависимые → умножай с P(B|A). С возвратом → независимые → умножай P(A)·P(B).",trick:"Для составных задач рисуй дерево. Вероятность сценария = произведению по ветвям."},trainers:[{id:"t1",type:"case",title:"Медицинская задача",question:"P(болен) = 0.01, P(тест+|болен) = 0.99, P(тест+|здоров) = 0.05. Из 10000 человек: сколько ложноположительных?",options:["99","495","504","10"],correct:1,explanation:"Здоровых ≈ 9900. Из них тест+ у 5%: 9900 × 0.05 = 495. Ложноположительных."},{type:"free",id:"free_bayes_9105",title:"Парадокс: положительный тест",instruction:"Подумай и ответь",prompt:"Болезнь встречается у 1 человека из 1000. Тест определяет болезнь верно в 99% случаев и ошибается в 1%. Тест дал «+». Насколько вероятно, что ты болен? Почему интуиция подводит?",placeholder:"Твои рассуждения...",hint:"Из 1000 человек: 1 болен (тест: +), 999 здоровы (10 дадут «+» ошибочно). Из 11 положительных → только 1 реально болен. P(болен|+) ≈ 1/11 ≈ 9%, хотя тест «99% точный»."}],misconceptions:[{error:"«Всегда умножай вероятности»",reality:"Умножение — для пересечения (A и B). Для объединения совместных событий нужна формула сложения с поправкой: P(A∪B) = P(A)+P(B)−P(A∩B)."},{error:"«С возвратом и без возврата — одинаково»",reality:"Без возврата: состав меняется. P(второй красный | первый красный) ≠ P(первый красный). Важно учитывать зависимость."}],glossary:[{term:"С возвратом",def:"Извлечённый объект возвращается. Состав не меняется. Независимые события."},{term:"Без возврата",def:"Извлечённый объект не возвращается. Состав меняется. Зависимые события."},{term:"Дерево вероятностей",def:"Схема разветвлений: вероятность сценария = произведению вероятностей по ветвям пути."},{term:"Формула полной вероятности",def:"P(B) = Σ P(Aᵢ)·P(B|Aᵢ), где Aᵢ — полная группа несовместных событий. Позволяет вычислить P(B) через условные вероятности."}],finalQuiz:[{q:"P(болен) = 0.001. Точный тест показал +. Вероятность болезни, скорее всего:",options:["Очень высокая","Умеренная","Может быть низкой из-за редкости болезни","Всегда 99%"],correct:2,explanation:"Редкая болезнь даёт много ложноположительных. P(болен|+) может быть низкой — парадокс Байеса.",level:"analyze"},{q:"Колода 52 карты: 2 подряд без возврата. P(оба червонные) = ?",options:["(13/52)²","(13/52)·(12/51)","13/52+12/51","1/4"],correct:1,explanation:"(13/52)×(12/51): первая карта — 13 червонных из 52, вторая — 12 из оставшихся 51.",level:"apply"},{q:"P(A)=0.6, P(B|A)=0.5. P(A∩B) = ?",options:["1.1","0.3","0.1","0.5"],correct:1,explanation:"P(A∩B) = P(A)×P(B|A) = 0.6×0.5 = 0.3. Формула умножения для зависимых событий.",level:"apply"},{q:"P(A)=0.3, P(B|A)=0.8, P(B|Ā)=0.2. P(B) по формуле полной вероятности = ?",options:["0.24","0.38","0.5","0.14"],correct:1,explanation:"P(B) = P(A)·P(B|A) + P(Ā)·P(B|Ā) = 0.3·0.8 + 0.7·0.2 = 0.24+0.14 = 0.38.",level:"apply"},{q:"Два выстрела независимо. P(попасть)=0.7 каждый. P(хотя бы одно попадание) = ?",options:["0.7","0.49","0.91","1.4"],correct:2,explanation:"P(хотя бы одно) = 1 − P(оба мимо) = 1 − 0.3·0.3 = 1 − 0.09 = 0.91.",level:"apply"}],didYouKnow:["Практические задачи на условную вероятность применяются в медицинской диагностике, страховании и криминалистике. Грамотный расчёт вероятностей помог Алану Тьюрингу взломать шифр «Энигмы» в 1940 году."],remember:["P(A∩B) = P(A)·P(B|A) — для зависимых (без возврата)","Редкая болезнь → много ложноположительных тестов","P пути в дереве = произведение вероятностей рёбер"],selfCheck:[{q:"P(A)=0.4, P(B|A)=0.25. P(A∩B) = ?",a:"0.1"},{q:"Из 52 карт тянут 2 без возврата. P(оба туза) ≈ ?",a:"(4/52)×(3/51)"},{q:"Чем удобен метод дополнения при вычислении «хотя бы одного» события?",a:"«Хотя бы одно» охватывает много случаев, а противоположное «ни одного» — один случай. Считать проще."}],interactives:[{type:"tap-and-reveal",title:"Типичные ошибки в задачах на вероятность",instruction:"Нажми на ошибку — узнай как правильно",cols:1,cards:[{front:"❌ «P(A или B) = P(A) + P(B) всегда»",back:"✓ Только если A и B несовместны. Иначе: P(A∪B) = P(A)+P(B)−P(A∩B)"},{front:"❌ «P(A и B) = P(A)·P(B) всегда»",back:"✓ Только если события независимы. При зависимых: P(A∩B) = P(A)·P(B|A)"},{front:"❌ «Если монета 5 раз подряд орёл — решка вероятнее»",back:"✓ Монета без памяти. Каждый бросок P(решка)=0.5 независимо от истории"},{front:"❌ «Условная вероятность P(B|A) = P(A|B)»",back:"✓ Обычно не равны. P(болен|тест+) ≠ P(тест+|болен)"}]}],bridge:"Следующие темы закрепят диаграммы Эйлера, несовместные события и формулу сложения.",recap:"Ты решал задачи, объединяя правило умножения, дерево исходов и условную вероятность.",illustration:"prob_formulas_cards.svg",illustrationAlt:"Карточки: P(A)=m/n, P(A∪B)=P(A)+P(B)−P(A∩B), P(A|B), правило умножения"},9106:{id:"9106",blockId:"block-7",title:"Повторение. Описательная статистика",hook:"Среднее, дисперсия, стандартное отклонение — три числа, которые описывают любой набор данных. Повторяем вместе.",summary:{what:"Меры центра: x̄, медиана, мода. Меры разброса: D = Σ(xᵢ−x̄)²/n, σ = √D. Диаграммы: гистограмма, рассеивания.",facts:"При нормальном распределении 68% данных в x̄±σ, 95% в x̄±2σ, 99.7% в x̄±3σ.",dontConfuse:"Все три: x̄ описывает центр, σ — разброс. Вместе они дают полную картину данных.",trick:"Решая задачу: сначала нарисуй данные, потом считай. Никогда наоборот."},trainers:[{id:"t1",type:"case",title:"Комплексный анализ",question:"Набор: 2, 4, 4, 4, 6. x̄ = 4. D = ?",options:["1.6","2","4","0"],correct:0,explanation:"Отклонения: −2,0,0,0,+2. Квадраты: 4,0,0,0,4. D = 8/5 = 1.6."},{id:"t2",type:"highlight",title:"Выборочное исследование",text:"Выборка — часть генеральной совокупности. Для несмещённой оценки дисперсии по выборке используют делитель n−1 (поправка Бесселя), а не n.",targets:["часть генеральной совокупности","несмещённой оценки","n−1","поправка Бесселя"],instruction:"Выдели ключевые понятия выборочного метода"}],misconceptions:[{error:"«Достаточно знать среднее, чтобы описать данные»",reality:"Два набора с одинаковым средним могут иметь совершенно разный характер (разный σ). Всегда смотри на разброс."},{error:"«Повторение — это просто заучить формулы заново»",reality:"Повторение — это понять связи между понятиями. Как среднее связано с дисперсией? Как дисперсия связана с σ? Механическое запоминание не поможет на контрольной."}],glossary:[{term:"Правило трёх сигм",def:"При нормальном распределении: 68% данных в x̄±σ, 95% в x̄±2σ, 99.7% в x̄±3σ."},{term:"Гистограмма",def:"Столбчатый график для числовых данных: ось X — значения (интервалы), ось Y — частота."},{term:"Стандартное отклонение σ",def:"σ = √D — мера разброса данных в исходных единицах измерения."},{term:"Размах",def:"R = xₘₐₓ − xₘᵢₙ — простейшая мера разброса: разность наибольшего и наименьшего значений набора."}],finalQuiz:[{q:"Набор: 1, 3, 5, 7, 9. x̄ = 5, D = ?",options:["4","8","2","16"],correct:1,explanation:"D = [(1-5)²+(3-5)²+(5-5)²+(7-5)²+(9-5)²]/5 = [16+4+0+4+16]/5 = 40/5 = 8.",level:"apply"},{q:"D = 16. σ = ?",options:["4","8","256","2"],correct:0,explanation:"σ = √D = √16 = 4. Стандартное отклонение измеряется в тех же единицах, что данные.",level:"apply"},{q:"Два набора: x̄=5 у обоих, но σ₁=1 и σ₂=4. Различается:",options:["Центр","Разброс","Размер набора","Тип данных"],correct:1,explanation:"Одинаковое среднее, но σ₁=1 (плотная группа) и σ₂=4 (разброс). Различается разброс.",level:"analyze"},{q:"Набор: 6, 9, 9, 12. x̄ = ? D = ? σ = ?",options:["x̄=4, σ=2","x̄=4.8, σ≈2","x̄=4.8, σ≈1.72","x̄=5, σ=2"],correct:2,explanation:"x̄ = (6+9+9+12)/4 = 36/4 = 9. Отклонения: −3,0,0,3. Квадраты: 9,0,0,9. D = 18/4 = 4.5. σ = √4.5 ≈ 2.12.",level:"apply",answer:"x̄ = 9, D = 4.5, σ ≈ 2.12"},{q:"Два ученика решают задачи за разное время (сек): Иван: 10,10,10 и Петя: 5,10,15. У кого бо́льшее σ?",options:["У Ивана","У Пети","Одинаковое","Нельзя определить"],correct:1,explanation:"Иван: D=0, σ=0. Петя: x̄=10, D=(25+0+25)/3≈16.7, σ≈4.1. У Пети σ больше.",level:"analyze"}],didYouKnow:["Правило трёх сигм открыл Карл Гаусс (1809). Сейчас в производстве Six Sigma означает не более 3.4 дефектов на миллион — почти идеальное качество."],remember:["Описательная статистика: среднее, медиана, дисперсия, σ","σ маленькое → данные сгруппированы; большое → разброс","Один выброс сильно меняет среднее, но не медиану"],selfCheck:[{q:"D = 36. σ = ?",a:"6"},{q:"Что устойчиво к выбросам: среднее или медиана?",a:"Медиана"},{q:"Что показывает стандартное отклонение в контексте реальных данных? Дай пример.",a:"σ показывает типичный разброс значений от среднего. Например, если средний рост = 170 см и σ=5, большинство значений между 165 и 175 см."}],interactives:[{type:"tap-and-reveal",title:"Повторение: ключевые понятия статистики",instruction:"Нажми — вспомни определение",cols:2,cards:[{front:"Среднее арифметическое",back:"x̄ = Σxᵢ/n. Центр тяжести набора данных. Чувствительно к выбросам."},{front:"Медиана",back:"Значение, делящее упорядоченный ряд пополам. Устойчива к выбросам."},{front:"Мода",back:"Наиболее часто встречающееся значение. Используется для категориальных данных."},{front:"Дисперсия",back:"D = Σ(xᵢ−x̄)²/n. Среднее квадратов отклонений от среднего."},{front:"Стандартное отклонение",back:"σ = √D. В тех же единицах, что и данные."},{front:"Диаграмма рассеивания",back:"График пар (x,y). Показывает корреляцию двух величин."}]}],bridge:"Следующее повторение — графы, деревья и правило умножения.",recap:"Ты повторил описательную статистику: меры центра, разброс, диаграммы рассеивания.",illustration:"stats_review.svg",illustrationAlt:"Схема повторения: x̄ и Me как меры центра, D как мера разброса, стрелки-связи"},9107:{id:"9107",blockId:"block-7",title:"Повторение. Графы",hook:"Деревья, пути, правило умножения — повторяем теорию графов. Граф — мощный язык для описания связей.",summary:{what:"Граф: вершины + рёбра. Дерево: связный граф без циклов, n вершин → n−1 рёбер. Дерево вероятностей: произведение по ветвям.",facts:"Путь в графе — последовательность рёбер без повторения вершин. В дереве путь единственный.",dontConfuse:"Дерево ≠ любой связный граф. Дерево — минимально связный граф (без циклов).",trick:"Рисуй граф, пока задача кажется сложной. Граф делает структуру видимой."},trainers:[{id:"t1",type:"case",title:"Свойства дерева",question:"Дерево: 12 вершин. Сколько рёбер?",options:["10","11","12","13"],correct:1,explanation:"n − 1 = 12 − 1 = 11 рёбер. 10 = n−2 (на одно мало). 12 = n (равно вершинам — так бывает в цикле, не в дереве). 13 = n+1 (добавишь одно ребро — появится цикл)."},{id:"t2",type:"bucket_sort",title:"Тип задачи — какой инструмент?",instruction:"Подбери инструмент к задаче",items:[{id:"a",text:"Последовательные бросания монеты"},{id:"b",text:"Пересечение двух событий"},{id:"c",text:"Все пути в многошаговом опыте"},{id:"d",text:"Объединение двух множеств"}],buckets:[{id:"tree",label:"Дерево вероятностей",correct:["a","c"]},{id:"euler",label:"Диаграмма Эйлера",correct:["b","d"]}]}],misconceptions:[{error:"«В дереве могут быть циклы»",reality:"Цикл разрушает главное свойство дерева: единственность пути. Граф с циклом — не дерево."},{error:"«Дерево и произвольный граф — это одно и то же»",reality:"Граф — общее понятие. Дерево — частный случай: связный граф без циклов. Не каждый граф — дерево."}],glossary:[{term:"Граф",def:"Математическая структура: множество вершин и рёбер между ними."},{term:"Путь в графе",def:"Последовательность вершин и рёбер без повторения вершин. В дереве путь единственный."},{term:"Дерево (граф)",def:"Связный граф без циклов. n вершин → n−1 рёбер. Путь между любыми двумя вершинами единственный."},{term:"Лист дерева",def:"Вершина дерева, из которой не выходят рёбра вниз. Листья соответствуют конечным исходам."}],finalQuiz:[{q:"3 уровня дерева, по 3 ветви на каждом. Листьев:",options:["9","27","3","12"],correct:1,explanation:"По правилу умножения: 3×3×3 = 27 листьев на 3-м уровне.",level:"apply"},{q:"Дерево: 4 ветви 1-го уровня, каждая — 3 ветви 2-го. Листьев:",options:["7","12","4","3"],correct:1,explanation:"4 ветви × 3 ветви = 12 листьев. Правило умножения для дерева.",level:"apply"},{q:"Вероятности всех ветвей одного узла в сумме:",options:["0","Зависит от числа ветвей","1","Число листьев"],correct:2,explanation:"Из каждого узла все ветви вместе = 1. Это аксиома.",level:"recognize"},{q:"Дерево: 5 вершин 1-го уровня, каждая порождает 2 вершины 2-го уровня. Всего листьев 2-го уровня:",options:["5","7","10","12"],correct:2,explanation:"5 × 2 = 10 листьев.",level:"apply"},{q:"Сумма вероятностей всех рёбер от одного узла дерева вероятностей:",options:["0.5","зависит от узла","1","количество рёбер"],correct:2,explanation:"Из каждого узла рёбра представляют все возможные исходы — их вероятности суммируются в 1.",level:"understand"}],didYouKnow:["Теория графов началась с задачи Эйлера о кёнигсбергских мостах (1736): можно ли обойти все 7 мостов, не проходя по ним дважды? Ответ — нет."],remember:["Дерево с n вершинами: n−1 рёбер","Правило умножения: N = n₁·n₂·...·nₖ","Сумма вероятностей листьев = 1"],selfCheck:[{q:"3 уровня, по 2 ветви каждый. Листьев = ?",a:"8"},{q:"Дерево: 5 вершин, сколько рёбер?",a:"4"},{q:"Как связаны дерево вариантов и правило умножения?",a:"Число листьев дерева = произведение числа ветвей на каждом уровне (правило умножения)."}],interactives:[{type:"compare-two",title:"Дерево vs Диаграмма Эйлера",left:{label:"Дерево вероятностей",items:["Для последовательных событий","Ветви — исходы по шагам","Произведение по пути","Видна динамика эксперимента"],detail:"Используй дерево, когда события следуют одно за другим (бросок → ещё бросок)."},right:{label:"Диаграмма Эйлера",items:["Для одновременных событий","Круги — множества исходов","Области — пересечения","Видны соотношения множеств"],detail:"Используй Эйлера, когда нужно наглядно показать пересечение и объединение событий."},keyDifference:"Дерево — для «сначала… потом…». Эйлер — для «одновременно А и В»."}],bridge:"Повторяем вероятность и комбинаторику перед финальным обобщением.",recap:"Ты освежил в памяти деревья вероятностей и правило умножения по ветвям.",illustration:"tree_review.svg",illustrationAlt:"Дерево вероятностей: структура узел→ветви, правило Σ вероятностей на уровне = 1"},9108:{id:"9108",blockId:"block-7",title:"Повторение. Вероятность. Комбинаторика",hook:"Формулы сложения и умножения вероятностей работают вместе — как инструменты в наборе. Повторяем, как их применять.",summary:{what:"P(A) = m/n; P(A∪B) = P(A)+P(B)−P(A∩B); P(A∩B) = P(A)·P(B|A). Комбинаторика: n!, C(n,k), правило умножения.",facts:"C(n,k) = n! / (k!(n−k)!) — число способов выбрать k из n без учёта порядка.",dontConfuse:"Когда порядок важен: перестановки (n!). Не важен: сочетания C(n,k).",trick:"Нарисуй дерево для сложных вероятностей. Для комбинаторики — определи, важен ли порядок."},trainers:[{id:"t1",type:"case",title:"Комбинаторика и вероятность",question:"Из 6 команд выбирают 2 для финала. Сколько пар можно составить?",options:["10","20","5","25"],correct:0,explanation:"C(6,2) = 6! / (2! × 4!) = 15. Порядок не важен — берём сочетание.",answer:"15"},{id:"t2",type:"bucket_sort",title:"Перестановка, размещение или сочетание?",instruction:"Выбери формулу",items:[{id:"a",text:"Порядок важен, все элементы"},{id:"b",text:"Порядок важен, выбираем k из n"},{id:"c",text:"Порядок не важен, выбираем k из n"},{id:"d",text:"Расставить 5 книг на полке"}],buckets:[{id:"perm",label:"n! (Перестановка)",correct:["a","d"]},{id:"arr",label:"A(n,k) (Размещение)",correct:["b"]},{id:"comb",label:"C(n,k) (Сочетание)",correct:["c"]}]}],misconceptions:[{error:"«Перестановки и сочетания — одно и то же»",reality:"Перестановки: порядок важен (АБВ ≠ БАВ). Сочетания: порядок не важен ({А,Б,В} = {Б,А,В})."},{error:"«Сочетание и размещение — одно и то же»",reality:"Размещение учитывает порядок, сочетание — нет. AB и BA — одно сочетание, но два разных размещения."}],glossary:[{term:"Сочетание C(n,k)",def:"Число способов выбрать k элементов из n без учёта порядка: C(n,k) = n!/(k!(n−k)!)."},{term:"Комбинаторика",def:"Раздел математики, изучающий методы подсчёта конфигураций: перестановок, сочетаний, размещений."},{term:"Перестановка",def:"Упорядоченный набор n различных элементов. Число перестановок = n!"},{term:"Биномиальный коэффициент",def:"C(n,k) = n!/(k!(n−k)!) — число сочетаний из n по k. Используется при подсчёте числа комбинаций в задачах комбинаторики."},{term:"Треугольник Паскаля",def:"Числовая таблица, где каждое число = сумма двух чисел над ним. Строка n содержит все C(n,k): 1, n, C(n,2), …, 1."}],finalQuiz:[{q:"C(4,2) = ?",options:["6","12","4","8"],correct:0,explanation:"C(4,2) = 4!/(2!×2!). Сочетание — выбрать без учёта порядка. C(4,2) = число пар из 4 элементов.",level:"understand"},{q:"P(A) = 0.3, P(B) = 0.5, независимы. P(A∩B) = ?",options:["0.8","0.15","0.2","0.35"],correct:1,explanation:"Независимые события: P(A∩B) = 0.3×0.5 = 0.15.",level:"apply"},{q:"Сколько слов из 5 разных букв (А,Б,В,Г,Д) без повторений?",options:["5","25","120","60"],correct:2,explanation:"5 разных букв — 5! = 120 слов. Почему именно факториал? Каждая позиция уменьшает выбор на 1.",level:"analyze"},{q:"C(5,2) = ? Сколько способов выбрать 2 предмета из 5?",options:["10","20","5","12"],correct:0,explanation:"C(5,2) = 5!/(2!·3!) = (5·4)/(2·1) = 10.",level:"apply"},{q:"Из 4 карт (1,2,3,4) тянут 2 без возврата. Сколько различных пар можно вытащить?",options:["4","6","8","12"],correct:1,explanation:"C(4,2) = 4!/(2!·2!) = 6 пар.",level:"apply"},{q:"В треугольнике Паскаля число C(5,2) стоит в 5-й строке. C(5,2) = ?",options:["5","10","20","15"],correct:1,explanation:"C(5,2) = 5!/(2!·3!) = 10. В треугольнике Паскаля: 1, 5, 10, 10, 5, 1.",level:"apply"}],didYouKnow:["Числа треугольника Паскаля — биномиальные коэффициенты C(n,k) — были описаны Блезом Паскалем в 1654 году. Но в Китае эта схема была известна ещё в XI веке, за 600 лет до Паскаля."],remember:["C(n,k) = n! / (k!(n−k)!) — число сочетаний","P(A∩B) = P(A)·P(B) для независимых","n! = число перестановок n элементов"],selfCheck:[{q:"C(5,2) = ?",a:"10"},{q:"4! = ?",a:"24"},{q:"Чем отличается перестановка от сочетания? Приведи пример.",a:"В перестановке важен порядок (AB ≠ BA), в сочетании — нет ({A,B}={B,A}). Пример: пароль — перестановка; команда из 2 — сочетание."}],interactives:[{type:"tap-and-reveal",title:"Комбинаторика: когда что применять",instruction:"Нажми на ситуацию — узнай формулу",cols:1,cards:[{front:"«Сколько способов выбрать 3 из 5, если порядок важен?»",back:"Размещение: A(5,3) = 5!/(5−3)! = 60. Порядок важен — разные порядки считаются разными."},{front:"«Сколько способов выбрать 3 из 5, если порядок не важен?»",back:"Сочетание: C(5,3) = 5!/(3!·2!) = 10. Только состав, не порядок."},{front:"«Сколько способов расставить 4 книги на полке?»",back:"Перестановка: P(4) = 4! = 24. Все n объектов, все позиции задействованы."},{front:"«Когда использовать правило умножения?»",back:"Когда выбор делается в несколько независимых шагов: n₁ × n₂ × … × nₖ вариантов"}]}],bridge:"Финальное обобщение — соберём все темы курса воедино.",recap:"Ты повторил вероятность и комбинаторику: классическую формулу, независимые события, правила.",illustration:"combinatorics_review.svg",illustrationAlt:"Таблица: перестановки P(n)=n! и размещения A(n,k)=n!/(n−k)! с примерами"},9109:{id:"9109",blockId:"block-7",title:"Повторение. Обобщение курса",hook:"За год: данные, разброс, множества, вероятность, графы. Всё это — язык, описывающий случайность и неопределённость.",summary:{what:"Курс в одной схеме: данные → статистика (x̄, σ) → множества → вероятность (P, формулы) → графы (деревья).",facts:"Все темы связаны: множества — язык событий, деревья — инструмент вероятностей, статистика — анализ результатов.",dontConfuse:"Статистика описывает уже случившееся. Вероятность предсказывает будущее.",trick:"Для любой задачи на случайность: 1) опиши Ω; 2) выдели событие A; 3) посчитай P(A)."},trainers:[{id:"t1",type:"case",title:"Итоговый вопрос",question:"Что общего у статистики и теории вероятностей?",options:["Обе изучают детерминированные процессы","Обе работают с неопределённостью и случайностью","Обе используют только графы","Обе нужны только в финансах"],correct:1,explanation:"Статистика описывает данные (случившееся). Вероятность моделирует будущие случайные события. Обе — язык неопределённости."},{id:"t2",type:"free",title:"Синтез курса",prompt:"Набор данных: 3, 3, 7, 3, 4. Найди x̄, медиану и дисперсию. Затем объясни: почему среднее и медиана совпадают в этом наборе? Что это говорит об отсутствии выбросов?",placeholder:"x̄ = ... Me = ... D = ... Объяснение: ...",hint:"Среднее = (3+3+7+3+4)/5 = 4. Медиана: упорядочь → 3,3,3,4,7 → Me = 3. Проверь своё рассуждение про выбросы.",instruction:"Реши задачу и запиши вывод о данных"}],misconceptions:[{error:"«Математика и случайность несовместимы»",reality:"Случайность подчиняется математическим законам. Теория вероятностей — строгая математическая дисциплина."},{error:"«Статистика и вероятность — это одна наука»",reality:"Статистика анализирует реальные данные (прошлое). Теория вероятностей строит математические модели (будущее). Они связаны, но это разные инструменты."}],glossary:[{term:"Теория вероятностей",def:"Математическая дисциплина, изучающая закономерности случайных явлений."},{term:"Математическая статистика",def:"Наука о методах сбора, обработки и интерпретации данных."},{term:"Вероятностная модель",def:"Математическое описание случайного эксперимента: пространство исходов Ω и функция вероятности P с аксиомами."},{term:"Описательная статистика",def:"Раздел статистики, описывающий числовой набор с помощью среднего, медианы, дисперсии, стандартного отклонения."}],finalQuiz:[{q:"Что описывает стандартное отклонение?",options:["Центр распределения","Разброс данных","Вероятность события","Число элементов"],correct:1,explanation:"Стандартное отклонение (σ) показывает, насколько значения «разбросаны» вокруг среднего.",level:"understand"},{q:"Какая формула для вероятности объединения несовместных событий?",options:["P(A)·P(B)","P(A)+P(B)","P(A)+P(B)−P(A∩B)","P(A)/P(B)"],correct:1,explanation:"Для несовместных событий P(A∪B) = P(A)+P(B). Они не пересекаются, так что двойного счёта нет.",level:"recognize"},{q:"Чем статистика отличается от теории вероятностей?",options:["Ничем","Статистика — анализ данных прошлого; вероятность — модель будущего","Статистика не использует числа","Вероятность не нужна в жизни"],correct:1,explanation:"Статистика — анализ реальных данных (прошлого). Вероятность — математическая модель (будущего).",level:"analyze"},{q:"Набор данных: 3, 5, 7. Выбор из урны: 5 белых, 5 чёрных. Какая связь между σ набора и P(белый)?",options:["σ набора определяет P(белый)","Это разные разделы математики — прямой связи нет","P(белый) = σ/10","σ = P(белый) × 10"],correct:1,explanation:"Статистика описывает данные (σ — разброс набора). Теория вероятностей — случайные явления. Это разные разделы.",level:"analyze"},{q:"Описательная статистика изучает данные, теория вероятностей изучает:",options:["Только реальные данные","Закономерности случайных явлений","Только определённые события","Графы и деревья"],correct:1,explanation:"Теория вероятностей — математическая модель случайности; статистика анализирует уже собранные данные.",level:"understand"}],didYouKnow:["В XXI веке теория вероятностей — основа машинного обучения, нейронных сетей и искусственного интеллекта. То, что ты изучал в 8 классе, работает в ChatGPT."],remember:["Статистика описывает прошлые данные","Вероятность моделирует будущие случайные события","P(A∪B) = P(A)+P(B)−P(A∩B) — для любых событий","P(A∪B) = P(A)+P(B) — только для несовместных"],selfCheck:[{q:"σ = 0 означает?",a:"Все значения одинаковы"},{q:"Чем статистика отличается от теории вероятностей?",a:"Статистика анализирует данные прошлого"},{q:"Назови три основных раздела курса и ключевую формулу из каждого.",a:"1) Статистика: x̄=Σxᵢ/n, σ=√D. 2) Теория вероятностей: P(A)=m/n, P(A∪B)=P(A)+P(B)−P(A∩B). 3) Множества: |A∪B|=|A|+|B|−|A∩B|."}],interactives:[{type:"tap-and-reveal",title:"Большие идеи курса",instruction:"Нажми — вспомни главное",cols:2,cards:[{front:"📊 Описательная статистика",back:"Среднее, медиана, мода — меры центра. Дисперсия, σ — меры разброса. Выбор зависит от данных."},{front:"∩∪ Теория множеств",back:"Объединение (∪), пересечение (∩), дополнение (Ā). Формула включений-исключений для подсчёта."},{front:"🎲 Классическая вероятность",back:"P = m/n. Работает только при равновозможных исходах. Сумма всех = 1."},{front:"🌳 Сложные эксперименты",back:"Дерево для последовательных событий. Правило умножения по ветвям пути."},{front:"🔗 Зависимость событий",back:"Независимые: P(A∩B)=P(A)·P(B). Зависимые: используй условную вероятность P(B|A)."},{front:"📈 Закон больших чисел",back:"При большом числе испытаний экспериментальная частота стремится к теоретической вероятности."}]}],recap:"Ты повторил всю комбинаторику и вероятность. Видишь связи между разделами курса.",illustration:"course_mindmap.svg",illustrationAlt:"Интеллект-карта курса: ветви «Статистика» (x̄ Me Mo σ) и «Вероятность» со связями"},9110:{id:"9110",blockId:"block-1",title:"Представление данных. Описательная статистика",hook:"Ты смотришь на список оценок: 3, 5, 4, 4, 5, 2, 5, 4... Как быстро понять, что происходит с классом? Вот зачем нужна описательная статистика — превращать хаос цифр в одну ясную картину.",summary:{what:"Описательная статистика: методы обобщения данных — таблицы частот, гистограммы, меры центра.",facts:"Гистограмма показывает распределение. Таблица частот — сколько раз встречается каждое значение.",dontConfuse:"Гистограмма ≠ столбчатая диаграмма. Гистограмма — для числовых данных с интервалами.",trick:"Сначала данные — потом модель. Смотри на данные, прежде чем выбирать способ их описания."},trainers:[{id:"t1",type:"case",title:"Выбор представления",question:"Нужно показать, как распределены оценки 30 учеников. Что выбрать?",options:["Список всех 30 оценок","Таблица частот + гистограмма","Одно число — среднее","Таблица умножения"],correct:1,explanation:"Таблица частот и гистограмма наглядно покажут распределение — сколько пятёрок, четвёрок и т.д."},{id:"t2",type:"bucket_sort",title:"Меры центра vs Меры разброса",instruction:"Распредели показатели по категориям",items:[{id:"a",text:"Среднее x̄"},{id:"b",text:"Дисперсия D"},{id:"c",text:"Медиана Me"},{id:"d",text:"Стандартное откл. σ"},{id:"e",text:"Мода Mo"},{id:"f",text:"Размах R"}],buckets:[{id:"center",label:"Меры центра",correct:["a","c","e"]},{id:"spread",label:"Меры разброса",correct:["b","d","f"]}]}],misconceptions:[{error:"«Больше данных — всегда лучше»",reality:"Необработанные данные трудно интерпретировать. Описательная статистика сжимает информацию без потери смысла."},{error:"«Гистограмма и столбчатая диаграмма — одно и то же»",reality:"Столбчатая диаграмма — для категорий (имена, цвета). Гистограмма — для числовых данных, разбитых на интервалы. Столбцы гистограммы вплотную друг к другу."}],glossary:[{term:"Таблица частот",def:"Таблица, показывающая, сколько раз каждое значение встречается в наборе данных."},{term:"Гистограмма",def:"Столбчатый график для числовых данных, где ширина столбца — интервал значений."},{term:"Описательная статистика",def:"Раздел, описывающий данные числами и графиками без прогнозов."},{term:"Относительная частота",def:"Отношение числа наблюдений данного значения к общему числу наблюдений. Показывает долю.",example:"Из 40 учеников 10 получили пятёрку → относительная частота = 10/40 = 0.25."}],finalQuiz:[{q:"Что такое описательная статистика?",options:["Предсказание будущих значений","Методы обобщения и описания данных","Теория вероятностей","Только вычисление среднего"],correct:1,explanation:"Описательная статистика описывает и обобщает данные (среднее, медиана, гистограмма). Не прогнозирует.",level:"understand"},{q:"Что такое таблица частот?",options:["Расписание уроков","Таблица с числом повторений каждого значения","График функции","Список оценок"],correct:1,explanation:"Таблица частот показывает, сколько раз встречается каждое значение — удобно для анализа данных.",level:"recognize"},{q:"На гистограмме ось Y показывает:",options:["Значения переменной","Частоту значений","Вероятность","Порядковый номер"],correct:1,explanation:"Ось Y = частота (число/доля наблюдений). Ось X = значения переменной.",level:"recognize"},{q:"Гистограмма оценок класса: столбец «4» — самый высокий. Это значит:",options:["Среднее равно 4","Оценка 4 встречается чаще всего","Медиана равна 4","Нет двоечников"],correct:1,explanation:"Высота столбца = частота. Самый высокий столбец показывает моду — наиболее частое значение.",level:"analyze"},{q:"Таблица частот: значение 5 встречается 8 раз из 20. Относительная частота:",options:["0.08","0.4","0.5","0.8"],correct:1,explanation:"Относительная частота = 8/20 = 0.4.",level:"apply"}],didYouKnow:["Слово «статистика» происходит от латинского status — «государство». В 1749 году немецкий учёный Готфрид Ахенваль ввёл этот термин для описания числовых данных о государстве."],remember:["Гистограмма: ось X — значения, ось Y — частота","Таблица частот: значение + число повторений","Описательная статистика не делает прогнозов"],selfCheck:[{q:"На гистограмме ось Y показывает?",a:"Частоту (число повторений)"},{q:"Описательная статистика — это?",a:"Методы описания и обобщения данных"},{q:"Чем гистограмма отличается от столбчатой диаграммы?",a:"Гистограмма — для числовых данных с интервалами, столбцы примыкают друг к другу; столбчатая — для категорий."}],interactives:[{type:"compare-two",title:"Гистограмма vs Столбчатая диаграмма",left:{label:"Гистограмма",items:["Для числовых данных","Столбцы вплотную","Ось X — числовые интервалы","Показывает распределение"],detail:"Гистограмма оценок: интервалы 2-3, 3-4, 4-5. Видно, где «гора» — типичные оценки."},right:{label:"Столбчатая диаграмма",items:["Для категорий","Столбцы с пробелами","Ось X — категории (имена, цвета)","Сравнивает категории"],detail:"Число учеников по классам 5А, 5Б, 5В — это столбчатая диаграмма, не гистограмма."},keyDifference:"Гистограмма — числовые данные с интервалами. Столбчатая — категории. Главный признак: есть ли порядок у оси X."}],bridge:"Теперь переходим к разбросу: что такое отклонение от среднего и зачем его квадрировать.",recap:"Ты повторил меры центра — среднее, медиану, моду — и понял, когда какую выбирать.",illustration:"descriptive_stats.svg",illustrationAlt:"Гистограммы трёх классов А, Б, В: три взгляда на данные — среднее, медиана, мода"},9111:{id:"9111",blockId:"block-1",title:"Случайная изменчивость. Средние числового набора",hook:"Якоб Бернулли, 1713: случайность подчиняется законам. Среднее — первый из них.",summary:{what:"Числовой набор описывает множество наблюдений. Среднее арифметическое x̄ = (x₁+…+xₙ)/n — центр набора. Медиана M — серединное значение при упорядочивании.",facts:"Среднее чувствительно к выбросам, медиана — нет. Если набор чётного размера, медиана = среднее двух серединных.",dontConfuse:"Среднее ≠ медиана. При симметричном распределении они близки; при перекосе (выброс) — расходятся.",trick:"Медиана: сортируй и бери середину. Среднее: суммируй и дели на n."},trainers:[{id:"t1",type:"case",title:"Что такое медиана?",question:"Набор: 2, 5, 7, 9, 12. Чему равна медиана?",options:["5","7","9","7.5"],correct:1,explanation:"5 чисел — серединное (3-е) равно 7. Медиана = 7."},{id:"t2",type:"highlight",title:"Среднее и медиана",text:"Среднее арифметическое числового набора — сумма всех значений, делённая на их количество. Медиана — значение, стоящее в середине упорядоченного набора. При чётном числе элементов медиана равна среднему двух серединных значений.",targets:["сумма всех значений, делённая на их количество","в середине упорядоченного набора","среднему двух серединных значений"],instruction:"Выдели определения среднего и медианы"},{id:"t3",type:"highlight",title:"Среднее или медиана?",instruction:"Зарплаты в отделе: 40, 42, 45, 43, 200 тыс. руб. Какая характеристика честнее отражает «типичную» зарплату?",items:["Среднее x̄ ≈ 74 тыс. — сдвинуто выбросом 200","Медиана Me = 43 тыс. — устойчива к выбросам","Оба показателя одинаково хороши","Ни среднее, ни медиана не подходят"],correct:1,explanation:"При выбросах медиана надёжнее описывает типичное значение. Среднее 74 тыс. не отражает реальность большинства сотрудников."}],misconceptions:[{error:"«Среднее всегда лучше медианы»",reality:"При наличии выбросов медиана надёжнее. Именно поэтому в экономике часто сообщают медианную зарплату, а не среднюю."},{error:"«Медиана — то же самое, что мода»",reality:"Медиана — серединное значение (позиционная характеристика). Мода — наиболее частое значение. Это разные понятия."}],glossary:[{term:"Среднее арифметическое",def:"x̄ = (x₁+x₂+…+xₙ)/n — сумма всех значений, делённая на их количество."},{term:"Медиана",def:"Серединное значение упорядоченного набора. При чётном n — среднее двух серединных элементов."},{term:"Числовой набор",def:"Конечная последовательность числовых наблюдений или измерений."},{term:"Выброс",def:"Значение, резко отличающееся от остальных. Сильно влияет на среднее, почти не влияет на медиану."}],finalQuiz:[{q:"Набор: 3, 7, 7, 10, 13. Среднее = ?",options:["7","8","7.5","10"],correct:1,explanation:"(3+7+7+10+13)/5 = 40/5 = 8.",level:"recognize"},{q:"Набор: 1, 4, 6, 9, 10, 14. Медиана = ?",options:["6","7.5","9","6.5"],correct:1,explanation:"Чётный набор (6 эл.), серединные 3-е и 4-е: 6 и 9. Медиана = (6+9)/2 = 7.5.",level:"understand"},{q:"В наборе выброс — очень большое число. Что изменится?",options:["Среднее и медиана вырастут одинаково","Среднее вырастет сильно, медиана почти не изменится","Только медиана вырастет","Ни то, ни другое не изменится"],correct:1,explanation:"Выброс входит в сумму и сдвигает среднее. Медиана зависит только от положения серединного элемента.",level:"analyze"},{q:"Набор: 5, 5, 5, 5, 5. Среднее и медиана = ?",options:["Среднее=5, медиана=5","Среднее=5, медиана=0","Среднее=25, медиана=5","Они не равны"],correct:0,explanation:"Все значения 5 — и среднее, и медиана равны 5.",level:"understand"},{q:"Набор из 7 чисел упорядочен. Медиана — это...",options:["4-й элемент","3-й элемент","Среднее 3-го и 5-го","7-й элемент"],correct:0,explanation:"При нечётном n=7 медиана — (n+1)/2 = 4-й элемент.",level:"apply"}],didYouKnow:["В России медианная зарплата почти на 30% ниже средней — из-за высоких доходов небольшого числа людей. Медиана честнее отражает реальность."],bridge:"Теперь ты знаешь, как описать центр данных. Следующий вопрос — насколько данные разбросаны вокруг этого центра?",remember:["Среднее x̄ = сумма / n","Медиана — серединный элемент упорядоченного набора","При чётном n: медиана = среднее двух серединных","Выбросы искажают среднее, но почти не влияют на медиану"],selfCheck:[{q:"Набор: 2, 4, 6. Среднее = ?",a:"4"},{q:"Набор: 1, 3, 5, 7. Медиана = ?",a:"4 (среднее 3-го и 4-го: (3+5)/2=4)"},{q:"Зачем нужна медиана, если есть среднее?",a:"Медиана устойчива к выбросам и точнее описывает типичное значение при несимметричных данных"}],interactives:[{type:"compare-two",title:"Среднее vs Медиана: когда что использовать",left:{label:"Среднее x̄",items:["Сумма / количество","Чувствительно к выбросам","Используй при симметричных данных","Пример: средний балл без аномалий"],detail:"Один выброс (очень большое число) сдвигает среднее далеко от «типичного» значения."},right:{label:"Медиана M",items:["Серединный элемент","Устойчива к выбросам","Используй при перекосе данных","Пример: медианная зарплата"],detail:"Медиана не меняется при замене максимального значения на любое ещё большее число."},keyDifference:"При выбросах — медиана точнее. При симметричных данных — оба равнозначны."}],illustration:"mean_stability.svg",illustrationAlt:"Гистограмма [2,3,4,4,5,20]: жёлтая линия x̄≈6.3 смещена выбросом, зелёная Me=4 устойчива"},9112:{id:"9112",blockId:"block-1",title:"Случайные события. Вероятности и частоты",hook:"Монету бросили 1000 раз. Орёл выпал 487 раз. Это случайность — или закономерность? И то, и другое.",summary:{what:"Частота события = число наступлений / общее число испытаний. Вероятность — теоретический предел частоты.",facts:"При росте числа испытаний частота стремится к вероятности (закон больших чисел, Якоб Бернулли, 1713).",dontConfuse:"Частота ≠ Вероятность. Частота — экспериментальная, зависит от конкретной серии. Вероятность — теоретическая.",trick:"Относительная частота = m/n, где m — число успехов, n — всего испытаний."},trainers:[{id:"t1",type:"case",title:"Частота события",question:"Кубик бросили 60 раз, шесть выпало 11 раз. Относительная частота выпадения шести:",options:["6/60","11/60","11/6","6/11"],correct:1,explanation:"Частота = число успехов / всего испытаний = 11/60 ≈ 0.183. Теоретическая вероятность = 1/6 ≈ 0.167."},{id:"t2",type:"highlight",title:"Закон больших чисел",text:"При увеличении числа испытаний экспериментальная частота события стремится к его теоретической вероятности. Якоб Бернулли доказал это в 1713 году — закон больших чисел.",targets:["числа испытаний","экспериментальная частота","теоретической вероятности","законом больших чисел"],instruction:"Выдели ключевые понятия"}],misconceptions:[{error:"«Частота всегда равна вероятности»",reality:"Лишь при большом числе испытаний частота приближается к вероятности. При малом числе могут быть значительные отклонения."},{error:"«Частота — это то же самое, что вероятность»",reality:"Частота — наблюдаемое число (из эксперимента). Вероятность — теоретическая модель. При n→∞ частота стремится к вероятности, но никогда не равна ей точно."}],glossary:[{term:"Относительная частота",def:"m/n — доля испытаний, в которых событие произошло."},{term:"Закон больших чисел",def:"При увеличении числа испытаний частота стремится к теоретической вероятности."},{term:"Вероятность P(A)",def:"Теоретическая мера возможности события — предел частоты при большом числе испытаний."},{term:"Частота события",def:"Отношение числа наступлений события к общему числу испытаний: f(A) = m/n.",example:"При 100 бросках кубика шестёрка выпала 18 раз → частота = 18/100 = 0.18."}],finalQuiz:[{q:"Монету бросили 100 раз, орёл — 53 раза. Частота орла:",options:["0.5","0.53","53","47"],correct:1,explanation:"53/100 = 0.53. Частота = количество наступлений / общее число испытаний.",level:"apply"},{q:"При большом числе бросков монеты частота орла приближается к:",options:["0","0.5","1","Непредсказуема"],correct:1,explanation:"Закон больших чисел: при большом n частота стремится к теоретической вероятности.",level:"understand"},{q:"Бросали монету 10 раз, орёл — 8 раз. Это означает:",options:["Монета нечестная","Орёл следующим тоже выпадет","При малом числе бросков такое отклонение нормально","P(орёл)=0.8"],correct:2,explanation:"При 10 бросках отклонение от 50% нормально — выборка мала, случайность сильна.",level:"analyze"},{q:"Монету бросали 200 раз: орёл — 98. Ещё 800 бросков — ожидаемое число орлов примерно:",options:["400","490","500","392"],correct:0,explanation:"За следующие 800 бросков P(орёл) ≈ 0.5, ожидаем ≈ 400 орлов.",level:"apply"},{q:"Частота события за 50 опытов — 0.36. Значит, событие наступало примерно:",options:["36 раз","18 раз","14 раз","50 раз"],correct:1,explanation:"0.36 × 50 = 18 раз.",level:"apply"}],didYouKnow:["Якоб Бернулли доказал закон больших чисел в 1713 году. Он вычислил: чтобы оценить вероятность с точностью 0.02, нужно не менее 25 550 испытаний."],illustration:"law_of_large_numbers.svg",illustrationAlt:"График частоты орла (n=200): кривая стремится к 0.5, подпись «Якоб Бернулли, 1713»",remember:["Частота события = k/n (k — наступлений, n — испытаний)","При большом n: частота → вероятность","Закон больших чисел: Якоб Бернулли, 1713"],selfCheck:[{q:"200 бросков, 96 орлов. Частота = ?",a:"0.48"},{q:"При каком n частота надёжно оценивает P?",a:"При большом n (50+)"},{q:"В чём разница между вероятностью и частотой события?",a:"Вероятность — теоретическое число (идеал), частота — наблюдаемая доля в конкретной серии опытов."}],interactives:[{type:"compare-two",title:"5 vs 1000 бросков",left:{label:"5 бросков",items:["Частота: 0.0 — 1.0 возможна","Большие случайные отклонения","4 орла из 5 = 0.8 — нормально","Не доверяем оценке P"],detail:"5 бросков — слишком мало. 4 орла из 5 = 80%, но это не значит что монета нечестная."},right:{label:"1000 бросков",items:["Частота близка к 0.5","Малые случайные отклонения","520 орлов = 0.52 ≈ 0.5","Можно доверять оценке P"],detail:"При 1000 бросках честной монеты частота орла будет очень близка к 0.5. Закон больших чисел работает."},keyDifference:"Чем больше испытаний, тем надёжнее оценка вероятности. При n→∞ частота → P."}],bridge:"Узнаем, как случайность описывается точными числами — через вероятность.",recap:"Ты наблюдал, как средние и частоты ведут себя при большом числе испытаний."},9113:{id:"9113",blockId:"block-1",title:"Классические модели: монета и кость",hook:"Паскаль и Ферма, 1654: переписка о костях заложила фундамент теории вероятностей. Монета и кубик — простейшие, но мощнейшие модели случайности.",summary:{what:"Монета: 2 исхода (О, Р), P = 1/2 каждый. Кубик: 6 исходов (1–6), P = 1/6 каждый. Все исходы равновозможны.",facts:"Пространство исходов монеты: {О, Р}. Кубика: {1,2,3,4,5,6}. P(любого исхода) = 1/n.",dontConfuse:"Честная монета и честный кубик имеют равновозможные исходы. В реальности могут быть отклонения.",trick:"Для составных событий (несколько бросков) используй дерево исходов."},trainers:[{id:"t1",type:"case",title:"Кубик и монета",question:"Бросают монету и кубик одновременно. Сколько всего равновозможных исходов?",options:["8","12","6","2"],correct:1,explanation:"По правилу умножения: 2 (монета) × 6 (кубик) = 12 исходов."},{id:"t2",type:"bucket_sort",title:"Монета vs Кость — события",instruction:"Отнеси каждое событие к правильному опыту",items:[{id:"a",text:"Выпал орёл"},{id:"b",text:"Выпало 4 очка"},{id:"c",text:"Выпала решка"},{id:"d",text:"Выпало чётное число"},{id:"e",text:"Выпало число > 3"}],buckets:[{id:"coin",label:"Монета",correct:["a","c"]},{id:"die",label:"Кость",correct:["b","d","e"]}]}],misconceptions:[{error:"«На монете может выпасть ни орёл, ни решка»",reality:"В математической модели монета имеет ровно два исхода. Падение на ребро не рассматривается в классической модели."},{error:"«Честная монета всегда даёт примерно 50/50 за 10 бросков»",reality:"50/50 — закономерность при большом числе бросков. За 10 бросков 8 орлов и 2 решки — совершенно нормально для честной монеты."}],glossary:[{term:"Честная монета",def:"Модель: монета с P(орёл) = P(решка) = 1/2."},{term:"Честный кубик",def:"Модель: кубик с P(i) = 1/6 для каждой грани i = 1..6."},{term:"Пространство исходов Ω",def:"Множество всех возможных результатов случайного эксперимента."},{term:"Равновозможные исходы",def:"Исходы, каждый из которых имеет одинаковую вероятность наступления.",example:"При броске честной монеты орёл и решка равновозможны: P = 1/2 каждый."}],finalQuiz:[{q:"P(орёл) при бросании честной монеты:",options:["1/4","1/3","1/2","2/3"],correct:2,explanation:"Честная монета: 2 равновозможных исхода. P(орёл) = 1/2.",level:"recognize"},{q:"P(выпадет 3) при бросании честного кубика:",options:["1/3","1/6","1/2","3/6"],correct:1,explanation:"Кубик: 6 равновозможных исходов, выпадение «3» — 1 благоприятный. P = 1/6.",level:"recognize"},{q:"Два кубика бросают одновременно. Всего равновозможных исходов:",options:["12","36","6","8"],correct:1,explanation:"При одновременном броске двух кубиков: 6×6 = 36 равновозможных пар.",level:"apply"},{q:"Кубик бросают дважды. P(оба раза выпадет 6) = ?",options:["1/6","1/12","1/36","2/6"],correct:2,explanation:"Независимые события: P = (1/6) × (1/6) = 1/36.",level:"apply"},{q:"Монету бросают 3 раза. Сколько элементарных исходов в Ω?",options:["3","6","8","9"],correct:2,explanation:"Каждый бросок: 2 исхода. Всего: 2³ = 8 исходов.",level:"apply"}],didYouKnow:["Блез Паскаль и Пьер де Ферма никогда не встречались лично. Теория вероятностей родилась в письмах 1654 года."],interactives:[{type:"tap-and-reveal",title:"Что это за модель?",instruction:"Нажми на описание эксперимента — узнай его классическую модель",cols:2,cards:[{content:`Бросаем монету.

r:"«Отклонение — всегда положительное число»",reality:"Отклонение = xᵢ − x̄, имеет знак. Положительное: значение выше среднего. Отрицательное: ниже."},{error:"«Отрицательное отклонение — это ошибка в данных»",reality:"Отрицательное отклонение означает, что значение ниже среднего. Это абсолютно нормально: примерно половина значений ниже среднего."}],glossary:[{term:"Отклонение dᵢ",def:"dᵢ = xᵢ − x̄. Разность значения и среднего с учётом знака."},{term:"Сумма отклонений",def:"Σ(xᵢ−x̄) = 0 всегда — фундаментальное свойство среднего арифметического."},{term:"Дисперсия D",def:"D = Σ(xᵢ−x̄)²/n — среднее квадратов отклонений. D ≥ 0."},{term:"Отклонение от среднего",def:"Разность значения и среднего арифметического набора: dᵢ = xᵢ − x̄. Сумма всех отклонений всегда равна нулю."}],finalQuiz:[{q:"x̄ = 10, xᵢ = 7. Отклонение = ?",options:["+3","−3","+7","−7"],correct:1,explanation:"Отклонение = xᵢ − x̄ = 7 − 10 = −3. Минус означает, что значение ниже среднего.",level:"apply"},{q:"Сумма всех отклонений от среднего:",options:["Всегда 0","Всегда 1","Зависит от данных","Всегда n"],correct:0,explanation:"Положительные и отрицательные отклонения компенсируют друг друга: Σ(xᵢ − x̄) = 0 всегда.",level:"understand"},{q:"x̄=7, xᵢ=9. Отклонение = ?",options:["-2","+2","+9","0"],correct:1,explanation:"Отклонение = xᵢ − x̄ = 9 − 7 = +2. Плюс — значение выше среднего.",level:"apply"},{q:"Набор: 5, 8, 11. x̄ = 8. Сумма квадратов отклонений = ?",options:["0","6","18","9"],correct:2,explanation:"Отклонения: −3, 0, 3. Квадраты: 9, 0, 9. Сумма = 18.",level:"apply"},{q:"Среднее набора x̄ = 12. Значение xᵢ = 9. Отклонение xᵢ от среднего:",options:["3","−3","9","21"],correct:1,explanation:"Отклонение = xᵢ − x̄ = 9 − 12 = −3.",level:"apply"}],didYouKnow:["Концепция отклонения от среднего лежит в основе нейронных сетей. В 1986 году Румелхарт, Хинтон и Уильямс опубликовали алгоритм обратного распространения ошибки — он минимизирует именно среднеквадратичное отклонение."],illustration:"deviations_diagram.svg",illustrationAlt:"Пять значений с отклонениями от среднего; подпись: сумма всех отклонений = 0",remember:["Отклонение = xᵢ − x̄","Положительное отклонение: значение выше среднего","Сумма всех отклонений от среднего = 0"],selfCheck:[{q:"x̄ = 8, xᵢ = 5. Отклонение = ?",a:"−3"},{q:"Сумма отклонений от среднего всегда = ?",a:"0"},{q:"Могут ли отклонения быть отрицательными? Почему?",a:"Да. Если значение меньше среднего, отклонение xᵢ − x̄ отрицательно."}],interactives:[{type:"tap-and-reveal",title:"Знак отклонения",instruction:"Нажми на каждое значение — узнай знак отклонения при x̄=5",cols:3,cards:[{content:`xᵢ = 3

x̄ = 5`,category:"Отклонение = +0.5"}]}],bridge:"Дальше — стандартное отклонение как практичная мера разброса в исходных единицах.",recap:"Ты вычислял отклонения от среднего и считал дисперсию по определению."},9115:{id:"9115",blockId:"block-2",title:"Дисперсия числового набора",hook:"Дисперсия — средний квадрат отклонений. Почему квадрат? Чтобы отрицательные не гасили положительные.",summary:{what:"Дисперсия D = Σ(xᵢ − x̄)²/n измеряет средний квадрат отклонений от среднего. Чем больше D, тем сильнее разброс данных.",facts:"D ≥ 0 всегда. D = 0 только если все значения одинаковы. Единица дисперсии — квадрат единицы исходных данных.",dontConfuse:"Дисперсия ≠ стандартное отклонение. σ = √D — в тех же единицах, что и исходные данные. D = σ².",trick:"Алгоритм: 1) найди x̄; 2) вычти x̄ из каждого xᵢ; 3) возведи в квадрат; 4) найди среднее квадратов."},trainers:[{id:"t1",type:"case",title:"Вычисли дисперсию",question:"Набор: 4, 6, 8. Среднее x̄ = 6. Чему равна дисперсия D?",options:["2","4","8/3 ≈ 2.67","6"],correct:2,explanation:"D = ((4−6)²+(6−6)²+(8−6)²)/3 = (4+0+4)/3 = 8/3 ≈ 2.67."},{id:"t2",type:"builder",title:"Собери формулу дисперсии",instruction:"Расставь шаги вычисления дисперсии в правильном порядке",blocks:["x̄","xᵢ − x̄","(xᵢ − x̄)²","Σ(xᵢ − x̄)²","D = Σ(xᵢ − x̄)² / n"],answer:["x̄","xᵢ − x̄","(xᵢ − x̄)²","Σ(xᵢ − x̄)²","D = Σ(xᵢ − x̄)² / n"],feedbackOk:"Шаги: найти среднее → отклонения → квадраты → сумма квадратов → делить на n.",feedbackWrong:"Начни с вычисления среднего x̄, затем найди отклонения каждого значения."},{id:"t2",type:"highlight",title:"Определение дисперсии",text:"Дисперсия числового набора x₁, x₂, …, xₙ — это среднее арифметическое квадратов отклонений от среднего: D = ((x₁−x̄)²+(x₂−x̄)²+…+(xₙ−x̄)²)/n. Дисперсия всегда неотрицательна и равна нулю только тогда, когда все числа набора одинаковы.",targets:["среднее арифметическое квадратов отклонений","D = ((x₁−x̄)²+(x₂−x̄)²+…+(xₙ−x̄)²)/n","всегда неотрицательна","все числа набора одинаковы"],instruction:"Выдели определение и ключевые свойства дисперсии"}],misconceptions:[{error:"«Дисперсия — это среднее отклонений (без квадрата)»",reality:"Сумма отклонений всегда равна нулю! Поэтому используют квадраты — они всегда ≥ 0 и не гасят друг друга."},{error:"«Дисперсия и стандартное отклонение — одно и то же»",reality:"D = σ². Дисперсия — в квадратных единицах, стандартное отклонение σ = √D — в исходных единицах."}],glossary:[{term:"Дисперсия",def:"D = Σ(xᵢ−x̄)²/n — среднее квадратов отклонений числового набора от его среднего."},{term:"Отклонение",def:"xᵢ − x̄ — разность значения и среднего. Сумма всех отклонений = 0."},{term:"Стандартное отклонение",def:"σ = √D — корень из дисперсии. Выражается в тех же единицах, что и исходные данные."},{term:"Разброс данных",def:"Степень отличия значений набора от его центра (среднего). Измеряется дисперсией или стандартным отклонением."}],finalQuiz:[{q:"Набор: 5, 5, 5, 5. Дисперсия = ?",options:["5","0","1","25"],correct:1,explanation:"Все значения равны среднему, все отклонения = 0. D = 0.",level:"recognize"},{q:"Набор: 0, 2, 4. x̄ = 2. D = ?",options:["2","4/3","8/3","4"],correct:2,explanation:"D = ((0−2)²+(2−2)²+(4−2)²)/3 = (4+0+4)/3 = 8/3.",level:"apply"},{q:"D = 9. Стандартное отклонение σ = ?",options:["81","4.5","3","9"],correct:2,explanation:"σ = √D = √9 = 3.",level:"understand"},{q:"Почему в формуле дисперсии используются квадраты отклонений?",options:["Так удобнее считать","Сумма отклонений равна нулю — квадраты убирают взаимное уничтожение","Это исторически сложилось","Квадраты дают большие числа"],correct:1,explanation:"Сумма (xᵢ−x̄) всегда = 0. Квадраты гарантируют неотрицательность и меру реального разброса.",level:"analyze"},{q:"Набор A: 1, 5, 9. Набор B: 4, 5, 6. У какого набора дисперсия больше?",options:["У A","У B","Одинаковые","Зависит от среднего"],correct:0,explanation:"У A значения дальше от среднего (5), разброс больше. DA = (16+0+16)/3 > DB = (1+0+1)/3.",level:"analyze"}],didYouKnow:["Карл Гаусс использовал дисперсию при обработке астрономических наблюдений ещё в 1809 году — за сто лет до того, как появился сам термин."],bridge:"Дисперсия — в квадратных единицах. Чтобы вернуться к исходным единицам, берут стандартное отклонение σ = √D.",remember:["D = Σ(xᵢ−x̄)²/n — среднее квадратов отклонений","D ≥ 0 всегда; D = 0 ⟺ все значения одинаковы","σ = √D — стандартное отклонение (в исходных единицах)","Сумма отклонений от среднего всегда = 0"],selfCheck:[{q:"Набор: 3, 3, 3. D = ?",a:"0 — все значения равны среднему"},{q:"Чем σ отличается от D?",a:"σ = √D, стандартное отклонение в тех же единицах, что данные"},{q:"Зачем квадрат в формуле дисперсии?",a:"Чтобы отклонения не гасили друг друга (сумма отклонений = 0)"}],interactives:[{type:"tap-and-reveal",title:"Алгоритм вычисления дисперсии",instruction:"Нажми на шаг — увидишь, что делать",cols:2,cards:[{content:"Шаг 1: найди среднее x̄",category:"Сначала"},{content:"Шаг 2: вычти x̄ из каждого xᵢ",category:"Отклонения"},{content:"Шаг 3: возведи каждое в квадрат",category:"Убираем минусы"},{content:"Шаг 4: найди среднее квадратов",category:"Результат = D"}]}],illustration:"dispersion_visual.svg",illustrationAlt:"Числовая ось: точки 2,4,6,8 (x̄=5), стрелки отклонений, квадраты D=(9+1+1+9)/4=5"},9116:{id:"9116",blockId:"block-2",title:"Стандартное отклонение числового набора",hook:"Дисперсия полезна, но измеряется в «квадратных оценках». Стандартное отклонение возвращает нас на землю: те же единицы, что и данные. 2 балла от среднего — это понятно каждому.",summary:{what:"σ = √(Σ(xᵢ−x̄)²/n). Алгоритм: среднее → отклонения → квадраты → среднее квадратов → корень.",facts:"σ ≥ 0. σ = 0: все значения одинаковы. Чем больше σ — тем больше разброс.",dontConfuse:"σ² = D (дисперсия). σ = √D (стандартное отклонение). Они связаны, но не равны.",trick:"σ удобно: оно в тех же единицах, что данные. D — нет."},trainers:[{id:"t0",type:"highlight",title:"Что показывает σ?",instruction:"Выбери верное утверждение о стандартном отклонении σ",items:["σ показывает наибольшее значение в наборе","σ показывает типичный разброс значений вокруг среднего; σ = √D","σ всегда равно дисперсии","σ можно вычислить только для больших наборов"],correct:1,explanation:"σ = √D. Стандартное отклонение измеряет типичное отклонение от среднего в тех же единицах, что и исходные данные."},{id:"t1",type:"case",title:"Вычисляем σ",question:"Набор: 1, 3, 5. x̄=3. D = (4+0+4)/3 ≈ 2.67. σ ≈ ?",options:["2.67","1.63","7.11","0.67"],correct:1,explanation:"σ = √D = √2.67 ≈ 1.63. Берём квадратный корень из дисперсии. 2.67 — это сама дисперсия D, а не σ. 7.11 ≈ 2.67² (возведение в квадрат). 0.67 ≈ D/4 (нет такой формулы). Важно: σ всегда меньше D при D > 1, и σ > D при D < 1."},{type:"slider_rate",id:"slider_sigma_9116",title:"Оцени стандартное отклонение",instruction:"По описанию данных установи σ",tasks:[{label:"Все значения одинаковы: 5, 5, 5, 5",min:0,max:5,step:.1,correct:0,tolerance:.1,feedbackOk:"σ = 0 — нет разброса!",feedbackWrong:"Если все значения одинаковы, отклонений нет, D=0, σ=0."},{label:"D = 4. σ = ?",min:0,max:5,step:.1,correct:2,tolerance:.1,feedbackOk:"σ = √4 = 2",feedbackWrong:"σ = √D = √4 = 2"}]}],misconceptions:[{error:"«Большое σ — это плохо»",reality:"σ — нейтральная мера разброса. Иногда нужна стабильность (малое σ), иногда разнообразие (большое σ)."},{error:"«σ = 0 означает, что данные неправильные»",reality:"σ = 0 означает, что все значения одинаковы. Например, температура воды в термостате. Это не ошибка, а физическая реальность."}],glossary:[{term:"Стандартное отклонение σ",def:"σ = √D = √(Σ(xᵢ−x̄)²/n). Измеряется в тех же единицах, что и данные."},{term:"Коэффициент вариации",def:"CV = σ/x̄ × 100% — относительный разброс; позволяет сравнивать наборы с разными единицами измерения."},{term:"Дисперсия D",def:"D = σ² — квадрат стандартного отклонения. D измеряется в квадратных единицах."},{term:"Среднеквадратическое отклонение (σ)",def:"σ = √D. Показывает, насколько в среднем значения набора отклоняются от среднего. Имеет те же единицы, что и данные."}],finalQuiz:[{q:"D = 4. σ = ?",options:["2","4","16","8"],correct:0,explanation:"σ = √D = √4 = 2. Стандартное отклонение — корень из дисперсии.",level:"apply"},{q:"Если все значения набора умножить на 2, σ:",options:["Не изменится","Умножится на 2","Умножится на 4","Разделится на 2"],correct:1,explanation:"При умножении всех значений на k, отклонения тоже умножаются на k, значит σ тоже.",level:"analyze"},{q:"Если все значения набора одинаковы, σ = ?",options:["1","0","n","x̄"],correct:1,explanation:"Если все значения одинаковы, отклонений нет, D = 0, значит σ = √0 = 0.",level:"understand"},{q:"Набор: 10, 10, 10, 10. σ = ?",options:["10","1","0","4"],correct:2,explanation:"Все значения одинаковы — все отклонения нулевые, D = 0, σ = 0.",level:"apply"},{q:"Набор: 2, 6. x̄ = 4. σ = ?",options:["2","4","√2","√8"],correct:0,explanation:"D = ((2−4)²+(6−4)²)/2 = (4+4)/2 = 4. σ = √4 = 2.",level:"apply"}],didYouKnow:["В финансах стандартное отклонение доходности называют «волатильностью». В 1952 году Гарри Марковиц применил σ как меру риска в теории портфеля — за это в 1990 году получил Нобелевскую премию."],remember:["σ = √D — стандартное отклонение","σ = 0 → все значения одинаковы","Умножил данные на k → σ умножится на k"],selfCheck:[{q:"D = 9. σ = ?",a:"3"},{q:"Все значения одинаковы. σ = ?",a:"0"},{q:"Набор: 3, 5, 7. Найди σ.",a:"x̄=5. D=((3−5)²+(5−5)²+(7−5)²)/3=(4+0+4)/3=8/3. σ=√(8/3)≈1.63."}],interactives:[{type:"compare-two",title:"Генеральная совокупность vs Выборка",left:{label:"Генеральная совокупность",items:["Все объекты исследования","σ² = Σ(xᵢ−x̄)²/n","Делим на n","Точная дисперсия"],detail:"Если у нас все данные (например, весь класс), делим на n."},right:{label:"Выборка",items:["Часть объектов","s² = Σ(xᵢ−x̄)²/(n−1)","Делим на n−1","Несмещённая оценка"],detail:"Если это выборка из большой совокупности — делим на n−1. Поправка Бесселя."},keyDifference:"Выборочная дисперсия делится на n−1 (а не n) для несмещённой оценки."}],bridge:"Следующий раздел — теория множеств: фундамент языка математики и вероятности.",recap:"Ты разобрал разницу между генеральной и выборочной дисперсией (делители n и n−1).",illustration:"std_dev_compare.svg",illustrationAlt:"Два набора: узкий σ=8 и широкий σ=28; формула σ=√(Σ(xᵢ−x̄)²/n)"},9117:{id:"9117",blockId:"block-2",title:"Диаграммы рассеивания",hook:"Точечный график двух переменных обнаруживает связи, которые числа скрывают. Один взгляд — и паттерн виден.",summary:{what:"Диаграмма рассеивания: ось X — одна переменная, ось Y — другая, точка — одно наблюдение.",facts:"Плотное облако вдоль линии = сильная связь. Круглое облако = связи нет. Форма L или кривая = нелинейная связь.",dontConfuse:"Сила связи ≠ её вид. Сильная связь может быть нелинейной.",trick:"Всегда обозначай оси и указывай, что за данные."},trainers:[{id:"t1",type:"case",title:"Определяем связь",question:"На диаграмме точки образуют круглое облако без выраженного наклона. Связь:",options:["Сильная положительная","Сильная отрицательная","Слабая или отсутствует","Обязательно нелинейная"],correct:2,explanation:"Круглое облако = нет выраженной линейной связи."},{id:"t2",type:"bucket_sort",title:"Вид корреляции",instruction:"Определи вид связи по описанию",items:[{id:"a",text:"Рост ↑ — вес ↑"},{id:"b",text:"Скорость ↑ — время пути ↓"},{id:"c",text:"Цвет глаз и рост"},{id:"d",text:"Температура ↑ — продажи мороженого ↑"},{id:"e",text:"Число уроков и день недели"}],buckets:[{id:"pos",label:"Прямая корреляция",correct:["a","d"]},{id:"neg",label:"Обратная корреляция",correct:["b"]},{id:"no",label:"Нет связи",correct:["c","e"]}]}],misconceptions:[{error:"«Если точки не ложатся на прямую — связи нет»",reality:"Связь может быть нелинейной (кривая, парабола). Диаграмма рассеивания покажет её форму."},{error:"«Нет линейной связи — значит нет никакой связи»",reality:"Связь может быть нелинейной (U-образной, экспоненциальной и т.д.). Диаграмма рассеивания показывает форму связи — не только линейную."}],glossary:[{term:"Диаграмма рассеивания",def:"Точечный график, где каждая точка — наблюдение с двумя числовыми характеристиками."},{term:"Нелинейная связь",def:"Связь между переменными, которая не описывается прямой линией."},{term:"Выброс",def:"Наблюдение, резко отстоящее от основного облака точек на диаграмме рассеивания."},{term:"Диаграмма рассеивания (скаттерплот)",def:"График, где каждая точка соответствует паре значений (x, y). Используется для визуализации связи между двумя числовыми переменными."}],finalQuiz:[{q:"Что откладывается на осях диаграммы рассеивания?",options:["Время и частота","Две числовые переменные","Категории и их частоты","Вероятности"],correct:1,explanation:"На осях диаграммы — две числовые переменные (например, рост и вес).",level:"recognize"},{q:"На диаграмме рассеивания каждая точка это:",options:["Среднее двух переменных","Одно наблюдение с двумя характеристиками","Значение на оси X","Частота"],correct:1,explanation:"Каждая точка на диаграмме рассеивания = одно наблюдение с двумя измеренными значениями.",level:"understand"},{q:"Что означает нелинейная связь?",options:["Нет связи","Связь описывается кривой, не прямой","Один показатель отрицательный","Данные ошибочны"],correct:1,explanation:"Нелинейная связь: зависимость есть, но прямая её не описывает. Например, U-образная кривая.",level:"understand"},{q:"На диаграмме рассеивания точки расположены хаотично без видимой закономерности. Это говорит о:",options:["Сильной корреляции","Отрицательной корреляции","Отсутствии линейной корреляции","Ошибке данных"],correct:2,explanation:"Случайное облако точек → нет линейной зависимости между переменными.",level:"analyze"},{q:"Данные: рост (x) и масса (y) учеников. Как выглядит диаграмма рассеивания?",options:["Точки вдоль нисходящей прямой","Точки вдоль восходящей прямой","Горизонтальная прямая","Вертикальная линия"],correct:1,explanation:"Как правило, чем выше рост, тем больше масса → положительная корреляция, восходящее облако.",level:"apply"}],didYouKnow:["Джон Сноу в 1854 году нанёс на карту случаи холеры в Лондоне — первая в истории диаграмма рассеивания, спасшая жизни."],remember:["Диаграмма рассеивания: каждая точка — одно наблюдение","Оси: две числовые переменные","Направление облака → тип корреляции (положительная/отрицательная)"],selfCheck:[{q:"Что откладывается на осях диаграммы рассеивания?",a:"Две числовые переменные"},{q:"Нет линейной связи означает нет никакой?",a:"Нет, может быть нелинейная связь"},{q:"Зачем строить диаграмму рассеивания, а не просто вычислять среднее?",a:"Диаграмма показывает связь между двумя переменными и выбросы, чего среднее не отражает."}],interactives:[{type:"tap-and-reveal",title:"Определи тип связи",instruction:"Нажми на описание облака точек — узнай тип связи",cols:2,cards:[{content:`Точки тянутся
