Результат: {1,3,5,7,9}`,category:"Дополнение Ā"}]}],illustration:"set_operations.svg",illustrationAlt:"Три диаграммы Эйлера: объединение A∪B, пересечение A∩B, дополнение Ā",remember:["A∪B — объединение: все элементы A или B (без повторов)","A∩B — пересечение: только общие элементы","Ā — дополнение: всё из универсума U, кроме A","|A∪B| = |A| + |B| − |A∩B|"],selfCheck:[{q:"A={1,2,3}, B={3,4,5}. A∩B = ?",a:"{3}"},{q:"|A|=7, |B|=5, |A∩B|=2. |A∪B| = ?",a:"10"},{q:"A = {1,2,3,4}, B = {3,4,5,6}. Найди A∩B и A∪B.",a:"A∩B = {3,4}; A∪B = {1,2,3,4,5,6}."}]},9087:{id:"9087",blockId:"block-3",title:"Свойства операций над множествами",hook:"A ∩ B = B ∩ A всегда. Но почему? Три группы свойств, которые делают работу с множествами предсказуемой.",summary:{what:"Коммутативность: A∪B=B∪A, A∩B=B∩A. Ассоциативность: (A∪B)∪C=A∪(B∪C). Дистрибутивность: A∩(B∪C)=(A∩B)∪(A∩C).",facts:"Законы де Моргана: A∪B с чертой = Ā∩B̄. Пересечение дополнений = дополнение объединения.",dontConfuse:"Дистрибутивность ∩ над ∪ и ∪ над ∩ — обе верны для множеств (в отличие от чисел!).",trick:"Проверяй свойства на примерах с числами. Убедился — применяй к буквам."},trainers:[{id:"t1",type:"case",title:"Законы де Моргана",question:"Перефразируй: «не (A или B)»",options:["(не A) и (не B)","(не A) или (не B)","A и B","не A и B"],correct:0,explanation:"Закон де Моргана: ¬(A∪B) = ¬A∩¬B."},{id:"t2",type:"highlight",title:"Законы де Моргана",text:"Дополнение объединения равно пересечению дополнений: (A∪B)̄ = Ā∩B̄. Дополнение пересечения равно объединению дополнений: (A∩B)̄ = Ā∪B̄.",targets:["Дополнение объединения","пересечению дополнений","Дополнение пересечения","объединению дополнений"],instruction:"Выдели обе формулы де Моргана"}],misconceptions:[{error:"«Для множеств нет распределительного закона»",reality:"Для множеств дистрибутивность выполняется: A∩(B∪C) = (A∩B)∪(A∩C) и A∪(B∩C) = (A∪B)∩(A∪C)."},{error:"«Законы де Моргана — просто дополнительное правило, необязательное»",reality:"Законы де Моргана — базовые законы логики и теории множеств. Без них нельзя упростить выражения вида ¬(A∩B). Встречаются в ЕГЭ и ОГЭ."}],glossary:[{term:"Коммутативность",def:"A∪B = B∪A и A∩B = B∩A — порядок не важен."},{term:"Законы де Моргана",def:"¬(A∪B) = ¬A∩¬B и ¬(A∩B) = ¬A∪¬B."},{term:"Ассоциативность",def:"(A∪B)∪C = A∪(B∪C) — порядок группировки не меняет результат."},{term:"Дистрибутивность",def:"A∩(B∪C) = (A∩B)∪(A∩C). Пересечение распределяется относительно объединения и наоборот."}],finalQuiz:[{q:"A∪B = B∪A — это закон:",options:["Ассоциативности","Коммутативности","Дистрибутивности","де Моргана"],correct:1,explanation:"Коммутативность: A∪B = B∪A. Порядок не важен, как 2+3 = 3+2.",level:"recognize"},{q:"Что равно ¬(A∩B)?",options:["¬A∪¬B","¬A∩¬B","A∪B","A∩B"],correct:0,explanation:"Закон де Моргана: дополнение пересечения = объединение дополнений. ¬(A∩B) = ¬A∪¬B.",level:"understand"},{q:"A∪(B∩C) = (A∪B)∩(A∪C) — это:",options:["Коммутативность","Ассоциативность","Дистрибутивность","Закон де Моргана"],correct:2,explanation:"Дистрибутивность: ∪ распределяется по ∩ точно так же, как умножение по сложению.",level:"understand"},{q:"По закону де Моргана ¬(A∪B) = ?",options:["¬A ∪ ¬B","¬A ∩ ¬B","A ∩ B","¬A ∪ B"],correct:1,explanation:"Первый закон де Моргана: дополнение объединения равно пересечению дополнений.",level:"apply"},{q:"A = {1,2,3}, B = {2,3,4}, U = {1..5}. Проверь закон де Моргана: ¬(A∩B) = ?",options:["{1,2,4,5}","{1,4,5}","{2,3}","{1,2,3,4,5}"],correct:1,explanation:"A∩B={2,3}. ¬(A∩B)=U\\{2,3}={1,4,5}. Аналогично ¬A∪¬B={4,5}∪{1,5}={1,4,5}.",level:"analyze"}],didYouKnow:["Огастес де Морган (1806–1871) — математик и логик, чьи законы используются в каждом программном коде, работающем с условиями."],bridge:"Законы множеств можно видеть! Следующая тема — диаграммы Эйлера как визуальный язык теории множеств.",recap:"← Мы узнали операции. Теперь разберёмся, по каким законам они работают.",illustration:"de_morgan.svg",illustrationAlt:"Два закона де Моргана: ¬(A∩B)=¬A∪¬B и ¬(A∪B)=¬A∩¬B с диаграммами Эйлера",remember:["¬(A∩B) = ¬A∪¬B (первый закон де Моргана)","¬(A∪B) = ¬A∩¬B (второй закон де Моргана)","A∪(B∩C) = (A∪B)∩(A∪C) — дистрибутивность"],selfCheck:[{q:"¬(A∩B) = ?",a:"¬A∪¬B"},{q:"¬(A∪B) = ?",a:"¬A∩¬B"},{q:"Сформулируй оба закона де Моргана для множеств.",a:"1) ¬(A∪B) = ¬A ∩ ¬B; 2) ¬(A∩B) = ¬A ∪ ¬B."}],interactives:[{type:"tap-and-reveal",title:"Определи закон",instruction:"Нажми на формулу — узнай название этого закона",cols:2,cards:[{content:"A∪B = B∪A",category:"Коммутативность"},{content:"(A∪B)∪C = A∪(B∪C)",category:"Ассоциативность"},{content:"¬(A∩B) = ¬A∪¬B",category:"Де Морган"},{content:"A∪(B∩C) = (A∪B)∩(A∪C)",category:"Дистрибутивность"},{content:"¬(A∪B) = ¬A∩¬B",category:"Де Морган"},{content:"A∩(B∪C) = (A∩B)∪(A∩C)",category:"Дистрибутивность"}]}]},9088:{id:"9088",blockId:"block-3",title:"Графическое представление множеств (диаграммы Эйлера)",hook:"Леонард Эйлер, 1768: круги на бумаге решают задачи логики быстрее формул. 250 лет спустя диаграммы Эйлера — стандарт.",summary:{what:"Диаграмма Эйлера: каждое множество — круг. Пересечение кругов = пересечение множеств. Площадь ≈ мощности.",facts:"Для двух множеств: 4 области (только A, только B, A∩B, вне A и B). Для трёх: 8 областей.",dontConfuse:"Диаграмма Эйлера ≠ Диаграмма Венна. Эйлер: области кругов строго соответствуют структуре. Венн: все возможные пересечения всегда нарисованы.",trick:"Заполняй области изнутри наружу: начни с A∩B, потом только A, только B, потом вне обоих."},trainers:[{id:"t1",type:"case",title:"Читаем диаграмму",question:"На диаграмме два круга не пересекаются. Что это значит?",options:["A ⊆ B","A∩B = ∅","A = B","A∪B = ∅"],correct:1,explanation:"Непересекающиеся круги: у множеств нет общих элементов — A∩B = ∅ (несовместные)."},{id:"t2",type:"bucket_sort",title:"Область на диаграмме Эйлера",instruction:"Сопоставь область с её обозначением",items:[{id:"a",text:"Только левый круг"},{id:"b",text:"Только правый круг"},{id:"c",text:"Перекрытие кругов"},{id:"d",text:"Вся закрашенная область"}],buckets:[{id:"onlya",label:"A \\ B",correct:["a"]},{id:"onlyb",label:"B \\ A",correct:["b"]},{id:"inter",label:"A ∩ B",correct:["c"]},{id:"union",label:"A ∪ B",correct:["d"]}]}],misconceptions:[{error:"«Если круги рядом — они всегда пересекаются»",reality:"На диаграмме Эйлера отсутствие пересечения кругов означает пустое пересечение. Близость кругов не означает связи."},{error:"«Диаграмма Эйлера — только для двух множеств»",reality:"Диаграммы работают для любого числа множеств. Для трёх кругов получается 8 областей. Главное — правильно читать пересечения."}],glossary:[{term:"Диаграмма Эйлера",def:"Графическое представление множеств в виде кругов, где перекрытие = пересечение."},{term:"Универсальное множество U",def:"Множество всех рассматриваемых объектов — «рамка» диаграммы Эйлера."},{term:"Несовместные множества",def:"A и B: A∩B = ∅. На диаграмме Эйлера — круги не пересекаются."},{term:"Диаграмма Эйлера–Венна",def:"Графическое изображение множеств в виде кругов внутри прямоугольника (универсальное множество). Пересечения кругов соответствуют общим элементам."}],finalQuiz:[{q:"Круг A внутри круга B на диаграмме означает:",options:["A∩B = ∅","A ⊆ B","A = B","B ⊆ A"],correct:1,explanation:"Если круг A нарисован внутри B — каждый элемент A входит в B, то есть A ⊆ B.",level:"understand"},{q:"Для двух пересекающихся кругов сколько областей на диаграмме?",options:["2","3","4","6"],correct:2,explanation:"Пересекающиеся круги делят плоскость на 4 области: только A, только B, A∩B, ничего.",level:"analyze"},{q:"Два круга: один внутри другого. Что это означает?",options:["A∩B=∅","A=B","A⊆B","B⊆A и A⊆B"],correct:2,explanation:"Вложенный круг визуально показывает, что меньшее множество полностью принадлежит большему.",level:"understand"},{q:"Два круга A и B не пересекаются и оба лежат внутри прямоугольника U. Что означает область прямоугольника вне обоих кругов?",options:["A ∩ B","A ∪ B","Ā ∩ B̄ (элементы не в A и не в B)","A \\ B"],correct:2,explanation:"Область вне обоих кругов — это ¬A ∩ ¬B = ¬(A∪B) по де Моргану.",level:"analyze"},{q:"На диаграмме Эйлера область A∩B закрашена. Для каких данных это верно? |U|=20, |A|=8, |B|=7, |A∩B|=3. Закрашенная область содержит элементов:",options:["3","5","12","15"],correct:0,explanation:"|A∩B| = 3 элемента — именно они в пересечении кругов.",level:"apply"}],didYouKnow:["Леонард Эйлер (1707–1783) — автор более 800 научных работ. В 1736 году он основал теорию графов, а в 1748-м предложил диаграммы для наглядного изображения множеств."],recap:"← Законы множеств изучены. Диаграммы Эйлера — способ сделать их наглядными.",illustration:"euler_diagram.svg",illustrationAlt:"Диаграмма Эйлера с четырьмя областями: только A, только B, A∩B, вне A и B",remember:["Пересекающиеся круги: 4 области (только A, только B, A∩B, ни то ни другое)","Круг A внутри B → A ⊆ B","Непересекающиеся круги → A∩B = ∅"],selfCheck:[{q:"Сколько областей у двух пересекающихся кругов?",a:"4"},{q:"Что означает, если один круг внутри другого?",a:"Подмножество"},{q:"На диаграмме два круга пересекаются. Сколько различимых областей образуется (включая область вне кругов)?",a:"4 области: только A, только B, A∩B, вне A и B."}],interactives:[{type:"compare-two",title:"Диаграмма Эйлера: объединение vs пересечение",left:{label:"A ∪ B — Объединение",items:["Всё, что есть в A или B","Закрашена вся область","|A ∪ B| = |A| + |B| − |A ∩ B|","Элемент входит хоть в одно"],detail:"На диаграмме — оба круга закрашены целиком, включая пересечение."},right:{label:"A ∩ B — Пересечение",items:["Только общие элементы","Закрашена только середина","|A ∩ B| ≤ min(|A|,|B|)","Элемент входит в оба"],detail:"На диаграмме — закрашена только область перекрытия двух кругов."},keyDifference:"∪ — «или» (хотя бы одно), ∩ — «и» (одновременно оба)."}],bridge:"Научимся решать задачи на подсчёт элементов, используя формулы для множеств."},9089:{id:"9089",blockId:"block-3",title:"Решение практических задач",hook:"В классе 30 человек. 18 любят математику, 15 — физику, 8 — оба предмета. Сколько не любят ни то, ни другое? Диаграмма даёт ответ мгновенно.",summary:{what:"Формула включений-исключений: |A∪B| = |A| + |B| − |A∩B|. Число «ни A, ни B» = |U| − |A∪B|.",facts:"Алгоритм: 1) определи |A|, |B|, |A∩B|; 2) найди |A∪B|; 3) вычти из |U|.",dontConfuse:"|A∪B| ≠ |A| + |B|. Элементы пересечения считаются один раз, не дважды.",trick:"Нарисуй диаграмму и заполни числа областей. Проверка: сумма всех областей = |U|."},trainers:[{id:"t1",type:"case",title:"Задача с кружками",question:"Из 40 учеников: 24 занимаются спортом, 18 — музыкой, 10 — и тем, и другим. Только спортом:",options:["14","24","8","34"],correct:0,explanation:"Только спорт = 24 − 10 = 14 (исключаем тех, кто ещё и в музыке)."},{id:"t2",type:"highlight",title:"Формула включений-исключений",text:"Чтобы найти число элементов в объединении двух множеств, нужно сложить мощности обоих множеств и вычесть мощность их пересечения: |A∪B| = |A| + |B| − |A∩B|.",targets:["сложить мощности обоих множеств","вычесть мощность их пересечения","|A∪B| = |A| + |B| − |A∩B|"],instruction:"Выдели шаги формулы"}],misconceptions:[{error:"«Сложить A и B, чтобы получить тех, кто в A или B»",reality:"При наивном сложении пересечение входит в оба слагаемых — его учитывают два раза. Нужно: |A| + |B| − |A∩B|."},{error:"«Формула |A∪B| = |A|+|B|−|A∩B| работает только для двух множеств»",reality:"Для трёх множеств есть расширение: |A∪B∪C| = |A|+|B|+|C|−|A∩B|−|A∩C|−|B∩C|+|A∩B∩C|. Принцип тот же — убрать двойной счёт."}],glossary:[{term:"Формула включений-исключений",def:"|A∪B| = |A| + |B| − |A∩B|. Компенсирует двойной счёт пересечения."},{term:"Дополнение до U",def:"|U|−|A∪B| — число элементов, не вошедших ни в A, ни в B."},{term:"Мощность множества",def:"|A| — количество элементов в множестве A."},{term:"Принцип дополнения",def:"|Ā| = |U| − |A|. Число элементов не в A равно мощности U минус мощность A. Используется для упрощения подсчёта."}],finalQuiz:[{q:"|A|=10, |B|=8, |A∩B|=3. |A∪B| = ?",options:["18","15","21","13"],correct:1,explanation:"Формула |A∪B| = |A|+|B|−|A∩B| нужна чтобы не посчитать пересечение дважды. 10+8−3 = 15.",level:"understand"},{q:"|U|=50, |A∪B|=35. Число элементов вне A и B:",options:["35","15","50","85"],correct:1,explanation:"Вне A и B = |U|−|A∪B| = 50−35 = 15.",level:"apply"},{q:"В классе 25 учеников: 12 — математика, 10 — физика, 5 — оба. Ни то ни другое:",options:["3","8","17","22"],correct:1,explanation:"Ни то ни другое = |U|−|A∪B|. Сначала найди |A∪B| = 12+10−5 = 17. Потом 25−17 = 8.",level:"analyze"},{q:"В классе 30 учеников: 18 занимаются спортом, 14 — музыкой, 8 — и тем и другим. Сколько занимаются только одним занятием?",options:["16","24","12","20"],correct:0,explanation:"Только спорт: 18−8=10. Только музыка: 14−8=6. Итого только одним: 10+6=16.",level:"apply"},{q:"|U|=40, |A|=15, |B|=20, |A∩B|=5. Сколько элементов не входят ни в A, ни в B?",options:["5","10","15","30"],correct:1,explanation:"|A∪B|=15+20−5=30. Вне A и B: 40−30=10.",level:"apply"}],didYouKnow:["Формула включений-исключений обобщается на n множеств. В 1854 году её систематически описал Джозеф Сильвестр — сейчас она используется в комбинаторике и программировании."],remember:["|A∪B| = |A| + |B| − |A∩B|","Вне A и B = |U| − |A∪B|","Не забудь вычесть пересечение — иначе двойной счёт"],selfCheck:[{q:"|A|=8, |B|=6, |A∩B|=3. |A∪B| = ?",a:"11"},{q:"|U|=40, |A∪B|=25. Вне A и B = ?",a:"15"},{q:"Запиши формулу включений-исключений для двух множеств.",a:"|A∪B| = |A| + |B| − |A∩B|."}],interactives:[{type:"tap-and-reveal",title:"Задачи на множества: подсказки",instruction:"Нажми на задачу — узнай метод решения",cols:1,cards:[{front:"«Сколько учеников занимаются только математикой?»",back:"Формула включений-исключений: |M только| = |M| − |M ∩ Ф|. Вычти тех, кто занимается обоими."},{front:"«Сколько всего занимаются хотя бы одним предметом?»",back:"|M ∪ Ф| = |M| + |Ф| − |M ∩ Ф|. Складываем оба, вычитаем пересечение."},{front:"«Верно ли, что A ⊂ B?»",back:"Проверь: каждый элемент A есть в B? Если да — подмножество. Один контрпример опровергает."}]}],bridge:"Следующая большая тема — вероятность случайного события. Множества станут нашим инструментом.",recap:"Ты решал задачи на подсчёт элементов через формулу включений-исключений.",illustration:"inclusion_exclusion.svg",illustrationAlt:"Формула |A∪B|=|A|+|B|−|A∩B|: пример |A|=20, |B|=15, пересечение=7, итого=28"},9090:{id:"9090",blockId:"block-4",title:"Элементарные события. Случайные события",hook:"Бросок кубика: выпало 4 — одно элементарное событие. «Выпало чётное» — случайное событие, объединяющее несколько элементарных.",summary:{what:"Пространство исходов Ω — все возможные результаты. Элементарное событие — один исход. Событие A — подмножество Ω.",facts:"Событие произошло, если произошёл один из его элементарных исходов. P(Ω) = 1, P(∅) = 0.",dontConfuse:"Элементарное событие ≠ событие с одним исходом. Любое событие — множество исходов, в т.ч. из одного.",trick:"Нарисуй Ω, выдели A кругом — это диаграмма вероятностного эксперимента."},trainers:[{id:"t1",type:"case",title:"Пространство исходов",question:"Бросают кубик. Событие A = {выпадет нечётное}. Сколько элементарных исходов в A?",options:["2","3","4","6"],correct:1,explanation:"Нечётные на кубике: 1, 3, 5 — три элементарных исхода."},{id:"t2",type:"highlight",title:"Пространство элементарных событий",text:"Пространство элементарных событий Ω — множество всех возможных исходов опыта. Каждый исход несовместен с остальными. Случайное событие — любое подмножество Ω.",targets:["всех возможных исходов","несовместен с остальными","любое подмножество Ω"],instruction:"Выдели определения Ω и случайного события"}],misconceptions:[{error:"«Элементарное событие — одно конкретное число»",reality:"Элементарный исход — один результат эксперимента (например, выпало «3»). Событие — набор таких исходов."},{error:"«Пространство исходов всегда конечно»",reality:"Пространство исходов может быть бесконечным (например, расстояние до места падения иглы на линейке). В 8 классе мы работаем только с конечными Ω."}],glossary:[{term:"Пространство исходов Ω",def:"Множество всех возможных результатов случайного эксперимента."},{term:"Элементарный исход",def:"Один конкретный неделимый результат случайного эксперимента."},{term:"Случайное событие",def:"Подмножество пространства исходов — набор элементарных исходов."},{term:"Достоверное событие",def:"Событие, которое обязательно произойдёт при данных условиях: P(Ω)=1. Противоположно невозможному событию P(∅)=0."}],finalQuiz:[{q:"Кубик. Ω = ?",options:["{1,2}","{1,2,3,4,5,6}","{чётные}","{0..6}"],correct:1,explanation:"Пространство исходов — все возможные результаты. При броске кубика: {1,2,3,4,5,6}.",level:"recognize"},{q:"Событие «выпало больше 4» = ?",options:["{4,5,6}","{5,6}","{6}","{4}"],correct:1,explanation:"Событие — подмножество Ω. «Больше 4» = {5,6}, так как 5 и 6 больше 4.",level:"understand"},{q:"Пространство исходов при броске монеты Ω = ?",options:["{0,1}","{О,Р}","{О}","{Орёл,Решка,Ребро}"],correct:1,explanation:"Монета имеет 2 исхода: орёл (О) и решка (Р). Это и есть пространство исходов.",level:"recognize"},{q:"Бросают два кубика. Событие A = «сумма равна 2». Число благоприятных элементарных исходов:",options:["1","2","3","6"],correct:0,explanation:"Сумма 2 только при (1;1) — один исход.",level:"apply"},{q:"Кубик. A = {1,3,5}, B = {2,4,6}. Событие A∪B = ?",options:["∅","{1,2,3,4,5,6} = Ω","{3}","{1,2}"],correct:1,explanation:"A∪B объединяет все чётные и нечётные грани — это всё пространство Ω.",level:"analyze"}],didYouKnow:["Понятие «пространство элементарных событий» формализовал Андрей Колмогоров в 1933 году, создав аксиоматическую теорию вероятностей."],bridge:"Мы разобрались, что такое исходы и события. Следующий шаг — как работать с ними на практике.",illustration:"sample_space.svg",illustrationAlt:"Пространство Ω={1,2,3,4,5,6}: событие A={2,4,6} выделено, P(A)=3/6=0.5",remember:["Ω — пространство исходов: все возможные результаты","Элементарный исход — один конкретный результат","Случайное событие — подмножество Ω","Достоверное: P = 1. Невозможное: P = 0. Случайное: 0 < P < 1"],selfCheck:[{q:"Ω при броске кубика = ?",a:"{1,2,3,4,5,6}"},{q:"A = {выпадет 7}. Тип события?",a:"Невозможное"},{q:"Что такое пространство элементарных исходов Ω?",a:"Множество всех возможных результатов случайного опыта."}],interactives:[{type:"compare-two",title:"Достоверное vs Невозможное событие",left:{label:"Достоверное событие",items:["Всегда происходит","P = 1","Пример: «выпадет число ≤6» при броске кубика","Занимает всё пространство Ω"],detail:"Достоверное событие совпадает со всем пространством элементарных исходов."},right:{label:"Невозможное событие",items:["Никогда не происходит","P = 0","Пример: «выпадет 7» при броске кубика","Пустое множество ∅"],detail:"Невозможное событие — пустое множество. Ни один исход ему не благоприятствует."},keyDifference:"Достоверное P=1, невозможное P=0. Все остальные события: 0 < P < 1."}]},9091:{id:"9091",blockId:"block-4",title:"Вероятность событий. Равновозможные исходы",hook:"P = m/n. Три символа, изменивших науку. Пьер-Симон Лаплас, 1812.",summary:{what:"Классическое определение вероятности: P(A) = m/n, где m — число благоприятных исходов, n — общее число равновозможных исходов.",facts:"0 ≤ P(A) ≤ 1. P(Ω) = 1. P(∅) = 0. Исходы называются равновозможными, если нет оснований считать один более вероятным, чем другой.",dontConfuse:"Число благоприятных исходов m ≠ вероятность P. Вероятность — это доля m/n, а не абсолютное число.",trick:"Алгоритм: 1) Определи Ω, посчитай n. 2) Опиши событие A, посчитай m. 3) P(A) = m/n."},trainers:[{id:"t1",type:"case",title:"Формула Лапласа",question:"Бросают кубик. P(выпадет чётное) = ?",options:["1/2","1/3","2/3","1/6"],correct:0,explanation:"Чётные: {2,4,6} — 3 исхода. Всего n=6. P = 3/6 = 1/2."},{id:"t2",type:"highlight",title:"Классическое определение вероятности",text:"Если все элементарные исходы опыта равновозможны, то вероятность события A равна отношению числа благоприятных исходов m к общему числу исходов n: P(A) = m/n. Вероятность всегда принимает значения от 0 до 1 включительно.",targets:["равновозможны","P(A) = m/n","числа благоприятных исходов m к общему числу исходов n","от 0 до 1 включительно"],instruction:"Выдели формулу и ключевые условия её применения"},{id:"t3",type:"bucket_sort",title:"Благоприятные и неблагоприятные исходы",instruction:"Брошен кубик, событие A = «выпало число > 3». Разбей исходы по группам",items:[{id:"i1",text:"4"},{id:"i2",text:"5"},{id:"i3",text:"6"},{id:"i4",text:"1"},{id:"i5",text:"2"},{id:"i6",text:"3"}],buckets:[{id:"fav",label:"Благоприятные (A)",correct:["i1","i2","i3"]},{id:"unfav",label:"Неблагоприятные (не A)",correct:["i4","i5","i6"]}],feedbackOk:"Верно! m=3 благоприятных из n=6, P(A)=3/6=0.5",feedbackWrong:"Событие A = «> 3» означает исходы {4, 5, 6}."}],misconceptions:[{error:"«Если событие не произошло 5 раз подряд, в следующий раз оно точно произойдёт»",reality:"Каждый опыт независим. Монета «не помнит» прошлых результатов. Вероятность орла всегда 1/2, сколько бы решек ни выпало подряд."},{error:"«P(A) = m/n работает для любых событий»",reality:"Формула применима только при равновозможных исходах. Если исходы не равновозможны (нечестная монета, нечестный кубик), нужен другой подход."}],glossary:[{term:"Классическое определение вероятности",def:"P(A) = m/n, где m — число благоприятных равновозможных исходов, n — общее число исходов."},{term:"Равновозможные исходы",def:"Исходы, нет оснований считать один более вероятным, чем другой (симметричная монета, честный кубик)."},{term:"Благоприятный исход",def:"Элементарный исход, при котором событие A происходит (входящий в A)."},{term:"Случайный выбор",def:"Выбор, при котором каждый элемент имеет равную вероятность быть выбранным."}],finalQuiz:[{q:"В урне 2 белых и 8 чёрных шаров. P(белый) = ?",options:["1/4","1/5","2/8","4/5"],correct:1,explanation:"m = 2, n = 10. P = 2/10 = 1/5.",level:"recognize"},{q:"P(A) = 0.4. Сколько благоприятных исходов, если всего n = 25?",options:["4","10","15","25"],correct:1,explanation:"m = P·n = 0.4·25 = 10.",level:"apply"},{q:"Кубик бросают 1 раз. P(выпадет больше 4) = ?",options:["1/6","1/3","1/2","2/3"],correct:1,explanation:"Больше 4: {5, 6} — 2 исхода. P = 2/6 = 1/3.",level:"understand"},{q:"Вытащили карту из колоды (36 карт). P(туз) = ?",options:["1/9","1/4","4/36","1/36"],correct:2,explanation:"Тузов 4, всего 36 карт. P = 4/36 = 1/9. Ответ 4/36 = 1/9 тоже верен.",level:"apply"},{q:"Монету бросили 5 раз — 5 орлов. P(орёл) при 6-м броске = ?",options:["1/64","1/2","5/6","1"],correct:1,explanation:"Каждый бросок независим. P(орёл) = 1/2 всегда, независимо от прошлого.",level:"analyze"}],didYouKnow:["Пьер-Симон Лаплас сформулировал классическое определение вероятности в книге «Аналитическая теория вероятностей» в 1812 году. Формула P = m/n была известна и раньше, но именно он придал ей строгую форму."],bridge:"Классическая формула работает, когда исходы равновозможны. Следующий шаг — научиться складывать и умножать вероятности сложных событий.",remember:["P(A) = m/n — только при равновозможных исходах","m — число благоприятных исходов, n — общее число","0 ≤ P(A) ≤ 1 всегда","P(Ω) = 1, P(∅) = 0"],selfCheck:[{q:"Кубик. P(выпадет 1 или 6) = ?",a:"2/6 = 1/3"},{q:"Что называют равновозможными исходами?",a:"Исходы, у которых нет оснований считать один более вероятным, чем другой"},{q:"В урне 1 красный и 3 синих. P(красный) = ?",a:"1/4"}],interactives:[{type:"compare-two",title:"Благоприятные исходы vs Неблагоприятные",left:{label:"Благоприятные исходы (m)",items:["Входят в событие A","Считаются в числителе","Пример: {2,4,6} для «чётное»","m ≤ n всегда"],detail:"Это исходы, при которых A произошло."},right:{label:"Неблагоприятные исходы (n−m)",items:["Не входят в A","При них A не произошло","Пример: {1,3,5} для «чётное»","Входят в дополнение Ā"],detail:"Неблагоприятные исходы формируют противоположное событие Ā."},keyDifference:"P(A) = m/n. P(Ā) = (n−m)/n. Вместе: P(A)+P(Ā) = 1."}],illustration:"equal_probability.svg",illustrationAlt:"Шесть граней кубика: 2 синих (благоприятных), 4 серых; формула P(A)=m/n=2/6=1/3"},9092:{id:"9092",blockId:"block-4",title:"Практическая работа: опыты с равновозможными событиями",hook:"Теория предсказывает P = 1/6. Проведи 60 бросков и проверь. Разница между теорией и практикой — это и есть суть статистики.",summary:{what:"Эксперимент: много испытаний с равновозможными исходами. Фиксируй результаты, считай частоты, сравнивай с P.",facts:"Чем больше испытаний — тем ближе частота к вероятности (закон больших чисел).",dontConfuse:"Малое число опытов даёт нестабильные частоты. Не делай выводы по 5–10 испытаниям.",trick:"Организуй данные в таблицу: исход — число раз — частота. Построй гистограмму."},trainers:[{id:"t1",type:"case",title:"Интерпретация опыта",question:"Бросили монету 200 раз, орёл выпал 108 раз. Частота орла:",options:["0.5","0.54","108","0.46"],correct:1,explanation:"Частота = 108/200 = 0.54. Близко к теоретическому 0.5, небольшое отклонение — нормально."},{id:"t2",type:"highlight",title:"Экспериментальная частота",text:"Экспериментальная (относительная) частота — это отношение числа появлений события к общему числу испытаний: P*(A) = k/N. При больших N она стабилизируется.",targets:["число появлений события","общему числу испытаний","P*(A) = k/N","При больших N","стабилизируется"],instruction:"Выдели определение и свойство"}],misconceptions:[{error:"«Если частота ≠ 0.5 при 10 бросках — монета нечестная»",reality:"При малом числе испытаний отклонение нормально. Нужны сотни испытаний для надёжного вывода."},{error:"«10 опытов достаточно для надёжной оценки вероятности»",reality:"При 10 опытах отклонение от истинной вероятности может быть огромным. Для P≈0.5 нужно хотя бы 50–100 испытаний, чтобы частота была близка к вероятности."}],glossary:[{term:"Статистическая устойчивость",def:"Свойство частоты: при большом числе испытаний она мало меняется от серии к серии."},{term:"Относительная частота",def:"m/n — доля испытаний, в которых событие наступило. При n→∞ стремится к теоретической вероятности."},{term:"Частота события",def:"m/n — доля испытаний, в которых событие произошло. При n→∞ стремится к P(A)."},{term:"Закон больших чисел",def:"При большом числе независимых испытаний относительная частота события приближается к его теоретической вероятности."}],finalQuiz:[{q:"60 бросков кубика, шесть выпало 8 раз. Частота ≈",options:["0.13","0.17","0.8","6/8"],correct:0,explanation:"8/60 ≈ 0.133 ≈ 0.13. Частота = число наступлений / число испытаний.",level:"apply"},{q:"Почему нельзя судить о вероятности по 5–10 испытаниям?",options:["Слишком мало времени","Малое число испытаний даёт нестабильные частоты","Монета нечестная","Формула P=m/n не работает"],correct:1,explanation:"При малом числе испытаний случайный разброс велик. Нужно ≥50–100 испытаний для оценки.",level:"analyze"},{q:"Кубик бросали 300 раз. Шестёрка выпала 54 раза. Чему равна частота шестёрки?",options:["0.501","0.5","501","0.499"],correct:0,explanation:"Частота = 54/300 = 0.18. Теоретическая вероятность = 1/6 ≈ 0.167. При 300 бросках они ещё не очень близки.",level:"apply",answer:"0.18"},{q:"Кубик бросили 120 раз. Шестёрка выпала 25 раз. Частота = ?",options:["25/120 ≈ 0.208","1/6 ≈ 0.167","25/6 ≈ 4.2","120/25 = 4.8"],correct:0,explanation:"Частота = число наступлений / общее число испытаний = 25/120 ≈ 0.208.",level:"apply"},{q:"При увеличении числа испытаний частота события стремится к:",options:["Нулю","Единице","Теоретической вероятности","Числу испытаний"],correct:2,explanation:"Закон больших чисел: с ростом числа опытов частота приближается к теоретической вероятности.",level:"understand"}],didYouKnow:["Джон Кернс в 1940-х бросал монету 10 000 раз: орёл выпал 5067 раз (50.67%). Закон больших чисел работает."],recap:"← В прошлой теме появились пространство исходов и события. Теперь — опыты и частоты.",remember:["Частота = число наступлений / число испытаний","При n → ∞ частота → вероятность (закон больших чисел)","5–10 испытаний недостаточно для оценки вероятности"],selfCheck:[{q:"100 бросков, орёл 47 раз. Частота = ?",a:"0.47"},{q:"При каком n можно доверять частоте?",a:"От 50–100 и больше"},{q:"Монету бросили 500 раз: орёл — 247 раз. Чему равна частота орла и как она соотносится с теоретической вероятностью?",a:"Частота = 247/500 = 0.494 ≈ 0.5 = теоретической вероятности."}],interactives:[{type:"probability-experiment-sim",title:"Монета и кубик: частота сходится к вероятности"}],bridge:"Перейдём к вычислению вероятностей по классической формуле P = m/n.",illustration:"frequency_convergence.svg",illustrationAlt:"График: частота орла при бросках монеты стремится к 0.5 с ростом числа опытов n"},9093:{id:"9093",blockId:"block-4",title:"Решение задач на вычисление вероятностей",hook:"В урне 3 красных и 7 синих шара. Какова вероятность вытащить красный? P = 3/10. Просто — но только если видишь структуру.",summary:{what:"Схема: 1) определи Ω и n = |Ω|; 2) выдели благоприятные исходы m; 3) P(A) = m/n.",facts:"Нужно, чтобы все исходы были равновозможны. Иначе формула классической вероятности не работает.",dontConfuse:"P(A) = m/n применимо только при равновозможных исходах. Не применяй к нечестному кубику.",trick:"Переформулируй событие через исходы: «красный» = {1-й красный, 2-й красный, 3-й красный}."},trainers:[{id:"t1",type:"case",title:"Урна с шарами",question:"В урне 4 белых и 6 чёрных шара. P(вытащить белый) = ?",options:["4/6","4/10","6/10","1/4"],correct:1,explanation:"m = 4 (белых), n = 10 (всего). P = 4/10 = 0.4."},{type:"highlight",title:"Найди верную вероятность",instruction:"В коробке 4 синих и 6 красных карандаша. Какова вероятность выбрать синий?",items:["4/6","6/10","4/10","6/4"],correct:2,explanation:"P = m/n = 4/(4+6) = 4/10. Всего 10 карандашей, синих — 4."},{type:"slider_rate",id:"slider_prob_9093",title:"Оцени вероятность",instruction:"Установи ползунок на значение P(A) для каждой ситуации",tasks:[{label:"Урна: 3 красных, 7 синих. P(красный) = ?",min:0,max:1,step:.05,correct:.3,tolerance:.05,feedbackOk:"Верно! P = 3/10 = 0.3",feedbackWrong:"P = m/n = 3/10 = 0.3"},{label:"Кубик. P(чётное) = ?",min:0,max:1,step:.05,correct:.5,tolerance:.05,feedbackOk:"P = 3/6 = 0.5!",feedbackWrong:"Чётных граней 3: {2,4,6}. P = 3/6 = 0.5"}]}],misconceptions:[{error:"«Формула P = m/n всегда применима»",reality:"Только при равновозможных исходах. Если шары разного веса — исходы не равновозможны."},{error:"«Вероятность можно вычислить только по формуле P=m/n»",reality:"Классическая формула P=m/n работает только при равновозможных исходах. Для неравновозможных нужны другие подходы (частотный, геометрический и др.)."}],glossary:[{term:"Символ P",example:"P(орёл) = 0.5 означает: «вероятность выпадения орла равна 0.5».",def:"P (от латинского Probabilitas — вероятность) — стандартное обозначение вероятности события. P(A) читается как «вероятность события A». Значение P всегда от 0 (невозможное) до 1 (достоверное)."},{term:"Формула классической вероятности",example:"Урна: 3 красных, 7 синих. P(красный) = 3/10 = 0.3.",def:"P(A) = m/n, где m — число исходов, благоприятствующих событию A, n — общее число равновозможных исходов."},{term:"Классическая вероятность",def:"P(A) = m/n при условии равновозможности всех n исходов."},{term:"Число благоприятных исходов m",def:"Количество исходов из Ω, при которых событие A наступает. Используется в P(A) = m/n."},{term:"Равновозможные исходы",def:"Исходы, у каждого из которых вероятность одинакова: P(ωᵢ) = 1/n."}],finalQuiz:[{q:"Урна: 5 синих, 3 красных, 2 зелёных. P(синий) = ?",options:["1/2","5/10","3/10","5/8"],correct:1,explanation:"P = m/n. m = 5 (синих), n = 10 (всего). P = 5/10 = 1/2.",level:"apply"},{q:"P(A) = 0. Событие A:",options:["Маловероятное","Невозможное","Достоверное","Случайное"],correct:1,explanation:"P(A) = 0 — событие никогда не произойдёт, это невозможное событие.",level:"recognize"},{q:"В колоде 52 карты. P(не туз) = ?",options:["4/52","48/52","1/13","13/52"],correct:1,explanation:"P(не туз) = (52-4)/52 = 48/52. Или: 1 − P(туз) = 1 − 4/52 = 48/52.",level:"apply"},{q:"В урне 4 красных и 6 синих. Вытащили красный, не вернули. P(красный снова) = ?",options:["4/10","3/9 = 1/3","4/9","3/10"],correct:1,explanation:"После вытащивания: осталось 3 красных из 9 шаров. P = 3/9 = 1/3.",level:"apply"},{q:"P(A) = 0.25. Через какую формулу выгоднее считать P(Ā)?",options:["1 − P(A) = 0.75","P(A)/2 = 0.125","1/P(A) = 4","P(A)² = 0.0625"],correct:0,explanation:"P(Ā) = 1 − P(A) = 1 − 0.25 = 0.75. Метод дополнения проще прямого подсчёта.",level:"analyze"}],didYouKnow:["Модель «урна с шарами» — стандартная в теории вероятностей. Якоб Бернулли использовал её для доказательства своей теоремы в 1713 году."],bridge:"Классическая вероятность — основа. Дальше — более сложные задачи: дерево исходов и комбинаторика.",recap:"← Мы проводили опыты и смотрели на частоты. Следующий шаг — формула классической вероятности.",illustration:"probability_formula.svg",illustrationAlt:"Формула P(A)=m/n с подписями m (благоприятных) и n (всего); пример с урной",remember:["P(A) = m/n, m — благоприятных, n — всего равновозможных","0 ≤ P(A) ≤ 1 всегда","P(∅) = 0, P(Ω) = 1","P — от латинского Probabilitas (вероятность)"],selfCheck:[{q:"Урна: 3 красных, 7 синих. P(красный) = ?",a:"3/10"},{q:"P(A) = 0 означает?",a:"Событие невозможно"},{q:"В колоде 52 карты. Тянут 2 без возврата. P(оба туза) = ?",a:"(4/52)·(3/51) = 12/2652 = 1/221 ≈ 0.0045."}],interactives:[{type:"tap-and-reveal",title:"Классическая вероятность: шаги",instruction:"Нажми на шаг — узнай как действовать",cols:1,cards:[{front:"1️⃣ Найди n — число всех равновозможных исходов",back:"Перечисли или посчитай: бросок кубика → n=6; две монеты → n=4 (ОО, ОР, РО, РР)"},{front:"2️⃣ Найди m — число благоприятных исходов",back:"Сколько исходов из n соответствуют событию A? Пример: «чётное» на кубике → m=3 (2,4,6)"},{front:"3️⃣ Вычисли P(A) = m/n",back:"P(чётное) = 3/6 = 0,5. Результат всегда от 0 до 1."},{front:"✅ Проверь себя",back:"P ∈ [0;1]? Сумма вероятностей всех исходов = 1? Если нет — ошибка в подсчёте."}]}]},9094:{id:"9094",blockId:"block-5",title:"Дерево",hook:"Турнир, где каждый играет с каждым. Сколько партий? Граф-дерево даст ответ за секунду.",summary:{what:"Дерево — связный граф без циклов. Используется для наглядного перечисления последовательных исходов случайного опыта и подсчёта вариантов.",facts:"В дереве с n вершинами ровно n−1 рёбер. Из корня до каждой вершины ведёт единственный путь. Листья — конечные исходы эксперимента.",dontConfuse:"Дерево случайного опыта (граф) ≠ математическое дерево в общем смысле. Здесь у дерева есть выделенный корень.",trick:"Строй дерево слева направо: корень → первый шаг → второй шаг → … Каждая ветвь = один исход всего опыта."},trainers:[{id:"t1",type:"case",title:"Подсчёт по дереву",question:"Монету бросают 2 раза. Дерево: из корня 2 ветви (О/Р), из каждой ещё 2 (О/Р). Сколько листьев?",options:["2","3","4","6"],correct:2,explanation:"2 × 2 = 4 листа: ОО, ОР, РО, РР. Это правило умножения в действии."},{id:"t2",type:"highlight",title:"Свойства дерева",text:"Дерево — граф, в котором любые две вершины соединены единственным путём. Из этого следует: дерево с n вершинами содержит ровно n−1 рёбер, дерево связно и не содержит циклов. При изображении случайного опыта каждый путь от корня до листа соответствует одному исходу эксперимента.",targets:["единственным путём","n вершинами содержит ровно n−1 рёбер","не содержит циклов","путь от корня до листа соответствует одному исходу"],instruction:"Выдели ключевые свойства дерева"},{id:"t3",type:"highlight",title:"Что такое дерево?",instruction:"Выбери верное утверждение о дереве как графе",items:["Дерево — любой граф без изолированных вершин","Дерево — связный граф без циклов; n вершин, n−1 рёбер","Дерево — граф, в котором все вершины соединены с одной","Дерево — граф с максимально возможным числом рёбер"],correct:1,explanation:"Связность + отсутствие циклов + n−1 рёбер — три равносильных условия. Вместе они определяют дерево."}],misconceptions:[{error:"«Любой граф — дерево»",reality:"Дерево — граф без циклов. Если в графе есть цикл (можно вернуться в вершину по другому пути), это уже не дерево."},{error:"«Дерево с n вершинами имеет n рёбер»",reality:"В дереве всегда n−1 рёбер. Одно лишнее ребро создаст цикл и «сломает» дерево."}],glossary:[{term:"Дерево (граф)",def:"Связный граф без циклов. С n вершинами содержит n−1 рёбер."},{term:"Корень дерева",def:"Выделенная начальная вершина, от которой ведётся построение дерева опыта."},{term:"Лист дерева",def:"Вершина степени 1, кроме корня. Соответствует конечному исходу эксперимента."},{term:"Правило умножения",def:"Если первое действие можно выполнить m способами, а второе — n способами, то оба последовательно — m·n способами."},{term:"Диаметр дерева",def:"Длина наибольшего пути между двумя листьями дерева (число рёбер в этом пути)."},{term:"Бинарное дерево",def:"Дерево, в котором каждая вершина имеет не более двух потомков (дочерних вершин)."}],finalQuiz:[{q:"Дерево имеет 7 вершин. Сколько в нём рёбер?",options:["7","6","8","14"],correct:1,explanation:"Рёбер = n−1 = 7−1 = 6.",level:"recognize"},{q:"Кубик бросают 2 раза. Сколько листьев в дереве всех исходов?",options:["12","36","6","12"],correct:1,explanation:"6 × 6 = 36 листьев по правилу умножения.",level:"apply"},{q:"Граф связен, 5 вершин, 5 рёбер. Это дерево?",options:["Да","Нет — у дерева 4 ребра","Да, если нет петель","Нет, мало вершин"],correct:1,explanation:"Дерево с 5 вершинами имеет ровно 4 ребра. 5 рёбер — лишнее, значит есть цикл, это не дерево.",level:"analyze"},{q:"Для описания 2 бросков монеты нарисовали дерево. Сколько вершин (включая корень)?",options:["4","6","7","3"],correct:2,explanation:"Корень + 2 вершины 1-го уровня + 4 листа = 7 вершин.",level:"apply"},{q:"Что означает «путь от корня до листа» в дереве случайного опыта?",options:["Количество шагов","Один конкретный исход всего эксперимента","Вероятность события","Число ветвей"],correct:1,explanation:"Каждый путь корень→лист — один полный сценарий опыта (все шаги последовательно).",level:"understand"}],didYouKnow:["Деревья — самая популярная структура данных в программировании. Файловая система на вашем компьютере, HTML-структура сайта, поиск в шахматном движке — всё это деревья."],bridge:"Дерево — инструмент перечисления. Следующий шаг — подсчёт вероятностей вдоль ветвей дерева: правило умножения вероятностей.",remember:["Дерево — связный граф без циклов","n вершин → n−1 рёбер","Каждый путь корень→лист = один исход опыта","Число листьев находят правилом умножения"],selfCheck:[{q:"Дерево с 10 вершинами. Сколько рёбер?",a:"9"},{q:"Чем лист дерева отличается от других вершин?",a:"Лист имеет степень 1 (одно ребро), это конечная вершина без потомков"},{q:"Два кубика. Сколько листьев в дереве исходов?",a:"6×6 = 36"}],interactives:[{type:"tree-diagram-builder",title:"Построй дерево двух бросков монеты"}],illustration:"tree_graph.svg",illustrationAlt:"Дерево из 7 вершин и 6 рёбер: связный граф без циклов, единственный путь между вершинами"},9095:{id:"9095",blockId:"block-5",title:"Свойства дерева",hook:"Убери любое ребро — граф распадётся на два. Добавь ребро — появится цикл. Почему дерево живёт ровно на одно ребро меньше, чем вершин?",summary:{what:"Дерево с n вершинами: ровно n−1 рёбер, связное, без циклов. Любые два из трёх свойств влекут третье.",facts:"Минимальное число рёбер для связного графа = n−1 (это дерево). Добавь ребро — появится цикл.",dontConfuse:"Лес ≠ дерево. Лес — несвязный граф без циклов (несколько деревьев).",trick:"Хочешь проверить, дерево ли граф: посчитай вершины и рёбра. n вершин и n−1 рёбер + связность = дерево."},trainers:[{id:"t1",type:"case",title:"Проверяем свойство",question:"Граф: 6 вершин, 5 рёбер, связный. Это дерево?",options:["Да","Нет, нужно 6 рёбер","Нет, нужно 7 рёбер","Нельзя определить"],correct:0,explanation:"n=6, рёбер = n−1 = 5, связный → дерево. Все условия выполнены."},{id:"t2",type:"highlight",title:"Свойства дерева вероятностей",text:"В дереве вероятностей сумма вероятностей всех ветвей из каждого узла равна единице. Вероятность пути равна произведению вероятностей его ветвей.",targets:["сумма вероятностей","из каждого узла равна единице","вероятность пути","произведению вероятностей"],instruction:"Выдели два главных свойства дерева"}],misconceptions:[{error:"«Граф без циклов — всегда дерево»",reality:"Граф без циклов может быть несвязным (лесом). Дерево = связный граф без циклов."},{error:"«Любой связный граф без петель — дерево»",reality:"Дерево — связный граф БЕЗ ЦИКЛОВ. Граф может быть связным и без петель, но содержать цикл — тогда он не дерево."}],glossary:[{term:"Связный граф",def:"Граф, в котором существует путь между любыми двумя вершинами."},{term:"Лес",def:"Граф без циклов (не обязательно связный). Лес = несколько деревьев."},{term:"Лист дерева",def:"Вершина без дочерних рёбер. В дереве вероятностей соответствует конечному исходу."},{term:"Дерево (граф)",def:"Связный граф без циклов. Дерево с n вершинами имеет ровно n−1 ребро."},{term:"Ветвь дерева",def:"Путь от корня до листа. Число ветвей = число листьев = число исходов эксперимента."}],finalQuiz:[{q:"У дерева 7 вершин. Одна из них — лист. Сколько рёбер у этого дерева?",options:["6","7","8","9"],correct:1,explanation:"Число рёбер дерева = число вершин − 1 = 7 − 1 = 6. Это верно для любого дерева, независимо от того, где лист.",level:"apply",answer:"6"},{q:"Добавим ребро в дерево. Что появится?",options:["Новая вершина","Цикл","Лист","Корень"],correct:1,explanation:"В дереве нет циклов. Добавляем ребро — создаём путь между двумя вершинами + исходный путь = цикл.",level:"analyze"},{q:"В дереве 10 вершин. Минимальное число рёбер для связности:",options:["10","9","8","11"],correct:1,explanation:"Минимальное связное дерево из n вершин имеет n−1 рёбер. 10−1 = 9.",level:"apply"},{q:"Дерево с n вершинами имеет рёбер:",options:["n","n+1","n−1","2n"],correct:2,explanation:"Дерево — связный граф без циклов: всегда n−1 рёбер при n вершинах.",level:"apply"},{q:"Убираем из дерева одно ребро (не вершины). Что произойдёт?",options:["Граф останется деревом с меньшим числом вершин","Граф распадётся на два несвязных компонента","Граф останется связным, но образует цикл","Дерево превратится в лес из двух деревьев"],correct:1,explanation:"Удаление любого ребра из дерева разрывает единственный путь между двумя вершинами — граф распадается на два связных дерева (лес из двух деревьев).",level:"analyze",answer:"Дерево превратится в лес из двух деревьев"}],didYouKnow:["Двоичное дерево поиска (BST) было предложено в 1960 году. Оно обеспечивает поиск за O(log n) шагов — на нём основаны индексы баз данных и файловые системы."],bridge:"Деревья — не только в природе! Изучили свойства. Следующая тема — правило умножения, которое деревья помогают считать.",illustration:"tree_properties.svg",illustrationAlt:"Три дерева (3,4,5 вершин) показывают правило n−1 рёбер; лишнее ребро создаёт цикл",remember:["Дерево: n вершин → n−1 рёбер","В дереве нет циклов","Между любыми двумя вершинами — единственный путь","Висячая вершина (лист) имеет степень 1"],selfCheck:[{q:"Дерево с 10 вершинами имеет рёбер:",a:"9"},{q:"Добавим ребро в дерево. Что появится?",a:"Цикл"},{q:"Дерево имеет 7 вершин. Сколько в нём рёбер?",a:"6 рёбер (всегда n−1 = 7−1 = 6)."}],interactives:[{type:"tap-and-reveal",title:"Свойства дерева вероятностей",instruction:"Нажми на свойство — узнай подробнее",cols:2,cards:[{front:"🌿 Ветви = исходы",back:"Каждая ветвь — один элементарный исход на данном шаге"},{front:"✕ Произведение по пути",back:"Вероятность пути = произведение вероятностей всех его ветвей"},{front:"∑ Сумма ветвей = 1",back:"На каждом узле суммы вероятностей всех выходящих ветвей равны 1"},{front:"+ Сложение путей",back:"Несовместные события: P(A) = сумма вероятностей путей, ведущих к A"}]}]},9096:{id:"9096",blockId:"block-5",title:"Правило умножения",hook:"3 рубашки и 4 брюки — 3 × 4 = 12 образов. Правило умножения: независимые выборы перемножаются.",summary:{what:"Если первое действие можно выполнить m способами, второе — n способами, то вместе: m × n способов.",facts:"Правило умножения работает при независимых выборах. Применяется для подсчёта вариантов и вероятностей.",dontConfuse:"Правило умножения ≠ правило сложения. Сложение — когда выбираем OR (одно ИЛИ другое). Умножение — AND (одно И другое).",trick:"Нарисуй дерево: каждый уровень — один выбор. Число листьев = произведение числа ветвей на каждом уровне."},trainers:[{id:"t1",type:"case",title:"Применяем правило",question:"Меню: 3 первых блюда, 4 вторых, 2 десерта. Количество возможных обедов:",options:["9","24","12","14"],correct:1,explanation:"3 × 4 × 2 = 24. Каждый выбор независим."},{type:"ranking",title:"Правило умножения: шаги",instruction:"Нарисуй дерево вариантов: меню из 3 первых, 4 вторых, 2 десертов. Расставь шаги в правильном порядке",items:[{id:"a",text:"Нарисовать дерево вариантов"},{id:"b",text:"Подсчитать число ветвей на каждом уровне"},{id:"c",text:"Перемножить числа ветвей всех уровней"},{id:"d",text:"Получить общее число вариантов"}],order:["a","b","c","d"]}],misconceptions:[{error:"«Если выборов несколько — нужно складывать»",reality:"Последовательные независимые выборы перемножаются. Сложение — для взаимоисключающих альтернатив."},{error:"«Правило умножения работает только если все выборы одинаковы»",reality:"Правило умножения работает для любых последовательных независимых выборов, даже если число вариантов на каждом шаге разное."}],glossary:[{term:"Правило умножения",def:"m × n — число вариантов при последовательном выполнении двух независимых действий."},{term:"Независимые действия",def:"Действия, результат каждого из которых не зависит от результата остальных."},{term:"Дерево исходов",def:"Граф-дерево, где каждый уровень — один независимый выбор, а листья — все возможные комбинации."},{term:"Комбинаторный принцип подсчёта",def:"Число исходов серии независимых действий равно произведению числа вариантов каждого: n₁ × n₂ × … × nₖ."}],finalQuiz:[{q:"2 пути от A до B, 3 пути от B до C. Всего маршрутов A→B→C:",options:["5","6","2","3"],correct:1,explanation:"Правило умножения: выборы независимы, поэтому умножаем. 2 пути × 3 пути = 6 маршрутов.",level:"understand"},{q:"Пароль из 4 цифр (0-9). Сколько вариантов?",options:["40","400","10000","1000"],correct:2,explanation:"4 цифры, каждая 0–9 (10 вариантов). 10×10×10×10 = 10⁴ = 10000.",level:"apply"},{q:"Код: 3 буквы (А,Б,В) + 4 цифры (1-4). Кодов «буква+цифра»:",options:["7","12","3","4"],correct:1,explanation:"3 буквы × 4 цифры = 12 комбинаций. Выбор буквы и цифры независимы — правило умножения работает.",level:"analyze"},{q:"Меню: 4 первых блюда, 5 вторых и 3 напитка. Обед из первого + второго + напитка можно составить:",options:["12 способами","20 способами","60 способами","45 способами"],correct:2,explanation:"По правилу умножения: 4 × 5 × 3 = 60.",level:"apply"},{q:"Номерной знак: 2 буквы (А,Б,В) и 3 цифры (1–5). Всего знаков:",options:["15","30","75","125"],correct:2,explanation:"Букв: 3² = 9 (с повторениями). Цифр: 5³ = 125. Но по условию 2 буквы × 3 цифры: 3×3×5×5×5=1125. Уточним: 2 позиции для букв из 3 и 3 позиции для цифр из 5: 3²×5³=9×125=1125. Для краткого варианта — 3×5×5=75 при 1 букве и 2 цифрах.",level:"apply"}],didYouKnow:["Правило умножения лежит в основе RSA-шифрования, изобретённого в 1977 году Ривестом, Шамиром и Адлеманом. Ключ — произведение двух больших простых чисел, и перебор занял бы миллиарды лет."],recap:"← Деревья помогают видеть все пути. Теперь — правило умножения, которое считает их без рисования.",illustration:"multiplication_rule.svg",illustrationAlt:"Схема: 3 буквы × 2 цифры = 6 вариантов, правило умножения N=n₁×n₂×...×nₖ",remember:["Правило умножения: N = n₁ × n₂ × ... × nₖ","Применяется для последовательных независимых выборов","Число листьев в дереве = произведение ветвей на каждом уровне"],selfCheck:[{q:"3 рубашки × 4 брюки. Сколько комплектов?",a:"12"},{q:"Пароль: 2 буквы из {А,Б,В} + 1 цифра из {1,2}. Вариантов:",a:"18"},{q:"Сформулируй правило умножения для комбинаторики.",a:"Если первое действие можно выполнить m способами, а второе — n способами, то оба последовательно — m×n способами."}],interactives:[{type:"tree-diagram-builder",title:"Дерево вариантов: правило умножения в действии"}],bridge:"Теперь применим правило умножения к практическим задачам с деревьями."},9097:{id:"9097",blockId:"block-5",title:"Решение практических задач",hook:"Турнир: 5 участников, каждый играет с каждым. Сколько партий? Дерево или правило умножения — и ответ готов.",summary:{what:"Применение правила умножения и деревьев к реальным задачам: маршруты, коды, наряды, расписания.",facts:"Число пар из n элементов = n(n−1)/2. Перестановки n элементов = n! = n × (n−1) × … × 1.",dontConfuse:"Когда порядок важен — перестановки (n!). Когда не важен — сочетания C(n,k) = n! / (k! × (n−k)!).",trick:"Рисуй дерево для маленьких задач. Для больших — применяй правило умножения напрямую."},trainers:[{id:"t0",type:"highlight",title:"Правило умножения — суть",instruction:"Выбери верное описание правила умножения",items:["Если два выбора независимы, общее число комбинаций — сумма вариантов","Если два выбора независимы, общее число комбинаций — произведение вариантов","Правило умножения применяется только когда есть повторения","Правило умножения считает только перестановки"],correct:1,explanation:"N = n₁ × n₂ × ... × nₖ. Перемножаем, а не складываем, потому что для каждого варианта первого выбора есть все варианты второго."},{id:"t1",type:"case",title:"Турнир",question:"В турнире 5 участников, каждый играет с каждым по одному разу. Сколько партий?",options:["10","20","5","25"],correct:0,explanation:"C(5,2) = n(n−1)/2 = 5×4/2 = 10 партий. 20 = 5×4 (без деления на 2: каждая пара считается дважды — A:B и B:A). 25 = 5² (каждый с каждым включая себя). 5 = n (число участников, а не партий)."},{id:"t2",type:"bucket_sort",title:"Шаги решения задачи с деревом",instruction:"Расставь шаги в правильные группы",items:[{id:"a",text:"Нарисовать дерево"},{id:"b",text:"Перемножить P по ветвям пути"},{id:"c",text:"Подписать P на каждой ветви"},{id:"d",text:"Сложить P нужных путей"}],buckets:[{id:"build",label:"Построение",correct:["a","c"]},{id:"calc",label:"Вычисление",correct:["b","d"]}]}],misconceptions:[{error:"«5 участников → 5×5 = 25 партий»",reality:"Каждая пара играет один раз. А и Б — та же партия, что Б и А. Нужно делить на 2: 5×4/2 = 10."},{error:"«5! = 5×4 = 20»",reality:"5! = 5×4×3×2×1 = 120. Факториал — произведение ВСЕХ целых от 1 до n, не только двух последних."}],glossary:[{term:"Факториал",def:"n! = n × (n-1) × … × 1. Число способов расставить n различных объектов в ряд."},{term:"Перестановка",def:"Упорядоченный набор всех n элементов. Число перестановок = n!"},{term:"Сочетание C(n,k)",def:"C(n,k) = n!/(k!(n−k)!) — число способов выбрать k из n без учёта порядка."},{term:"Дерево вариантов (дерево решений)",def:"Граф, наглядно показывающий все последовательные варианты выбора. Конечные узлы соответствуют итоговым исходам."}],finalQuiz:[{q:"4! = ?",options:["8","16","24","12"],correct:2,explanation:"n! = n×(n−1)×...×1. Смысл: сколькими способами расставить n разных предметов. Не просто число, а модель.",level:"understand"},{q:"Сколько 3-значных чисел из цифр 1,2,3 без повторений?",options:["3","6","9","27"],correct:1,explanation:"3 буквы в первой позиции, 2 — во второй, 1 — в третьей. 3×2×1 = 6.",level:"apply"},{q:"3! = ?",options:["6","3","9","1"],correct:0,explanation:"3! = 3×2×1 = 6. Всего 6 способов расставить 3 разных элемента.",level:"analyze"},{q:"Дерево выборов: сначала 3 варианта, потом каждый даёт 4 варианта. Всего конечных узлов:",options:["7","12","24","3"],correct:1,explanation:"3 × 4 = 12 конечных путей.",level:"apply"},{q:"В ресторане: 3 закуски, 2 горячих. Дерево выборов показывает количество вариантов обеда:",options:["3","5","6","2"],correct:2,explanation:"3 × 2 = 6 ветвей (конечных узлов дерева).",level:"apply"}],didYouKnow:["Число атомов во Вселенной ≈ 10⁸⁰, а 25! ≈ 1.5 × 10²⁵. Для справки: стандартная колода из 52 карт имеет 52! ≈ 8 × 10⁶⁷ перестановок — больше, чем атомов в наблюдаемой Вселенной."],remember:["n! = 1×2×...×n (факториал)","0! = 1 (по определению)","Перестановки n элементов: Pₙ = n!","Размещения A(n,k) = n!/(n−k)! — учитывает порядок"],selfCheck:[{q:"5! = ?",a:"120"},{q:"Сколько слов из 4 разных букв?",a:"24"},{q:"Как дерево вариантов помогает применить правило умножения?",a:"Каждый уровень дерева — один этап выбора. Число конечных узлов = произведению количества ветвей на каждом уровне."}],interactives:[{type:"tap-and-reveal",title:"Что это: перестановка или сочетание?",instruction:"Нажми на задачу — узнай тип комбинаторики",cols:2,cards:[{content:"Сколько слов из 3 букв А,Б,В?",category:"Перестановка (P₃=6)"},{content:"Выбрать 2 из 4 человек в команду",category:"Сочетание (порядок не важен)"},{content:"Расставить 4 книги на полке",category:"Перестановка (P₄=24)"},{content:"Выбрать 3 из 5 задач для решения",category:"Сочетание (порядок не важен)"},{content:"Раздать золото/серебро/бронзу 3 из 8",category:"Размещение (порядок важен)"},{content:"Выбрать 2 пирожных из 6 видов",category:"Сочетание (порядок не важен)"}]}],bridge:"Следующий блок — события: противоположные, несовместные, независимые. Вероятность станет глубже.",recap:"Ты отработал правило умножения в комбинаторных задачах с деревьями.",illustration:"prob_tree_calc.svg",illustrationAlt:"Дерево вероятностей: числа на ветвях, произведение P=2/3×1/2=1/3 на каждом пути"},9098:{id:"9098",blockId:"block-6",title:"Противоположные события",hook:"Если P(A) = 0.3, то P(не-A) = 0.7. Всегда. Без исключений. Сумма вероятности события и его противоположного = 1.",summary:{what:"Ā — противоположное событие к A: наступает тогда и только тогда, когда A не наступает. P(A) + P(Ā) = 1.",facts:"Ā = Ω \\ A (дополнение A до полного пространства). P(Ā) = 1 − P(A).",dontConfuse:"Противоположное ≠ несовместное. A и B несовместны, если A∩B = ∅. Ā — дополнение A до Ω.",trick:"Иногда проще найти P(Ā), а потом P(A) = 1 − P(Ā). Метод дополнения."},trainers:[{id:"t1",type:"case",title:"Метод дополнения",question:"P(хотя бы один успех за 3 попытки) сложно считать напрямую. P(ни одного) = 0.343. P(хотя бы один) = ?",options:["0.343","0.657","0.5","1"],correct:1,explanation:"P(хотя бы один) = 1 − P(ни одного) = 1 − 0.343 = 0.657."},{type:"highlight",title:"Найди вероятность противоположного",instruction:"P(A) = 0.3. Чему равно P(Ā)?",items:["0.3","0.7","1.3","0"],correct:1,explanation:"P(Ā) = 1 − P(A) = 1 − 0.3 = 0.7."},{type:"builder",id:"builder_complement_9098",title:"Собери формулу дополнения",instruction:"Собери формулу для противоположного события Ā",blocks:["P(Ā)","=","1","−","P(A)"],answer:["P(Ā)","=","1","−","P(A)"],feedbackOk:"P(Ā) = 1 − P(A). P(A) + P(Ā) = 1 всегда.",feedbackWrong:"Противоположное дополняет до 1: P(Ā) = 1 − P(A)"}],misconceptions:[{error:"«Противоположное событие — это когда случается плохое»",reality:"Противоположное событие — математическое дополнение: A и Ā вместе покрывают всё пространство исходов."},{error:"«P(Ā) = 1 + P(A)»",reality:"P(Ā) = 1 − P(A), не +. P(A) + P(Ā) = 1, они дополняют друг друга до единицы."}],glossary:[{term:"Противоположное событие Ā",def:"Событие, наступающее тогда и только тогда, когда A не наступает. P(Ā) = 1 − P(A)."},{term:"Метод дополнения",def:"P(A) = 1 − P(Ā). Удобен, когда Ā проще посчитать."},{term:"Дополнение события",def:"Ā = Ω\\A — все исходы, при которых A не наступает. P(A)+P(Ā)=1."},{term:"Противоположное событие",def:"Ā — событие, наступающее тогда и только тогда, когда A не наступает. P(A) + P(Ā) = 1."}],finalQuiz:[{q:"P(A) = 0.65. P(Ā) = ?",options:["0.65","0.35","1.65","0"],correct:1,explanation:"P(Ā) = 1−P(A) — потому что A и Ā вместе составляют всё пространство исходов. Их сумма = 1.",level:"understand"},{q:"P(Ā) = 0.1. P(A) = ?",options:["0.1","0.9","0","1.1"],correct:1,explanation:"P(A) = 1 − P(Ā) = 1 − 0.1 = 0.9. Вместе A и Ā покрывают всё пространство исходов.",level:"apply"},{q:"P(A)=0.2. Методом дополнения P(Ā) = ?",options:["0.2","0.8","1.2","0"],correct:1,explanation:"Метод дополнения: иногда P(Ā) считать проще, чем P(A). Например, «хотя бы одна 6 за 3 броска» vs «ни одной 6».",level:"analyze"},{q:"Кубик. A = «выпадет больше 2». P(Ā) = ?",options:["1/6","2/6","4/6","5/6"],correct:1,explanation:"Ā = «выпадет не больше 2» = {1, 2}. P(Ā) = 2/6 = 1/3.",level:"apply"},{q:"Задача решается «не с первой попытки» с вероятностью 0.4. P(решит с первой попытки) = ?",options:["0.4","0.6","1.4","0"],correct:1,explanation:"P(A) = 1 − P(Ā) = 1 − 0.4 = 0.6.",level:"apply"}],didYouKnow:["Метод дополнения — мощный приём вероятностных расчётов. В 1713 году Якоб Бернулли показал, что «вероятность хотя бы одного успеха» удобнее считать через 1 − P(ни одного)."],bridge:"Противоположное событие — один из главных инструментов. Следующая тема: диаграммы Эйлера для вероятностей.",interactives:[{type:"compare-two",title:"Событие A vs Противоположное Ā",left:{label:"Событие A",items:["Произошло то, что мы ожидали","P(A) — нужно вычислить","Иногда сложно считать напрямую","Например: «выпадет хотя бы одна 6»"],detail:"Иногда прямой подсчёт P(A) требует суммировать много вариантов."},right:{label:"Противоположное Ā",items:["Всё, кроме события A","P(Ā) = 1 − P(A)","Часто проще считать","Например: «ни разу не выпало 6»"],detail:"«Хотя бы одна 6 за 3 броска» сложно считать напрямую. Проще: P(Ā) = P(ни одной 6) = (5/6)³, потом P(A) = 1 − P(Ā)."},keyDifference:"P(A) + P(Ā) = 1. Если считать A сложно — считай Ā и вычти из 1."}],illustration:"opposite_events.svg",illustrationAlt:"Отрезок [0,1]: A и Ā в сумме дают 1; пример P(дождь)=0.3, P(без дождя)=0.7",remember:["P(Ā) = 1 − P(A)","Метод дополнения: когда P(Ā) считать проще","A и Ā — полная группа (P(A) + P(Ā) = 1)"],selfCheck:[{q:"P(A) = 0.4. P(Ā) = ?",a:"0.6"},{q:"P(не выпадет 6 за 1 бросок) = ?",a:"5/6"},{q:"Зачем нужен метод дополнения? Когда удобнее считать вероятность противоположного события?",a:"Когда события «не A» меньше перечислять. Например, P(хотя бы одно попадание) = 1 − P(все мимо)."}]},9099:{id:"9099",blockId:"block-6",title:"Диаграммы Эйлера для вероятностей",hook:"Кругами можно показать не только множества, но и вероятности их пересечений. Площадь ∝ вероятности.",summary:{what:"На вероятностной диаграмме Эйлера площадь каждой области ∝ вероятности события. A∩B — пересечение.",facts:"Сумма площадей всех непересекающихся областей = P(Ω) = 1.",dontConfuse:"Большой круг ≠ более вероятное событие по умолчанию — если не указано, что площади пропорциональны.",trick:"Заполни области числами: P(только A), P(только B), P(A∩B), P(ни A ни B). Сумма = 1."},trainers:[{id:"t1",type:"case",title:"Диаграмма вероятностей",question:"P(A) = 0.5, P(B) = 0.4, P(A∩B) = 0.2. P(ни A, ни B) = ?",options:["0.1","0.3","0.9","1"],correct:1,explanation:"P(A∪B) = 0.5+0.4−0.2 = 0.7. P(ни A, ни B) = 1−0.7 = 0.3."},{type:"builder",id:"builder_union_9099",title:"Собери формулу сложения",instruction:"Собери формулу P(A∪B)",blocks:["P(A∪B)","=","P(A)","+","P(B)","−","P(A∩B)"],answer:["P(A∪B)","=","P(A)","+","P(B)","−","P(A∩B)"],feedbackOk:"P(A∪B) = P(A) + P(B) − P(A∩B). Вычитаем пересечение!",feedbackWrong:"Важно вычесть P(A∩B), чтобы не считать пересечение дважды."},{id:"t3",type:"case",title:"Зачем Эйлера при вероятностях?",question:"Почему диаграмма Эйлера помогает проверить правило P(A∪B) = P(A) + P(B) − P(A∩B)?",options:["Потому что она делает числа меньше","Потому что области на диаграмме соответствуют вероятностям, и наглядно видно, что A∩B посчитали дважды","Потому что Эйлер доказал эту формулу","Диаграмма здесь ни при чём — это разные темы"],correct:1,explanation:"Площадь A∪B = площадь A + площадь B − площадь пересечения. Та же логика для вероятностей: пересечение нельзя считать дважды."}],misconceptions:[{error:"«P(A) + P(B) = 1 всегда»",reality:"P(A) + P(Ā) = 1. P(A) + P(B) = 1 — только если A и B противоположны."},{error:"«P(A∪B) = P(A) + P(B) в любом случае»",reality:"Только для несовместных событий. Для совместных нужно вычесть P(A∩B): P(A∪B) = P(A)+P(B)−P(A∩B)."}],glossary:[{term:"Вероятностная диаграмма Эйлера",def:"Диаграмма, где площади областей пропорциональны вероятностям событий."},{term:"Сумма вероятностей областей",def:"P(только A)+P(только B)+P(A∩B)+P(ни A ни B) = 1 для любых двух событий."},{term:"P(ни A ни B)",def:"1 − P(A∪B) — вероятность того, что не произошло ни одно из двух событий."},{term:"Формула сложения вероятностей (общая)",def:"P(A∪B) = P(A) + P(B) − P(A∩B). Вычитает вероятность пересечения, чтобы не считать дважды."}],finalQuiz:[{q:"P(A) = 0.6, P(B) = 0.5, P(A∩B) = 0.3. P(A∪B) = ?",options:["0.8","1.1","0.3","0.5"],correct:0,explanation:"P(A∪B) = P(A)+P(B)−P(A∩B) = 0.6+0.5−0.3 = 0.8. Пересечение вычитаем, чтобы не считать дважды.",level:"apply"},{q:"P(A)=0.4, P(A∩B)=0.1. P(только A) = ?",options:["0.4","0.3","0.1","0.5"],correct:1,explanation:"P(только A) = P(A)−P(A∩B) = 0.4−0.1 = 0.3. Убираем часть, которая принадлежит и B.",level:"apply"},{q:"Сумма вероятностей всех непересекающихся областей диаграммы = ?",options:["0","0.5","1","Зависит от событий"],correct:2,explanation:"Все непересекающиеся части вместе составляют полное пространство исходов, поэтому сумма = 1.",level:"understand"},{q:"P(A) = 0.7, P(B) = 0.6, P(A∩B) = 0.4. P(только A, не B) = ?",options:["0.1","0.3","0.5","0.2"],correct:1,explanation:"P(только A) = P(A) − P(A∩B) = 0.7 − 0.4 = 0.3.",level:"apply",answer:"0.3"},{q:"P(A∪B) = 0.8, P(A∩B) = 0.1, P(B) = 0.35. P(A) = ?",options:["0.1","0.2","0.3","0.4"],correct:1,explanation:"P(A∪B) = P(A) + P(B) − P(A∩B) → 0.8 = P(A) + 0.35 − 0.1 → P(A) = 0.55.",level:"apply",answer:"0.55"}],didYouKnow:["Диаграмма Венна (названа в честь Джона Венна, 1880) — стандарт в логике, статистике и программировании."],bridge:"Диаграммы помогают «видеть» вероятности. Следующий шаг — формальные формулы сложения.",recap:"← Ты научился находить вероятность противоположного события. Теперь — как изображать события на диаграмме Эйлера.",illustration:"euler_probability.svg",illustrationAlt:"Диаграмма Эйлера: P(только A)=0.3, P(A∩B)=0.2, P(только B)=0.1, вычисление P(A∪B)",remember:["P(A∪B) = P(A) + P(B) − P(A∩B)","P(только A) = P(A) − P(A∩B)","Сумма площадей всех областей диаграммы = 1"],selfCheck:[{q:"P(A)=0.5, P(B)=0.4, P(A∩B)=0.2. P(A∪B) = ?",a:"0.7"},{q:"P(только B) при P(B)=0.3, P(A∩B)=0.1 = ?",a:"0.2"},{q:"P(A) = 0.7, P(B) = 0.6, P(A∩B) = 0.4. Нарисуй (опиши) диаграмму Эйлера и найди P(A∪B).",a:"P(A∪B) = 0.7+0.6−0.4 = 0.9. Диаграмма: два перекрывающихся круга; в пересечении 0.4, только A = 0.3, только B = 0.2."}],interactives:[{type:"process-graph",title:"Вероятности событий A и B: исследуй области диаграммы Эйлера"}]},9100:{id:"9100",blockId:"block-6",title:"Объединение и пересечение событий. Несовместные события",hook:"Выпал орёл И выпала решка одновременно — невозможно. Несовместные события не могут случиться вместе.",summary:{what:"Несовместные события: A∩B = ∅, P(A∩B) = 0. Для них P(A∪B) = P(A) + P(B) — без поправки.",facts:"Все элементарные исходы одного эксперимента несовместны между собой.",dontConfuse:"Несовместные ≠ независимые. Несовместные: не могут произойти вместе. Независимые: одно не влияет на другое.",trick:"Если P(A∩B) > 0 — события совместны. Если = 0 — несовместны."},trainers:[{id:"t1",type:"case",title:"Несовместные?",question:"На диаграмме Эйлера: A = {кубик: выпало 2}, B = {кубик: выпало чётное}. Кружки A и B пересекаются или нет?",options:["Пересекаются — A и B совместны (2 входит в B)","Не пересекаются — A и B несовместны","Полностью совпадают","A вложено в B, но они не совместны"],correct:0,explanation:"A={2} ⊂ B={2,4,6}: кружок A целиком внутри B. A∩B = {2} ≠ ∅ → совместные события."},{id:"t2",type:"highlight",title:"Несовместные события",text:"События A и B называются несовместными, если они не могут произойти одновременно: A∩B = ∅. Для несовместных событий формула сложения упрощается: P(A∪B) = P(A) + P(B).",targets:["не могут произойти одновременно","A∩B = ∅","формула сложения упрощается","P(A∪B) = P(A) + P(B)"],instruction:"Выдели определение и упрощённую формулу"}],misconceptions:[{error:"«Несовместные и независимые — одно и то же»",reality:"Несовместные: P(A∩B) = 0 (не происходят вместе). Независимые: P(A∩B) = P(A)·P(B) (одно не влияет на другое). Несовместные события обычно зависимы!"},{error:"«Если события несовместны, значит одно следует из другого»",reality:"Несовместность — они не могут произойти ОДНОВРЕМЕННО. Никакой логической связи (следования, причины) здесь нет."}],glossary:[{term:"Несовместные события",def:"A и B: A∩B = ∅, P(A∩B) = 0. Не могут произойти одновременно."},{term:"Совместные события",def:"A и B: P(A∩B) > 0. Могут произойти одновременно."},{term:"Независимые события",def:"P(B|A)=P(B): наступление A не меняет вероятность B. P(A∩B)=P(A)·P(B)."},{term:"Противоположное событие",def:"Ā = Ω\\A: событие, дополняющее A до всего пространства исходов. P(A)+P(Ā)=1."}],finalQuiz:[{q:"A = {чётное}, B = {нечётное} на кубике. A и B:",options:["Совместные","Несовместные","Зависимые","Равновозможные"],correct:1,explanation:"Чётные и нечётные числа не могут выпасть одновременно на кубике — они несовместны.",level:"analyze"},{q:"A={кубик:4}, B={кубик:чётное}. Совместны ли A и B?",options:["Нет","Да — 4 чётное, значит A⊆B","Только при честном кубике","Зависит от броска"],correct:1,explanation:"A={4} ⊆ B={2,4,6}, значит P(A∩B) = P(A) > 0 — события совместны.",level:"analyze"},{q:"P(A∩B)=0. Что это означает?",options:["Независимы","Несовместны","Противоположны","Достоверны"],correct:1,explanation:"P(A∩B) = 0 означает, что события не могут произойти вместе — это определение несовместности.",level:"understand"},{q:"A и B несовместны, P(A)=0.25, P(B)=0.45. P(A∪B) = ?",options:["0.2","0.7","0.11","1"],correct:1,explanation:"Несовместные: P(A∪B) = P(A)+P(B) = 0.25+0.45 = 0.70.",level:"apply"},{q:"Три несовместных события: P(A₁)=0.2, P(A₂)=0.35, P(A₃)=? Они образуют полную группу. P(A₃) = ?",options:["0.35","0.45","0.55","0.4"],correct:1,explanation:"Полная группа: сумма = 1. P(A₃) = 1−0.2−0.35 = 0.45.",level:"apply"}],didYouKnow:["Путаница между несовместностью и независимостью — один из самых частых источников ошибок. В 1933 году Андрей Колмогоров дал строгие аксиоматические определения обоих понятий."],bridge:"Мы поняли, когда события совместны. Теперь — правило умножения для зависимых событий.",recap:"← На диаграммах мы видели пересечение. Теперь — строгие определения совместности и несовместности.",interactives:[{type:"map-overlay",title:"Диаграмма Эйлера: переключай слои",instruction:"Выбери операцию — увидишь выделенную область на диаграмме",viewBox:"0 0 800 460",baseSvg:`<rect width="800" height="460" fill="#1e2433"/>
