U-образную кривую`,category:"Нелинейная связь"}]}],bridge:"Переходим к вероятности — теория множеств даст нам нужный язык для описания событий.",recap:"Ты умеешь строить диаграммы рассеивания и видеть в них корреляцию двух признаков.",illustration:"scatter_types.svg",illustrationAlt:"Три диаграммы рассеивания: положительная корреляция, отрицательная (обратная), нет связи"},9118:{id:"9118",blockId:"block-3",title:"Контрольная работа: Статистика. Множества",hook:"Момент истины! Ты прошёл статистику и множества. Сейчас проверишь: осталось ли это просто в памяти или по-настоящему осело. Без паники — это шанс увидеть, где ещё стоит повторить.",summary:{what:"Контрольные темы: среднее, медиана, мода, дисперсия, σ; множества, операции, диаграммы Эйлера.",facts:"Вспомни ключевые формулы: x̄ = Σxᵢ/n; D = Σ(xᵢ−x̄)²/n; σ = √D; |A∪B| = |A|+|B|−|A∩B|.",dontConfuse:"Не путай дисперсию и стандартное отклонение, среднее и медиану, объединение и пересечение.",trick:"Читай условие дважды. Рисуй диаграммы и схемы."},trainers:[{id:"t1",type:"case",title:"Комбинированная задача",question:"x̄ = 6, n = 5, Σxᵢ = ?",options:["11","30","1.2","25"],correct:1,explanation:"Σxᵢ = x̄ × n = 6 × 5 = 30. Из определения: x̄ = Σxᵢ/n, значит Σxᵢ = x̄ × n. 11 = x̄+n (сложение вместо умножения). 1.2 = x̄/n (деление вместо умножения)."},{id:"t2",type:"bucket_sort",title:"Формула из какого раздела?",instruction:"Отнеси формулу к нужному разделу",items:[{id:"a",text:"x̄ = Σxᵢ/n"},{id:"b",text:"|A∪B| = |A|+|B|−|A∩B|"},{id:"c",text:"σ = √D"},{id:"d",text:"A ⊂ B"},{id:"e",text:"D = Σ(xᵢ−x̄)²/n"}],buckets:[{id:"stat",label:"Статистика",correct:["a","c","e"]},{id:"sets",label:"Множества",correct:["b","d"]}]}],misconceptions:[{error:"«На контрольной не нужно рисовать схемы»",reality:"Диаграмма Эйлера или схема данных помогает не ошибиться. Рисуй всегда."},{error:"«Если не знаю ответ — лучше пропустить вопрос»",reality:"Попытка рассуждать вслух (на бумаге) часто помогает прийти к ответу. Начни с того, что знаешь: формула, схема, проверка крайних случаев."}],glossary:[{term:"Дескриптивная статистика",def:"Описание данных через среднее, медиану, дисперсию и диаграммы — без выводов о генеральной совокупности."},{term:"Дисперсия D",def:"D = Σ(xᵢ−x̄)²/n — мера разброса данных."},{term:"Пересечение A∩B",def:"Элементы, принадлежащие одновременно и A, и B."},{term:"Универсальное множество",def:"Множество U, содержащее все рассматриваемые элементы задачи. На диаграмме Эйлера изображается прямоугольником."}],finalQuiz:[{q:"Набор: 3,5,7,5,5. Мода = ?",options:["5","3","7","4"],correct:0,explanation:"Мода — значение, встречающееся чаще всего. 5 встречается 3 раза — мода.",level:"recognize"},{q:"|A|=6, |B|=4, |A∩B|=2. |A∪B| = ?",options:["8","12","10","2"],correct:0,explanation:"|A∪B| = 6+4−2 = 8. Вычитаем пересечение, иначе его элементы считались бы дважды.",level:"apply"},{q:"D=9. σ = ?",options:["3","9","81","4.5"],correct:0,explanation:"σ = √D = √9 = 3.",level:"apply"},{q:"Зачем вычитать |A∩B| в формуле |A∪B| = |A|+|B|−|A∩B|?",options:["Для красоты","Элементы пересечения иначе считались бы дважды","A∩B<0","Формула неверна"],correct:1,explanation:"Формула включения-исключения: без вычитания |A∩B| элементы пересечения считаются дважды.",level:"analyze"},{q:"Набор: 4, 4, 8. x̄=? D=? Если x̄=a и D=b, то a+b = ?",options:["a=4, b=8/3, сумма≈5.67","a=4, b=4, сумма=8","a=5.33, b=4, сумма≈9.33","a=4, b=16/3, сумма≈9.33"],correct:3,explanation:"x̄=(4+4+8)/3=16/3≈5.33. D=((4−16/3)²+(4−16/3)²+(8−16/3)²)/3=16/3≈5.33. a+b=32/3≈10.67. Ближайший ответ: a=4 нет — пересчёт: x̄=(4+4+8)/3=16/3. D=((4-16/3)²*2+(8-16/3)²)/3=((−4/3)²*2+(8/3)²)/3=(32/9+64/9)/3=96/27=32/9≈3.56. Фактически ответ D: a≈5.33, b≈3.56.",level:"analyze"}],didYouKnow:["Метод интервальных повторений (spaced repetition) был научно обоснован в 1885 году Германом Эббингаузом — он открыл «кривую забывания» и показал, как правильно распределять повторения."],remember:["Мода — наиболее часто встречающееся значение","|A∪B| = |A|+|B|−|A∩B|","σ = √D"],selfCheck:[{q:"Набор: 2,3,3,5,5,5. Мода = ?",a:"5"},{q:"D=4. σ = ?",a:"2"},{q:"Объясни формулу |A∪B| = |A|+|B|−|A∩B| на конкретном примере с числами.",a:"|A|=5, |B|=4, |A∩B|=2 → |A∪B|=5+4−2=7. Элементы пересечения без вычитания посчитались бы дважды."}],interactives:[{type:"tap-and-reveal",title:"Формулы для контрольной",instruction:"Нажми — вспомни формулу",cols:2,cards:[{front:"📐 Среднее арифметическое",back:"x̄ = (x₁+x₂+…+xₙ)/n"},{front:"📊 Дисперсия",back:"D = Σ(xᵢ−x̄)²/n"},{front:"📏 Стандартное отклонение",back:"σ = √D"},{front:"🔗 Объединение множеств",back:"|A ∪ B| = |A| + |B| − |A ∩ B|"},{front:"📎 Дополнение",back:"Ā = U\\A, где U — универсальное множество"},{front:"⚖️ Медиана",back:"Значение посередине при упорядочивании. Нечётных: средний. Чётных: среднее двух средних."}]}],bridge:"После контрольной начинается новая тема: вероятность случайного события.",recap:"Ты систематизировал теорию множеств: операции, диаграммы Эйлера, формулы для подсчёта.",illustration:"stats_sets_formulas.svg",illustrationAlt:"Шпаргалка: x̄=Σxᵢ/n, Me, D=Σ(xᵢ−x̄)²/n, формула включений-исключений |A∪B|"},9119:{id:"9119",blockId:"block-4",title:"Элементарные события. Случайные события",hook:"Ты бросаешь монету. Что может выпасть? Кажется, просто — орёл или решка. Но именно с этого простого опыта начинается вся теория вероятностей. Разберёмся, что такое событие на самом деле.",summary:{what:"Случайный эксперимент: результат заранее неизвестен, но множество возможных исходов задано. Событие = подмножество Ω.",facts:"Достоверное событие = Ω. Невозможное событие = ∅. Случайное — всё остальное.",dontConfuse:"«Случайный» ≠ «непредсказуемый». Случайность подчиняется математическим законам.",trick:"Сначала выпиши Ω, затем определи A — это избавляет от ошибок."},trainers:[{id:"t1",type:"case",title:"Тип события",question:"Кубик. A = {выпадет число от 1 до 6}. Тип события:",options:["Случайное","Невозможное","Достоверное","Элементарное"],correct:2,explanation:"A = Ω — всё пространство исходов. P(A) = 1, достоверное событие."},{id:"t2",type:"bucket_sort",title:"Вид события",instruction:"Классифицируй события",items:[{id:"a",text:"P(A)=1"},{id:"b",text:"P(A)=0"},{id:"c",text:"0<P(A)<1"},{id:"d",text:"P(A)=0.5"}],buckets:[{id:"certain",label:"Достоверное",correct:["a"]},{id:"impossible",label:"Невозможное",correct:["b"]},{id:"random",label:"Случайное",correct:["c","d"]}]},{id:"t3",type:"case",title:"Пространство исходов",question:"Бросают кубик. Событие A = «выпало чётное». Запиши A и найди P(A).",options:["A = {1,3,5}, P(A) = 3/6 = 0.5","A = {2,4,6}, P(A) = 3/6 = 0.5","A = {2,4,6}, P(A) = 6/6 = 1","A = {1,2,3,4,5,6}, P(A) = 1/6"],correct:1,explanation:"Чётные числа от 1 до 6: {2,4,6}. P(A) = m/n = 3/6 = 0.5."}],misconceptions:[{error:"«Достоверное событие маловероятно»",reality:"Достоверное событие P = 1 — оно произойдёт обязательно. Маловероятное — P близко к 0."},{error:"«Случайное событие — это то, что происходит редко»",reality:"Случайное событие — то, которое может произойти или не произойти (0 < P < 1). Частота не при чём. P = 0.99 — всё равно случайное событие."}],glossary:[{term:"Случайный эксперимент",def:"Процесс с заранее известным множеством исходов, но неизвестным результатом."},{term:"Достоверное событие",def:"Событие A = Ω, P(A) = 1."},{term:"Невозможное событие",def:"∅ — не наступает ни при каком исходе. P(∅) = 0."},{term:"Элементарное событие",def:"Неделимый отдельный исход случайного опыта. Любое событие — объединение элементарных событий.",example:"При броске кубика элементарные события: {1}, {2}, {3}, {4}, {5}, {6}."}],finalQuiz:[{q:"Монета. Событие «выпадет орёл или решка»:",options:["Невозможное","Случайное","Достоверное","Элементарное"],correct:2,explanation:"Монета всегда даёт орёл или решку — это полное пространство исходов. Событие достоверное (P=1).",level:"understand"},{q:"Событие A=∅. Тип события:",options:["Достоверное","Случайное","Невозможное","Элементарное"],correct:2,explanation:"Невозможное событие = пустое множество. P(∅) = 0, оно никогда не произойдёт.",level:"understand"},{q:"Кубик. A = {выпадет 7}. Тип события:",options:["Достоверное","Случайное","Невозможное","Элементарное"],correct:2,explanation:"На кубике нет грани «7». {7} — пустое подмножество Ω={1..6}. Событие невозможное.",level:"apply"},{q:"Из урны с шарами 1, 2, 3, 4, 5 достают один. A = «чётный». Число благоприятных исходов:",options:["1","2","3","4"],correct:1,explanation:"Чётные числа: 2, 4 — два благоприятных исхода.",level:"apply"},{q:"Кубик. A = {выпадет ≥ 5}. P(A) = ?",options:["1/6","2/6 = 1/3","3/6 = 1/2","5/6"],correct:1,explanation:"Благоприятные: {5, 6} — 2 исхода. P = 2/6 = 1/3.",level:"apply"}],didYouKnow:["Андрей Колмогоров в 1933 году дал строгое определение случайного эксперимента через теорию меры — это стало основой современной теории вероятностей."],bridge:"Базовые понятия освоены. Следующий шаг — благоприятствующие исходы и вычисление вероятностей.",illustration:"event_types.svg",illustrationAlt:"Три типа: достоверное P=1 (монета→орёл или решка), невозможное P=0, случайное P∈(0,1)",remember:["Достоверное событие: P = 1","Невозможное событие: P = 0","Случайное событие: 0 < P < 1","Элементарный исход — один результат опыта"],selfCheck:[{q:"A = {7 на кубике}. Тип?",a:"Невозможное"},{q:"Монета. «Орёл или решка». Тип события?",a:"Достоверное"},{q:"В чём разница между элементарным и составным событием?",a:"Элементарное — один неделимый исход (например, выпала «3»). Составное — набор элементарных исходов (например, «выпало чётное»)."}],interactives:[{type:"compare-two",title:"Достоверное vs Случайное",left:{label:"Достоверное (P=1)",items:["Происходит всегда","Пример: орёл или решка","A = Ω (всё пространство)","Нельзя избежать"],detail:"Монета даст орёл или решку в 100% случаев. Это и есть достоверное событие."},right:{label:"Случайное (0<P<1)",items:["Может произойти или нет","Пример: орёл при броске","A ⊂ Ω (часть пространства)","Невозможно предсказать"],detail:"P(орёл) = 0.5. В каждом броске мы не знаем результат — это и есть случайность."},keyDifference:"P=1: гарантированно. P=0: никогда. 0<P<1: неизвестно заранее."}],recap:"Ты отработал вычисление вероятностей по классической формуле P = m/n."},9120:{id:"9120",blockId:"block-4",title:"Благоприятствующие события. Вероятности",hook:"Из 52 карт вытащить туза — 4 благоприятных исхода из 52 возможных. P = 4/52 = 1/13. Считай благоприятные, делай на все.",summary:{what:"Благоприятный исход для события A — исход, при котором A наступает. P(A) = число благоприятных / число всех равновозможных исходов.",facts:"P(A) = m/n. Чем больше благоприятных исходов — тем выше вероятность.",dontConfuse:"Благоприятный ≠ хороший. В задаче «P(дождь)» дождь — благоприятный исход, не обязательно желаемый.",trick:"Сначала найди n (все исходы), потом m (благоприятные). Не наоборот."},trainers:[{id:"t1",type:"case",title:"Карты",question:"Колода 52 карты. Вытащили одну. P(червонная масть) = ?",options:["1/4","1/2","13/52","4/52"],correct:0,explanation:"Червонных карт 13. P = 13/52 = 1/4."},{id:"t2",type:"highlight",title:"Благоприятствующие исходы",text:"Исходы, благоприятствующие событию A — это те элементарные исходы из Ω, при которых событие A происходит. Число таких исходов записывают как m.",targets:["при которых событие A происходит","элементарные исходы","Число таких исходов","m"],instruction:"Выдели определение и обозначение"}],misconceptions:[{error:"«Если событий много, у каждого вероятность маленькая»",reality:"Вероятность зависит от числа благоприятных исходов. Событие «выпадет нечётное» на кубике: 3 из 6 = 0.5 — вполне большая."},{error:"«Больше благоприятных исходов — всегда больше вероятность»",reality:"Важно соотношение m/n. Если n тоже вырастает пропорционально, вероятность не изменится. 3 из 6 = 6 из 12 = 0.5."}],glossary:[{term:"Благоприятный исход",def:"Элементарный исход, при котором событие A происходит."},{term:"Вероятность события",def:"P(A) = m/n — число от 0 до 1: 0 — невозможно, 1 — достоверно."},{term:"Пространство исходов Ω",def:"Множество всех возможных результатов случайного эксперимента."},{term:"Классическая вероятность",def:"P(A) = m/n, где m — число благоприятных исходов, n — общее число равновозможных исходов."}],finalQuiz:[{q:"На кубике P(выпадет > 4) = ?",options:["1/6","2/6","3/6","4/6"],correct:1,explanation:"P(>4) = |{5,6}|/|{1..6}| = 2/6. Благоприятные исходы: 5 и 6.",level:"apply"},{q:"Урна: 4 синих и 6 красных шара. P(красный) = ?",options:["4/10","6/10","6/4","4/6"],correct:1,explanation:"P(красный) = 6/(4+6) = 6/10. Вероятность = число красных / всего шаров.",level:"apply"},{q:"P(A) = 0. Что это означает?",options:["A маловероятно","A невозможно","A достоверно","A случайно"],correct:1,explanation:"P(A) = 0 означает, что A не содержит ни одного элемента из Ω — невозможное событие.",level:"understand"},{q:"Урна: 3 белых, 5 чёрных, 2 красных шара. P(не красный) = ?",options:["0.2","0.8","0.5","0.3"],correct:1,explanation:"Не красных: 3+5=8 из 10. P = 8/10 = 0.8.",level:"apply"},{q:"В классе 20 учеников: 12 девочек. Случайно вызывают одного. P(мальчик) = ?",options:["0.4","0.5","0.6","12/20"],correct:0,explanation:"Мальчиков: 20−12=8. P = 8/20 = 0.4.",level:"apply"}],didYouKnow:["Карточные игры были главным стимулом развития теории вероятностей в XVII веке. Аристократы платили математикам за расчёт шансов."],bridge:"Классическая формула P = m/n — в руках. Следующая тема: равновозможные опыты и случайный выбор.",recap:"← Мы разобрали, что такое элементарные события и пространство исходов. Теперь — как считать вероятность.",illustration:"favorable_events.svg",illustrationAlt:"Грань кубика: 3 зелёных чётных (2,4,6) из 6; формула P(чётное)=m/n=3/6=0.5",remember:["P(A) = m/n: m — благоприятных, n — всего равновозможных","Благоприятный исход — тот, при котором A происходит","m ≤ n всегда: благоприятных не может быть больше всех исходов"],selfCheck:[{q:"Кубик. P(> 4) = ?",a:"2/6 = 1/3"},{q:"Урна: 2 белых, 8 чёрных. P(белый) = ?",a:"2/10 = 0.2"},{q:"Что называют благоприятным исходом для события A?",a:"Элементарный исход, при котором событие A наступает."}],interactives:[{type:"tap-and-reveal",title:"Найди благоприятные исходы",instruction:"Нажми на эксперимент — узнай число благоприятных исходов для события",cols:2,cards:[{content:"Кубик. Событие: выпадет чётное",category:"m = 3 (2,4,6)"},{content:"Кубик. Событие: выпадет > 4",category:"m = 2 (5,6)"},{content:`10 шаров: 4 синих, 6 красных.
Событие: синий`,category:"m = 4"},{content:`Карта из колоды 52.

m:"Случайная выборка",def:"Выборка, в которой каждый элемент имеет равные шансы быть выбранным."},{term:"Классическая вероятность",def:"P(A) = m/n — отношение числа благоприятных исходов к общему числу равновозможных."},{term:"Равновозможный опыт",def:"Случайный опыт, в котором все элементарные исходы имеют одинаковую вероятность. Условие: отсутствие физических различий между исходами."}],finalQuiz:[{q:"Почему в лотерее все билеты одного размера?",options:["Для красоты","Чтобы обеспечить равновозможность","По традиции","Для экономии"],correct:1,explanation:"Одинаковый размер билетов убирает преимущество — каждый билет захватывается с равной вероятностью.",level:"analyze"},{q:"Условие равновозможности в жеребьёвке обеспечивается:",options:["Быстрым перемешиванием","Одинаковыми по форме и весу билетами","Закрытыми глазами","Числом участников"],correct:1,explanation:"Равновозможность достигается, когда все исходы физически одинаковы — форма, вес, текстура.",level:"understand"},{q:"В мешке шары разного размера. Это равновозможный выбор?",options:["Да, всё случайно","Нет — размер влияет на вероятность захвата","Да, если не смотреть","Только при >10 шарах"],correct:1,explanation:"Разный размер шаров = разная вероятность захвата. Это уже не классическая вероятность.",level:"analyze"},{q:"В мешке 10 одинаковых шаров: 3 красных, 7 синих. Шар достают не глядя. P(красный) = ?",options:["0.7","0.3","3","7/3"],correct:1,explanation:"Равновозможные исходы: P = 3/10 = 0.3.",level:"apply"},{q:"Почему исходы эксперимента с шарами равновозможны?",options:["Потому что шаров поровну","Потому что шары одинаковые по форме и размеру, нельзя различить на ощупь","Потому что один вытащили первым","Потому что это теорема"],correct:1,explanation:"Равновозможность — физическое условие: шары неразличимы, поэтому вытащить любой из них одинаково вероятно.",level:"analyze"}],didYouKnow:["Метод Монте-Карло был разработан в 1940-х годах Станиславом Уламом и Джоном фон Нейманом при работе над ядерным оружием. Сейчас он используется в физике, финансах и ИИ."],recap:"← Ты вычислял классическую вероятность. Теперь — что делает исходы равновозможными.",remember:["Равновозможные исходы: у каждого одинаковая вероятность","Физическое равенство обеспечивает случайность (форма, вес, размер)","Случайный выбор честен только при равновозможных исходах"],selfCheck:[{q:"Шары разного размера в мешке — равновозможный выбор?",a:"Нет"},{q:"Что обеспечивает равновозможность в лотерее?",a:"Одинаковые по форме и размеру билеты"},{q:"Что нужно сделать, чтобы опыт с картами был равновозможным?",a:"Тщательно перемешать карты перед вытаскиванием, чтобы каждая карта с равной вероятностью оказалась на любом месте."}],interactives:[{type:"compare-two",title:"Теоретическая vs Экспериментальная вероятность",left:{label:"Теоретическая P(A)",items:["m/n по определению","Знаем заранее","Точная при равновозможности","P(герб) = 1/2"],detail:"Рассчитывается из симметрии задачи. Монета: P(герб) = 1/2 точно."},right:{label:"Экспериментальная P*(A)",items:["k/N (успехи/испытания)","Меряем по опыту","При N→∞ стремится к P(A)","После 1000 бросков ≈ 0.5"],detail:"Чем больше испытаний, тем ближе к теоретической. Закон больших чисел."},keyDifference:"При достаточно большом N экспериментальная частота сходится к теоретической вероятности."}],bridge:"Следующий блок — графы и деревья: инструменты для сложных вероятностных экспериментов.",illustration:"sample_space_coins.svg",illustrationAlt:"Таблица 4 исходов двух монет (ОО,ОР,РО,РР); «хотя бы орёл» — 3 исхода, P=3/4"},9122:{id:"9122",blockId:"block-6",title:"Диаграмма Эйлера. Объединение и пересечение событий",hook:"Геометрическое представление теории вероятностей: площади как вероятности, пересечение кругов — как пересечение событий.",summary:{what:"На вероятностной диаграмме Эйлера площадь пропорциональна вероятности. A∩B — общая площадь. A∪B — объединённая.",facts:"P(A∪B) = P(только A) + P(только B) + P(A∩B).",dontConfuse:"Диаграмма — инструмент визуализации, не доказательство. Используй её для понимания, не вместо формул.",trick:"Заполни 4 области: P(только A) = P(A) − P(A∩B), P(только B) = P(B) − P(A∩B)."},trainers:[{id:"t1",type:"case",title:"Области диаграммы",question:"P(A) = 0.5, P(A∩B) = 0.2. P(только A) = ?",options:["0.7","0.3","0.2","0.5"],correct:1,explanation:"P(только A) = P(A) − P(A∩B) = 0.5 − 0.2 = 0.3."},{id:"t2",type:"bucket_sort",title:"Совместные или несовместные?",instruction:"Классифицируй пары событий",items:[{id:"a",text:"«Орёл» и «Решка» (одна монета)"},{id:"b",text:"«Чётное» и «Кратное 3» (кубик)"},{id:"c",text:"«Дождь» и «Снег» (одновременно)"},{id:"d",text:"«Туз» и «Красная карта» (одна карта)"}],buckets:[{id:"incompat",label:"Несовместные",correct:["a"]},{id:"compat",label:"Совместные",correct:["b","c","d"]}]}],misconceptions:[{error:"«Нарисовал диаграмму — решил задачу»",reality:"Диаграмма помогает увидеть структуру. Вычисления всё равно нужны."},{error:"«Диаграмма Эйлера нужна только для рисунка — в расчётах не помогает»",reality:"Диаграмма показывает, какие области входят в P(A∪B), P(A∩B), P(только A). Расписав площади регионов с числами, сразу видно, какую формулу применить."}],glossary:[{term:"Только A",def:"P(A) − P(A∩B) — вероятность A без B."},{term:"P(только A)",def:"P(A)−P(A∩B): вероятность A без одновременного наступления B."},{term:"P(ни A ни B)",def:"1 − P(A∪B) — вероятность области вне обоих кругов на диаграмме Эйлера."},{term:"Вероятность части события",def:"P(только A) = P(A) − P(A∩B). Вероятность наступления A, но не B."}],finalQuiz:[{q:"P(B) = 0.4, P(A∩B) = 0.15. P(только B) = ?",options:["0.55","0.25","0.15","0.4"],correct:1,explanation:"P(только B) = P(B) − P(A∩B). «Только B» — это B без части, которая пересекается с A.",level:"understand"},{q:"P(A)=0.7, P(B)=0.5, P(A∩B)=0.3. P(A∪B) = ?",options:["0.6","0.9","1.2","0.3"],correct:1,explanation:"P(A∪B) = 0.7+0.5−0.3 = 0.9. Формула включения-исключения для вероятностей.",level:"apply"},{q:"P(B)=0.5, P(A∩B)=0.2. P(только B) = ?",options:["0.7","0.3","0.2","0.5"],correct:1,explanation:"Сравни два случая: P(B)=0.4→P(только B)=0.25; P(B)=0.5→P(только B)=0.3. P(∩) вычитается всегда.",level:"analyze"},{q:"P(A)=0.6, P(B)=0.4, P(A∩B)=0.1. P(только B, не A) = ?",options:["0.1","0.3","0.4","0.5"],correct:1,explanation:"P(только B) = P(B) − P(A∩B) = 0.4 − 0.1 = 0.3.",level:"apply"},{q:"P(A∪B)=0.85, P(A)=0.5, P(B)=0.6. P(A∩B) = ?",options:["0.15","0.25","0.35","0.45"],correct:1,explanation:"P(A∩B) = P(A)+P(B)−P(A∪B) = 0.5+0.6−0.85 = 0.25.",level:"apply"}],didYouKnow:["Джон Венн (1834–1923) популяризировал диаграммы для логики в 1880 году. Хотя похожие схемы встречались у Эйлера ещё в 1748-м — диаграммы Эйлера–Венна."],remember:["P(только A) = P(A) − P(A∩B)","P(только B) = P(B) − P(A∩B)","P(A∪B) = P(A) + P(B) − P(A∩B)"],selfCheck:[{q:"P(A)=0.6, P(A∩B)=0.2. P(только A) = ?",a:"0.4"},{q:"P(A)=0.5, P(B)=0.3, P(A∩B)=0.1. P(A∪B) = ?",a:"0.7"},{q:"P(A)=0.5, P(B)=0.3, P(A∩B)=0.15. Найди P(A∪B) и P(только A).",a:"P(A∪B)=0.5+0.3−0.15=0.65. P(только A)=0.5−0.15=0.35."}],interactives:[{type:"process-graph",title:"Объединение и пересечение событий: двигай ползунки и наблюдай области диаграммы"}],bridge:"Изучим несовместные события и вывед формулу сложения вероятностей.",recap:"Ты вернулся к диаграммам Эйлера, теперь для событий: пересечение и объединение.",illustration:"compatible_events.svg",illustrationAlt:"Сравнение: несовместные (A∩B=∅, формула сложения) и совместные (A∩B≠∅, общая формула)"},9123:{id:"9123",blockId:"block-6",title:"Несовместные события. Формула сложения",hook:"Сложить вероятности можно только несовместных событий. Иначе — вычти пересечение. Формула Пуанкаре не прощает ошибок.",summary:{what:"Несовместные: P(A∪B) = P(A) + P(B). Совместные: P(A∪B) = P(A) + P(B) − P(A∩B).",facts:"Для полной группы попарно несовместных событий: P(A₁) + P(A₂) + … + P(Aₙ) = 1.",dontConfuse:"«Несовместные» не означает «редкие». P(орёл) = 0.5 и P(решка) = 0.5 — несовместные, но не редкие.",trick:"Несовместны? → просто складывай. Совместны? → не забудь вычесть P(A∩B)."},trainers:[{id:"t1",type:"case",title:"Полная группа",question:"Кубик. P(≤2) + P(=3 или 4) + P(≥5) = ?",options:["0.5","1","0.75","3"],correct:1,explanation:"Три несовместных события покрывают всё Ω: 1−2, 3−4, 5−6. Сумма = 1."},{id:"t2",type:"highlight",title:"Формула сложения",text:"Для любых двух событий P(A∪B) = P(A) + P(B) − P(A∩B). Для несовместных событий P(A∩B) = 0, поэтому формула упрощается до P(A∪B) = P(A) + P(B).",targets:["P(A∪B) = P(A) + P(B) − P(A∩B)","P(A∩B) = 0","P(A∪B) = P(A) + P(B)"],instruction:"Выдели общую и упрощённую формулы"}],misconceptions:[{error:"«Всегда можно складывать вероятности»",reality:"Только для несовместных. Для совместных P(A) + P(B) > P(A∪B), если P(A∩B) > 0."},{error:"«Формула сложения P(A)+P(B) работает для любых A и B»",reality:"Только для несовместных! Для совместных событий нужно вычесть P(A∩B). Иначе пересечение посчитается дважды и сумма может превысить 1."}],glossary:[{term:"Полная группа событий",def:"Набор попарно несовместных событий, сумма вероятностей которых = 1."},{term:"Попарно несовместные события",def:"Набор событий, любые два из которых несовместны: Aᵢ∩Aⱼ = ∅ при i≠j."},{term:"Формула сложения",def:"P(A∪B) = P(A)+P(B)−P(A∩B). Для несовместных: P(A∩B)=0, поэтому P(A∪B)=P(A)+P(B)."},{term:"Противоположные события",def:"Два несовместных события A и Ā, образующих полную группу: A∪Ā=Ω, P(A)+P(Ā)=1."}],finalQuiz:[{q:"A и B несовместны, P(A)=0.3, P(B)=0.4. P(A∪B) = ?",options:["0.12","0.7","0.3","1"],correct:1,explanation:"Несовместные: P(A∪B) = P(A)+P(B) = 0.3+0.4 = 0.7. Пересечения нет.",level:"apply"},{q:"A и B совместны, P(A)=0.5, P(B)=0.6, P(A∩B)=0.2. P(A∪B) = ?",options:["1.1","0.7","0.9","0.3"],correct:2,explanation:"Совместные: P(A∪B) = 0.5+0.6−0.2 = 0.9. Вычитаем пересечение.",level:"apply"},{q:"Полная группа A₁,A₂,A₃ (попарно несовместных). P(A₁)+P(A₂)+P(A₃) = ?",options:["0","0.5","1","Зависит"],correct:2,explanation:"Полная группа событий покрывает всё пространство исходов: сумма вероятностей = 1.",level:"understand"},{q:"Кубик: A={1,2}, B={3,4}, C={5,6} — попарно несовместны. P(A∪B∪C) = ?",options:["1/3","2/3","1","1/6"],correct:2,explanation:"P(A∪B∪C) = 2/6+2/6+2/6 = 6/6 = 1. Они образуют полную группу.",level:"apply"},{q:"P(A)=0.35, P(B)=0.4, P(A∩B)=0.1. Совместны ли A и B? P(A∪B) = ?",options:["Несовместны, P=0.75","Совместны, P=0.65","Несовместны, P=0.65","Совместны, P=0.75"],correct:1,explanation:"P(A∩B)=0.1≠0 → совместны. P(A∪B)=0.35+0.4−0.1=0.65.",level:"analyze"}],didYouKnow:["Анри Пуанкаре (1854–1912) обобщил формулу сложения на любое число событий. Его формула включений-исключений используется в комбинаторике и теории чисел."],remember:["Несовместные события: нельзя произойти одновременно","P(A∪B) = P(A)+P(B) — только для несовместных!","Для совместных: P(A∪B) = P(A)+P(B)−P(A∩B)"],selfCheck:[{q:"A и B несовместны, P(A)=0.2, P(B)=0.3. P(A∪B) = ?",a:"0.5"},{q:"Полная группа A₁,A₂,A₃. P(A₁)+P(A₂)+P(A₃) = ?",a:"1"},{q:"Почему при несовместных событиях формула P(A∪B)=P(A)+P(B) точная (без вычитания)?",a:"Несовместные события не пересекаются: P(A∩B)=0, поэтому нечего вычитать."}],interactives:[{type:"compare-two",title:"Несовместные vs Совместные",left:{label:"Несовместные",items:["P(A∩B) = 0","P(A∪B) = P(A)+P(B)","Нет пересечения","Пример: орёл и решка"],detail:"Орёл и решка в одном броске — несовместны. P(орёл∪решка) = 0.5+0.5 = 1."},right:{label:"Совместные",items:["P(A∩B) > 0","P(A∪B) = P(A)+P(B)−P(A∩B)","Есть пересечение","Пример: туз и червонная карта"],detail:"Туз червей — и туз, и червонная карта одновременно. Нужно вычесть пересечение."},keyDifference:"Несовместные: никогда вместе. Совместные: иногда вместе. Ошибка — складывать без вычитания для совместных."}],bridge:"Закрепим правило умножения и условную вероятность в связке с деревьями.",recap:"Ты освоил формулу сложения для несовместных и совместных событий.",illustration:"addition_formula_steps.svg",illustrationAlt:"Три шага вывода P(A∪B): P(A), P(A)+P(B), −P(A∩B) чтобы не считать пересечение дважды"},9124:{id:"9124",blockId:"block-6",title:"Правило умножения. Условная вероятность",hook:"Зависимые события меняют правила игры. Вытащил красный шар — в урне стало меньше красных. Условная вероятность учитывает это.",summary:{what:"P(A∩B) = P(A) × P(B|A). Для зависимых событий нужна условная вероятность. Для независимых P(B|A) = P(B).",facts:"Извлечение без возврата → зависимые события. С возвратом → независимые.",dontConfuse:"Зависимые ≠ коррелированные только. Зависимость: P(B|A) ≠ P(B) в точном математическом смысле.",trick:"Без возврата: на каждом шаге пересчитывай знаменатель."},trainers:[{id:"t1",type:"case",title:"Без возврата",question:"Урна: 3 красных и 7 синих. Извлекают 2 без возврата. P(оба красных) = ?",options:["9/100","3/30","6/90 = 1/15","3/10 × 3/9 = 1/10"],correct:2,explanation:"P = 3/10 × 2/9 = 6/90 = 1/15. После первого красного в урне: 2 красных, 9 шаров всего. Частая ошибка — не уменьшить числитель: 3/10 × 3/9 = 1/10 (неверно, состав изменился)."},{id:"t2",type:"bucket_sort",title:"Независимые или зависимые?",instruction:"Определи тип событий",items:[{id:"a",text:"Два броска кубика подряд"},{id:"b",text:"Извлечение двух карт без возврата"},{id:"c",text:"Бросок монеты и кубика одновременно"},{id:"d",text:"Два шара из урны без возврата"}],buckets:[{id:"indep",label:"Независимые",correct:["a","c"]},{id:"dep",label:"Зависимые",correct:["b","d"]}]}],misconceptions:[{error:"«Без возврата — всегда P = m/n × m/n»",reality:"После первого извлечения состав урны меняется. Второй раз: n−1 шаров, m−1 нужных (если первый был нужный)."},{error:"«С возвратом или без — вероятность одна и та же»",reality:"Нет. С возвратом: вторая карта тянется из полной колоды — P одинакова. Без возврата: в колоде на 1 карту меньше — P меняется."}],glossary:[{term:"Без возврата",def:"Извлечённый объект не возвращается. Следующий выбор — из меньшего числа объектов. Зависимые события."},{term:"С возвратом",def:"Извлечённый объект возвращается. Условия не меняются. Независимые события."},{term:"Зависимые события",def:"P(B|A)≠P(B): наступление A меняет вероятность B. Возникают при извлечении без возврата."},{term:"Правило умножения вероятностей",def:"P(A∩B) = P(A)·P(B|A). Для независимых событий упрощается до P(A∩B) = P(A)·P(B)."}],finalQuiz:[{q:"Карты. Тянут 2 без возврата. P(оба туза) ≈",options:["(4/52)²","(4/52)×(3/51)","4/52 + 3/51","16/2652"],correct:1,explanation:"Без возврата: P(оба туза) = (4/52)×(3/51). После первого туза осталось 3 из 51 карт.",level:"apply"},{q:"Карты: вытаскивают 2 с возвратом. Исходы:",options:["Зависимые","Независимые","Несовместные","Достоверные"],correct:1,explanation:"С возвратом: каждый раз тянем из полной колоды. Исходы независимые.",level:"understand"},{q:"Урна: 5 синих и 3 жёлтых. Тянут 2 без возврата. P(сначала синий, потом жёлтый) = ?",options:["3/10","2/9","3/9","2/10"],correct:1,explanation:"P(1й синий) = 5/8. После этого: P(2й жёлтый) = 3/7. P(A∩B) = 5/8 × 3/7 = 15/56.",level:"apply",answer:"5/8 × 3/7 = 15/56 ≈ 0.268"},{q:"Урна: 5 белых и 5 чёрных шаров. Вытащили 2 без возврата. P(оба белые) = ?",options:["1/4","2/9","5/18","1/3"],correct:1,explanation:"P = (5/10)·(4/9) = 20/90 = 2/9.",level:"apply"},{q:"P(A)=0.5, P(B|A)=0.6, P(B|Ā)=0.3. P(A∩B) = ?",options:["0.15","0.3","0.6","0.18"],correct:1,explanation:"P(A∩B) = P(A)·P(B|A) = 0.5·0.6 = 0.30.",level:"apply"}],didYouKnow:["Задача о разорении (Ruin Problem) изучалась с XVII века — Паскаль и Ферма переписывались о ней в 1654 году. Результат: игрок с конечным капиталом против бесконечного казино разорится с вероятностью 1."],remember:["Без возврата: P меняется после каждого извлечения","С возвратом: P одинакова на каждом шаге","P(A∩B) = P(A)·P(B|A) — для зависимых"],selfCheck:[{q:"Тянут 2 карты без возврата. Исходы зависимые или нет?",a:"Зависимые"},{q:"P(A)=0.5, P(B|A)=0.6. P(A∩B) = ?",a:"0.3"},{q:"Чем отличается выбор с возвратом от выбора без возврата для вычисления вероятностей?",a:"С возвратом: состав урны не меняется, исходы независимы. Без возврата: состав меняется, нужны условные вероятности."}],interactives:[{type:"compare-two",title:"С возвратом vs Без возврата",left:{label:"С возвратом",items:["Карта возвращается в колоду","Исходы независимые","P одинакова для каждого шага","P(A∩B) = P(A)·P(B)"],detail:"Тянем карту, смотрим, кладём обратно. Следующий раз — снова из 52. Независимые исходы."},right:{label:"Без возврата",items:["Карта остаётся у тебя","Исходы зависимые","P меняется на каждом шаге","P(A∩B) = P(A)·P(B|A)"],detail:"Взяли туза — теперь 51 карта. P второго туза = 3/51, а не 4/52. Зависимые исходы."},keyDifference:"С возвратом → независимые → умножение P. Без возврата → зависимые → условная вероятность."}],bridge:"Финальная контрольная работа по всему разделу «Случайные события».",recap:"Ты закрепил правило умножения и условную вероятность через задачи с деревьями.",illustration:"multiplication_rule_full.svg",illustrationAlt:"Урна 4К+6С: дерево зависимых событий, P(К₁∩К₂)=P(К₁)·P(К₂|К₁)=4/10·3/9"},9125:{id:"9125",blockId:"block-6",title:"Контрольная работа: Случайные события. Вероятность. Графы",hook:"Финальная проверка курса. Формулы сложения и умножения, условная вероятность, дерево исходов — всё это сейчас понадобится. Посмотрим, что ты можешь без подсказок.",summary:{what:"Контрольные темы: P(A), P(A∪B), P(A∩B), P(A|B), дерево вероятностей, правило умножения, несовместные события.",facts:"Ключевые формулы: P(A∪B) = P(A)+P(B)−P(A∩B); P(A∩B) = P(A)×P(B|A); P(A|B) = P(A∩B)/P(B).",dontConfuse:"Объединение — сложение (с поправкой). Пересечение — умножение. Не путай.",trick:"Нарисуй дерево или диаграмму Эйлера. Проверяй: суммы = 1."},trainers:[{id:"t1",type:"case",title:"Итоговая задача",question:"P(A) = 0.4, P(B) = 0.3, A и B независимы. P(A∩B) = ?",options:["0.7","0.12","0.1","0.3"],correct:1,explanation:"Независимы → P(A∩B) = 0.4 × 0.3 = 0.12."},{id:"t2",type:"bucket_sort",title:"Какую формулу применить?",instruction:"Сопоставь ситуацию с формулой",items:[{id:"a",text:"P(орёл и орёл) — два броска"},{id:"b",text:"P(шестёрка или пятёрка) — один бросок"},{id:"c",text:"P(не выпадет шестёрка)"},{id:"d",text:"P(туз и туз) — без возврата"}],buckets:[{id:"mult",label:"P(A)·P(B)",correct:["a"]},{id:"add",label:"P(A)+P(B)",correct:["b"]},{id:"comp",label:"1−P(A)",correct:["c"]},{id:"cond",label:"P(A)·P(B|A)",correct:["d"]}]}],misconceptions:[{error:"«Формулы сложения и умножения взаимозаменяемы»",reality:"Сложение — для объединения (A ИЛИ B). Умножение — для пересечения (A И B). Это разные операции над событиями."},{error:"«Если не помню формулу — задачу не решить»",reality:"Многие формулы можно вывести из смысла. P(A∪B) — сложи площади кругов, вычти пересечение. Понимание важнее зубрёжки."}],glossary:[{term:"Вероятностная мера",def:"Функция P, сопоставляющая каждому событию число P(A)∈[0;1]. Свойства: P(Ω)=1, P(∅)=0, аддитивность для несовместных событий."},{term:"Вероятностное пространство",def:"(Ω, P) — пространство исходов с заданными вероятностями. Основа теории вероятностей."},{term:"Дерево вероятностей",def:"Граф-дерево для разбора составного эксперимента. Вероятность пути = произведению ветвей."},{term:"Независимые события",def:"События A и B, для которых P(A|B)=P(A) и P(A∩B)=P(A)·P(B). Наступление одного не влияет на вероятность другого."}],finalQuiz:[{q:"P(A) = 0.5, P(B) = 0.4, P(A∩B) = 0.2. P(A∪B) = ?",options:["0.7","0.9","0.2","1.1"],correct:0,explanation:"Контрольная. Понимание формул важнее их механического применения.",level:"understand"},{q:"P(A|B) = P(A∩B)/P(B). Если P(A∩B)=0.15 и P(B)=0.5, то P(A|B)=",options:["0.075","0.3","0.65","3"],correct:1,explanation:"Нет — вспоминайте формулы и применяйте. Если ошиблись — перечитайте объяснение.",level:"apply"},{q:"P(A)=0.3, P(B)=0.6, A и B несовместны. P(A∪B) = ?",options:["0.18","0.9","0.3","1"],correct:1,explanation:"Сложный случай: комбинируй формулы умножения и сложения. Нарисуй дерево или диаграмму.",level:"analyze"},{q:"P(B|A) = 0.6, P(A) = 0.4. P(A∩B) = ?",options:["0.7","0.9","0.8","0.2"],correct:0,explanation:"Из определения условной вероятности: P(A∩B) = P(B|A) × P(A) = 0.6 × 0.4 = 0.24.",level:"apply",answer:"0.24"},{q:"В ящике 4 красных и 6 синих шара. Вытащили 2 без возврата. P(первый красный, второй синий) = ?",options:["4/15","2/9","1/6","12/45"],correct:0,explanation:"P = (4/10)·(6/9) = 24/90 = 4/15.",level:"apply"}],didYouKnow:["Теория вероятностей получила аксиоматическое основание в 1933 году, когда Андрей Колмогоров опубликовал «Основные понятия теории вероятностей» — 62-страничная монография изменила всю математику."],remember:["P(A∪B) = P(A)+P(B)−P(A∩B) — общая формула сложения","P(A∩B) = P(A)·P(B) — только для независимых","P(A∩B) = P(A)·P(B|A) — для зависимых","P(Ā) = 1−P(A)"],selfCheck:[{q:"P(A)=0.3, P(B)=0.4, несовместны. P(A∪B) = ?",a:"0.7"},{q:"P(A) = 0.7. P(Ā) = ?",a:"0.3"},{q:"Перечисли ключевые формулы: противоположного события, сложения (общая и для несовместных), умножения (независимые и зависимые).",a:"P(Ā)=1−P(A); P(A∪B)=P(A)+P(B)−P(A∩B); несовм: P(A∪B)=P(A)+P(B); P(A∩B)=P(A)·P(B|A); незав: P(A∩B)=P(A)·P(B)."}],interactives:[{type:"tap-and-reveal",title:"Формулы для контрольной",instruction:"Нажми — вспомни формулу",cols:2,cards:[{front:"🎲 Классическая вероятность",back:"P(A) = m/n, где m — благоприятные, n — все равновозможные"},{front:"➕ Формула сложения",back:"P(A∪B) = P(A)+P(B)−P(A∩B)"},{front:"✕ Независимые события",back:"P(A∩B) = P(A)·P(B)"},{front:"✕ Зависимые события",back:"P(A∩B) = P(A)·P(B|A)"},{front:"🔄 Противоположное событие",back:"P(Ā) = 1 − P(A)"},{front:"🌳 Дерево: путь",back:"P(путь) = произведение вероятностей всех ветвей пути"}]}],bridge:"Впереди финальный блок — повторение и обобщение всего курса.",recap:"Ты прошёл итоговую контрольную по случайным событиям и вероятности.",illustration:"prob_final_formulas.svg",illustrationAlt:"Итоговая шпаргалка: P(A)=m/n, P(Ā)=1−P(A), несовместные, совместные, умножение"}},IA=Object.freeze(Object.defineProperty({__proto__:null,default:DA},Symbol.toStringTag,{value:"Module"}));</script>
