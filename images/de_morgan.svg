<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#1e2433" rx="12"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="35" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Законы де Моргана</text><text x="400" y="68" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Огюст де Морган, 1847</text><rect x="60" y="130" width="680" height="110" fill="#252d3e" stroke="#2dd4bf" stroke-width="1.5" rx="8"/><text x="400" y="170" font-size="22" fill="#2dd4bf" text-anchor="middle" font-weight="bold" font-family="monospace">¬(A ∩ B) = ¬A ∪ ¬B</text><text x="400" y="210" font-size="15" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Дополнение пересечения = объединение дополнений</text><rect x="60" y="270" width="680" height="110" fill="#252d3e" stroke="#a78bfa" stroke-width="1.5" rx="8"/><text x="400" y="310" font-size="22" fill="#a78bfa" text-anchor="middle" font-weight="bold" font-family="monospace">¬(A ∪ B) = ¬A ∩ ¬B</text><text x="400" y="350" font-size="15" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Дополнение объединения = пересечение дополнений</text><rect x="60" y="415" width="680" height="30" fill="#252d3e" stroke="#374151" stroke-width="1.5" rx="8"/><text x="400" y="435" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Аналог: НЕ (A И B) = (НЕ A) ИЛИ (НЕ B) — базовая логика</text>
</svg>