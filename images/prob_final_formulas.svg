<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Итоговая шпаргалка: Случайные события</text><text x="400" y="95" fill="#4a9eff" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">P(A) = m/n</text><text x="400" y="140" fill="#34d399" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">P(Ā) = 1 − P(A)</text><text x="400" y="185" fill="#2dd4bf" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Несовместные: P(A∪B) = P(A)+P(B)</text><text x="400" y="230" fill="#a78bfa" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Совместные: P(A∪B) = P(A)+P(B)−P(A∩B)</text><text x="400" y="280" fill="#4a9eff" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Независимые: P(A∩B) = P(A)·P(B)</text><text x="400" y="325" fill="#f87171" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Зависимые: P(A∩B) = P(A)·P(B|A)</text><text x="400" y="370" fill="#fbbf24" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Дерево: P(путь) = P(в₁)·P(в₂)·…</text><text x="400" y="415" fill="#8892a4" font-size="15" text-anchor="middle" font-family="monospace" font-weight="normal">0 ≤ P(A) ≤ 1 всегда</text></svg>