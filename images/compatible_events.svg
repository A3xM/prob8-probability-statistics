<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Совместные vs Несовместные события</text><circle cx="200" cy="240" r="100" fill="#4a9eff" fill-opacity="0.2" stroke="#4a9eff" stroke-width="2"/><circle cx="370" cy="240" r="100" fill="#f87171" fill-opacity="0.2" stroke="#f87171" stroke-width="2"/><text x="200" y="240" fill="#4a9eff" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">A</text><text x="370" y="240" fill="#f87171" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">B</text><text x="285" y="370" fill="#8892a4" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">Несовместные: A∩B = ∅</text><text x="285" y="395" fill="#34d399" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">P(A∪B) = P(A)+P(B)</text><circle cx="530" cy="240" r="100" fill="#a78bfa" fill-opacity="0.2" stroke="#a78bfa" stroke-width="2"/><circle cx="650" cy="240" r="100" fill="#2dd4bf" fill-opacity="0.2" stroke="#2dd4bf" stroke-width="2"/><text x="510" y="240" fill="#a78bfa" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">A</text><text x="670" y="240" fill="#2dd4bf" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">B</text><text x="590" y="370" fill="#8892a4" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">Совместные: A∩B ≠ ∅</text><text x="590" y="395" fill="#fbbf24" font-size="13" text-anchor="middle" font-family="monospace" font-weight="bold">P(A∪B) = P(A)+P(B)−P(A∩B)</text></svg>