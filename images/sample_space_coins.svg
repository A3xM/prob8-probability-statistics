<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Равновозможные исходы: бросок двух монет</text><text x="400" y="65" fill="#2dd4bf" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Пространство Ω — все исходы одинаково вероятны</text><rect x="95" y="130" width="110" height="110" rx="12" fill="rgba(74,158,255,0.1)" stroke="#4a9eff" stroke-width="1.5" opacity="1"/><text x="150" y="185" fill="#4a9eff" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">ОО</text><text x="150" y="225" fill="#2dd4bf" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">P=1/4</text><rect x="255" y="130" width="110" height="110" rx="12" fill="rgba(74,158,255,0.1)" stroke="#4a9eff" stroke-width="1.5" opacity="1"/><text x="310" y="185" fill="#4a9eff" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">ОР</text><text x="310" y="225" fill="#2dd4bf" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">P=1/4</text><rect x="435" y="130" width="110" height="110" rx="12" fill="rgba(74,158,255,0.1)" stroke="#4a9eff" stroke-width="1.5" opacity="1"/><text x="490" y="185" fill="#4a9eff" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">РО</text><text x="490" y="225" fill="#2dd4bf" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">P=1/4</text><rect x="595" y="130" width="110" height="110" rx="12" fill="rgba(74,158,255,0.1)" stroke="#4a9eff" stroke-width="1.5" opacity="1"/><text x="650" y="185" fill="#4a9eff" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">РР</text><text x="650" y="225" fill="#2dd4bf" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">P=1/4</text><text x="400" y="310" fill="#a78bfa" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Событие «хотя бы один орёл»: {ОО, ОР, РО}</text><text x="400" y="340" fill="#34d399" font-size="18" text-anchor="middle" font-family="monospace" font-weight="bold">P = 3/4 = 0.75</text><rect x="130" y="120" width="540" height="130" rx="12" fill="rgba(52,211,153,0.05)" stroke="#34d399" stroke-width="1.5" opacity="1"/></svg>