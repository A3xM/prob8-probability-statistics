200" x2="560" y2="280" stroke="#34d399" stroke-width="3"/><text x="560" y="190" font-size="15" fill="#34d399" text-anchor="middle" font-weight="bold" font-family="monospace">Медиана = 22</text><line x1="670" y1="200" x2="670" y2="280" stroke="#f87171" stroke-width="3"/><text x="670" y="190" font-size="15" fill="#f87171" text-anchor="middle" font-weight="bold" font-family="monospace">Среднее = 57</text><rect x="120" y="310" width="560" height="100" fill="#252d3e" stroke="#374151" stroke-width="1.5" rx="8"/><text x="400" y="342" font-size="16" fill="#e2e8f0" text-anchor="middle" font-weight="normal" font-family="monospace">200 — выброс. Он «тянет» среднее вверх,</text><text x="400" y="368" font-size="16" fill="#e2e8f0" text-anchor="middle" font-weight="normal" font-family="monospace">но не влияет на медиану. При выбросах</text><text x="400" y="394" font-size="16" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">медиана честнее описывает «типичное».</text>
