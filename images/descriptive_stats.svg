<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Описательная статистика: где данные, там мера центра</text><text x="400" y="65" fill="#2dd4bf" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Среднее / Медиана / Мода → три взгляда на одни данные</text><rect x="100" y="120" width="60" height="260" rx="4" fill="#4a9eff" opacity="0.7"/><text x="130" y="395" fill="#8892a4" font-size="11" text-anchor="middle" font-family="monospace" font-weight="normal">Класс А</text><text x="130" y="110" fill="#4a9eff" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">26</text><rect x="180" y="190" width="60" height="190" rx="4" fill="#4a9eff" opacity="0.7"/><text x="210" y="395" fill="#8892a4" font-size="11" text-anchor="middle" font-family="monospace" font-weight="normal">Класс Б</text><text x="210" y="180" fill="#4a9eff" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">19</text><rect x="260" y="60" width="60" height="320" rx="4" fill="#4a9eff" opacity="0.7"/><text x="290" y="395" fill="#8892a4" font-size="11" text-anchor="middle" font-family="monospace" font-weight="normal">Класс В</text><text x="290" y="50" fill="#4a9eff" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">32</text><rect x="340" y="240" width="60" height="140" rx="4" fill="#4a9eff" opacity="0.7"/><text x="370" y="395" fill="#8892a4" font-size="11" text-anchor="middle" font-family="monospace" font-weight="normal">Класс Г</text><text x="370" y="230" fill="#4a9eff" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">14</text><rect x="420" y="90" width="60" height="290" rx="4" fill="#4a9eff" opacity="0.7"/><text x="450" y="395" fill="#8892a4" font-size="11" text-anchor="middle" font-family="monospace" font-weight="normal">Класс Д</text><text x="450" y="80" fill="#4a9eff" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">29</text><line x1="70" y1="380" x2="500" y2="380" stroke="#8892a4" stroke-width="1"/><text x="560" y="200" fill="#4a9eff" font-size="16" text-anchor="start" font-family="monospace" font-weight="bold">x̄ = среднее</text><text x="560" y="235" fill="#2dd4bf" font-size="16" text-anchor="start" font-family="monospace" font-weight="bold">Me = медиана</text><text x="560" y="270" fill="#a78bfa" font-size="16" text-anchor="start" font-family="monospace" font-weight="bold">Mo = мода</text></svg>