  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="30" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Совместные и несовместные события</text><text x="200" y="80" font-size="16" fill="#34d399" text-anchor="middle" font-weight="bold" font-family="monospace">Совместные</text><circle cx="165" cy="220" r="90" fill="#4a9eff33" stroke="#4a9eff" stroke-width="2"/><circle cx="235" cy="220" r="90" fill="#a78bfa33" stroke="#a78bfa" stroke-width="2"/><text x="130" y="225" font-size="22" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">A</text><text x="270" y="225" font-size="22" fill="#a78bfa" text-anchor="middle" font-weight="bold" font-family="monospace">B</text><text x="200" y="225" font-size="18" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">∩≠∅</text><text x="200" y="330" font-size="14" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">P(A∩B) > 0</text><text x="200" y="352" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Могут произойти вместе</text><line x1="400" y1="65" x2="400" y2="375" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4"/><text x="600" y="80" font-size="16" fill="#f87171" text-anchor="middle" font-weight="bold" font-family="monospace">Несовместные</text><circle cx="535" cy="220" r="80" fill="#4a9eff33" stroke="#4a9eff" stroke-width="2"/><circle cx="665" cy="220" r="80" fill="#f8717133" stroke="#f87171" stroke-width="2"/><text x="535" y="225" font-size="22" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">A</text><text x="665" y="225" font-size="22" fill="#f87171" text-anchor="middle" font-weight="bold" font-family="monospace">B</text><text x="600" y="330" font-size="14" fill="#f87171" text-anchor="middle" font-weight="normal" font-family="monospace">P(A∩B) = 0</text><text x="600" y="352" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Не могут произойти вместе</text><rect x="60" y="390" width="680" height="50" fill="#252d3e" stroke="#374151" stroke-width="1.5" rx="8"/><text x="400" y="415" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">На кубике: A={чётное}, B={нечётное} — несовместны.</text><text x="400" y="437" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">A={чётное}, B={>4} — совместны (6 входит в оба).</text>
