<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#1e2433" rx="12"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="35" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Пространство исходов Ω</text><rect x="90" y="80" width="90" height="90" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="135" y="138" font-size="32" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">1</text><rect x="200" y="80" width="90" height="90" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="245" y="138" font-size="32" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">2</text><rect x="310" y="80" width="90" height="90" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="355" y="138" font-size="32" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">3</text><rect x="420" y="80" width="90" height="90" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="465" y="138" font-size="32" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">4</text><rect x="530" y="80" width="90" height="90" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="575" y="138" font-size="32" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">5</text><rect x="640" y="80" width="90" height="90" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="685" y="138" font-size="32" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">6</text><rect x="65" y="65" width="690" height="120" fill="none" stroke="#94a3b8" stroke-width="1.5" rx="8" stroke-dasharray="6,4"/><text x="730" y="132" font-size="28" fill="#94a3b8" text-anchor="start" font-weight="bold" font-family="monospace">Ω</text><rect x="65" y="205" width="690" height="30" fill="none"/><text x="400" y="218" font-size="15" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Событие A = «выпало чётное» = {2, 4, 6}</text><rect x="200" y="80" width="90" height="90" fill="#34d39933" stroke="#34d399" stroke-width="2" rx="8"/><rect x="420" y="80" width="90" height="90" fill="#34d39933" stroke="#34d399" stroke-width="2" rx="8"/><rect x="640" y="80" width="90" height="90" fill="#34d39933" stroke="#34d399" stroke-width="2" rx="8"/><text x="400" y="265" font-size="18" fill="#34d399" text-anchor="middle" font-weight="bold" font-family="monospace">P(A) = m/n = 3/6 = 0.5</text><text x="400" y="305" font-size="14" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">m = 3 (благоприятных)</text><text x="400" y="330" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">n = 6 (всего равновозможных)</text><text x="400" y="395" font-size="14" fill="#2dd4bf" text-anchor="middle" font-weight="normal" font-family="monospace">Пространство исходов = ВСЕ возможные результаты эксперимента</text>
