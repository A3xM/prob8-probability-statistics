  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="30" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Формула сложения вероятностей</text><rect x="100" y="70" width="600" height="70" fill="#252d3e" stroke="#2dd4bf" stroke-width="1.5" rx="8"/><text x="400" y="98" font-size="22" fill="#2dd4bf" text-anchor="middle" font-weight="bold" font-family="monospace">P(A∪B) = P(A) + P(B) − P(A∩B)</text><text x="400" y="126" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">← общая формула; вычитаем пересечение, чтобы не считать дважды</text><rect x="100" y="170" width="600" height="60" fill="#252d3e" stroke="#34d399" stroke-width="1.5" rx="8"/><text x="400" y="196" font-size="16" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">Если A и B несовместны: P(A∩B) = 0</text><text x="400" y="218" font-size="18" fill="#34d399" text-anchor="middle" font-weight="bold" font-family="monospace">P(A∪B) = P(A) + P(B)</text><circle cx="210" cy="320" r="70" fill="#4a9eff44" stroke="#4a9eff" stroke-width="2"/><circle cx="270" cy="320" r="70" fill="#a78bfa44" stroke="#a78bfa" stroke-width="2"/><text x="210" y="325" font-size="18" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">A</text><text x="270" y="325" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="bold" font-family="monospace">B</text><text x="240" y="415" font-size="14" fill="#f87171" text-anchor="middle" font-weight="normal" font-family="monospace">−P(A∩B)!</text><circle cx="510" cy="320" r="70" fill="#4a9eff44" stroke="#4a9eff" stroke-width="2"/><circle cx="640" cy="320" r="70" fill="#f8717144" stroke="#f87171" stroke-width="2"/><text x="510" y="325" font-size="18" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">A</text><text x="640" y="325" font-size="18" fill="#f87171" text-anchor="middle" font-weight="bold" font-family="monospace">B</text><text x="580" y="415" font-size="14" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">Просто +</text>
