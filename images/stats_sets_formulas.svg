<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Основные формулы: Статистика + Множества</text><text x="400" y="90" fill="#4a9eff" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">x̄ = Σxᵢ/n</text><text x="400" y="130" fill="#2dd4bf" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">Me = середина упорядоченного ряда</text><text x="400" y="170" fill="#34d399" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">D = Σ(xᵢ−x̄)²/n</text><text x="400" y="210" fill="#34d399" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">σ = √D</text><text x="400" y="260" fill="#a78bfa" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">|A∪B| = |A|+|B|−|A∩B|</text><text x="400" y="300" fill="#a78bfa" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">A∩B = {x: x∈A и x∈B}</text><text x="400" y="340" fill="#f87171" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">Ā = U\A (дополнение)</text><text x="400" y="380" fill="#fbbf24" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">A⊂B ⟺ каждый элемент A есть в B</text></svg>