<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Формулы для решения задач</text><rect x="80" y="100" width="640" height="55" rx="8" fill="rgba(0,0,0,0.2)" stroke="#4a9eff" stroke-width="1.5" opacity="1"/><text x="200" y="133" fill="#4a9eff" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">Классическая</text><text x="480" y="133" fill="#4a9eff" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">P(A) = m/n</text><rect x="80" y="170" width="640" height="55" rx="8" fill="rgba(0,0,0,0.2)" stroke="#2dd4bf" stroke-width="1.5" opacity="1"/><text x="200" y="203" fill="#2dd4bf" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">Сложение</text><text x="480" y="203" fill="#2dd4bf" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">P(A∪B) = P(A)+P(B)−P(A∩B)</text><rect x="80" y="240" width="640" height="55" rx="8" fill="rgba(0,0,0,0.2)" stroke="#a78bfa" stroke-width="1.5" opacity="1"/><text x="200" y="273" fill="#a78bfa" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">Независимые</text><text x="480" y="273" fill="#a78bfa" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">P(A∩B) = P(A)·P(B)</text><rect x="80" y="310" width="640" height="55" rx="8" fill="rgba(0,0,0,0.2)" stroke="#34d399" stroke-width="1.5" opacity="1"/><text x="200" y="343" fill="#34d399" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">Дополнение</text><text x="480" y="343" fill="#34d399" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">P(Ā) = 1−P(A)</text><rect x="80" y="380" width="640" height="55" rx="8" fill="rgba(0,0,0,0.2)" stroke="#f87171" stroke-width="1.5" opacity="1"/><text x="200" y="413" fill="#f87171" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">Зависимые</text><text x="480" y="413" fill="#f87171" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">P(A∩B) = P(A)·P(B|A)</text></svg>