  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="30" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Диаграмма Эйлера для событий</text><circle cx="315" cy="240" r="140" fill="#4a9eff22" stroke="#4a9eff" stroke-width="2.5"/><circle cx="425" cy="240" r="140" fill="#a78bfa22" stroke="#a78bfa" stroke-width="2.5"/><text x="265" y="230" font-size="13" fill="#4a9eff" text-anchor="middle" font-weight="normal" font-family="monospace">Только A</text><text x="265" y="252" font-size="18" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">0.3</text><text x="370" y="230" font-size="13" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">A∩B</text><text x="370" y="255" font-size="18" fill="#34d399" text-anchor="middle" font-weight="bold" font-family="monospace">0.2</text><text x="475" y="230" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="normal" font-family="monospace">Только B</text><text x="475" y="252" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="bold" font-family="monospace">0.1</text><rect x="520" y="80" width="240" height="120" fill="#252d3e" stroke="#374151" stroke-width="1.5" rx="8"/><text x="640" y="106" font-size="13" fill="#4a9eff" text-anchor="middle" font-weight="normal" font-family="monospace">P(A) = 0.3 + 0.2 = 0.5</text><text x="640" y="130" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="normal" font-family="monospace">P(B) = 0.1 + 0.2 = 0.3</text><text x="640" y="154" font-size="13" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">P(A∩B) = 0.2</text><text x="640" y="178" font-size="13" fill="#fbbf24" text-anc