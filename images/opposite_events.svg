<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#1e2433" rx="12"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="30" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Противоположные события</text><rect x="80" y="80" width="640" height="220" fill="#252d3e" stroke="#94a3b8" stroke-width="1.5" rx="8"/><rect x="80" y="80" width="416" height="220" fill="#4a9eff33" rx="8"/><rect x="496" y="80" width="224" height="220" fill="#f8717133" rx="8"/><text x="288" y="190" font-size="40" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">A</text><text x="506" y="90" font-size="14" fill="#4a9eff" text-anchor="middle" font-weight="normal" font-family="monospace">P(A)</text><text x="608" y="190" font-size="40" fill="#f87171" text-anchor="middle" font-weight="bold" font-family="monospace">Ā</text><text x="670" y="90" font-size="14" fill="#f87171" text-anchor="middle" font-weight="normal" font-family="monospace">P(Ā)</text><rect x="180" y="330" width="440" height="70" fill="#252d3e" stroke="#374151" stroke-width="1.5" rx="8"/><text x="400" y="358" font-size="24" fill="#fbbf24" text-anchor="middle" font-weight="bold" font-family="monospace">P(A) + P(Ā) = 1</text><text x="400" y="388" font-size="18" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">P(Ā) = 1 − P(A)</text><text x="400" y="432" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Пример: P(дождь) = 0.3  →  P(без дождя) = 0.7</text>
</svg>