<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#1e2433" rx="12"/>
  <text x="400" y="40" font-size="19" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">P(A) = m/n — равновозможные исходы</text>
  <!-- Ω рамка -->
  <rect x="60" y="65" width="680" height="280" fill="#252d3e" stroke="#3d4a5e" stroke-width="1.5" rx="10" stroke-dasharray="8,4"/>
  <text x="88" y="90" font-size="13" fill="#8892a4" font-family="monospace">Ω = все 6 исходов кубика</text>
  <!-- 6 граней кубика, 2 выделены как благоприятные (A = {1, 2}) -->
  <!-- Кубик 1 - благоприятный -->
  <rect x="90" y="110" width="100" height="100" fill="#1a3a5f" stroke="#4a9eff" stroke-width="2.5" rx="8"/>
  <circle cx="140" cy="160" r="12" fill="#4a9eff"/>
  <text x="140" y="228" font-size="13" fill="#4a9eff" text-anchor="middle" font-family="monospace">1 ● A</text>
  <!-- Кубик 2 - благоприятный -->
  <rect x="220" y="110" width="100" height="100" fill="#1a3a5f" stroke="#4a9eff" stroke-width="2.5" rx="8"/>
  <circle cx="248" cy="145" r="10" fill="#4a9eff"/>
  <circle cx="292" cy="175" r="10" fill="#4a9eff"/>
  <text x="270" y="228" font-size="13" fill="#4a9eff" text-anchor="middle" font-family="monospace">2 ● A</text>
  <!-- Кубик 3 - не благоприятный -->
  <rect x="350" y="110" width="100" height="100" fill="#1e2a3e" stroke="#3d4a5e" stroke-width="1.5" rx="8"/>
  <circle cx="378" cy="138" r="9" fill="#6b7a94"/>
  <circle cx="400" cy="160" r="9" fill="#6b7a94"/>
  <circle cx="422" cy="182" r="9" fill="#6b7a94"/>
  <text x="400" y="228" font-size="13" fill="#6b7a94" text-anchor="middle" font-family="monospace">3</text>
  <!-- Кубик 4 - не благоприятный -->
  <rect x="480" y="110" width="100" height="100" fill="#1e2a3e" stroke="#3d4a5e" stroke-width="1.5" rx="8"/>
  <circle cx="505" cy="137" r="8" fill="#6b7a94"/>
  <circle cx="555" cy="137" r="8" fill="#6b7a94"/>
  <circle cx="505" cy="185" r="8" fill="#6b7a94"/>
  <circle cx="555" cy="185" r="8" fill="#6b7a94"/>
  <text x="530" y="228" font-size="13" fill="#6b7a94" text-anchor="middle" font-family="monospace">4</text>
  <!-- Кубик 5 -->
  <rect x="610" y="110" width="100" height="100" fill="#1e2a3e" stroke="#3d4a5e" stroke-width="1.5" rx="8"/>
  <circle cx="635" cy="135" r="8" fill="#6b7a94"/>
  <circle cx="660" cy="160" r="8" fill="#6b7a94"/>
  <circle cx="685" cy="185" r="8" fill="#6b7a94"/>
  <circle cx="635" cy="185" r="8" fill="#6b7a94"/>
  <circle cx="685" cy="135" r="8" fill="#6b7a94"/>
  <text x="660" y="228" font-size="13" fill="#6b7a94" text-anchor="middle" font-family="monospace">5</text>
  <!-- Легенда -->
  <rect x="60" y="370" width="16" height="16" fill="#4a9eff" rx="3"/>
  <text x="84" y="383" font-size="14" fill="#4a9eff" font-family="monospace">Благоприятные исходы (m = 2): {1, 2}</text>
  <rect x="60" y="395" width="16" height="16" fill="#6b7a94" rx="3"/>
  <text x="84" y="408" font-size="14" fill="#8892a4" font-family="monospace">Неблагоприятные исходы (n−m = 4)</text>
  <!-- Формула -->
  <rect x="560" y="355" width="210" height="82" fill="#252d3e" stroke="#2dd4bf" stroke-width="1.5" rx="8"/>
  <text x="665" y="380" font-size="16" fill="#2dd4bf" text-anchor="middle" font-weight="bold" font-family="monospace">P(A) = m/n</text>
  <text x="665" y="402" font-size="15" fill="#2dd4bf" text-anchor="middle" font-family="monospace">= 2/6 = 1/3 ≈ 0.33</text>
  <text x="665" y="424" font-size="12" fill="#8892a4" text-anchor="middle" font-family="monospace">A = выпало ≤ 2</text>
</svg>