<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#1e2433" rx="12"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="35" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Классическая вероятность</text><rect x="160" y="70" width="480" height="110" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="400" y="120" font-size="36" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">P(A) = m / n</text><line x1="280" y1="130" x2="520" y2="130" stroke="#4a9eff" stroke-width="2"/><text x="330" y="155" font-size="15" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">m — благоприятных исходов</text><text x="460" y="155" font-size="15" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">n — всего исходов</text><rect x="60" y="210" width="320" height="200" fill="#252d3e" stroke="#2dd4bf" stroke-width="1.5" rx="8"/><text x="220" y="240" font-size="15" fill="#2dd4bf" text-anchor="middle" font-weight="bold" font-family="monospace">Пример: урна</text><circle cx="90" cy="280" r="16" fill="#4a9eff44" stroke="#4a9eff" stroke-width="2"/><circle cx="135" cy="280" r="16" fill="#4a9eff44" stroke="#4a9eff" stroke-width="2"/><circle cx="180" cy="280" r="16" fill="#4a9eff44" stroke="#4a9eff" stroke-width="2"/><circle cx="225" cy="280" r="16" fill="#4a9eff44" stroke="#4a9eff" stroke-width="2"/><circle cx="270" cy="280" r="16" fill="#4a9eff44" stroke="#4a9eff" stroke-width="2"/><circle cx="100" cy="325" r="16" fill="#f8717144" stroke="#f87171" stroke-width="2"/><circle cx="145" cy="325" r="16" fill="#f8717144" stroke="#f87171" stroke-width="2"/><circle cx="190" cy="325" r="16" fill="#f8717144" stroke="#f87171" stroke-width="2"/><circle cx="110" cy="370" r="16" fill="#34d39944" stroke="#34d399" stroke-width="2"/><circle cx="155" cy="370" r="16" fill="#34d39944" stroke="#34d399" stroke-width="2"/><text x="220" y="395" font-size="15" fill="#4a9eff" text-anchor="middle" font-weight="normal" font-family="monospace">P(синий) = 5/10 = 0.5</text><rect x="420" y="210" width="320" height="200" fill="#252d3e" stroke="#a78bfa" stroke-width="1.5" rx="8"/><text x="580" y="250" font-size="15" fill="#a78bfa" text-anchor="middle" font-weight="bold" font-family="monospace">Свойства P(A):</text><text x="580" y="285" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">0 ≤ P(A) ≤ 1</text><text x="580" y="320" font-size="13" fill="#f87171" text-anchor="middle" font-weight="normal" font-family="monospace">P(∅) = 0 (невозможное)</text><text x="580" y="345" font-size="13" fill="#34d399" text-anchor="middle" font-weight="normal" font-family="monospace">P(Ω) = 1 (достоверное)</text><text x="580" y="370" font-size="13" fill="#4a9eff" text-anchor="middle" font-weight="normal" font-family="monospace">0 < P < 1 (случайное)</text>
</svg>