<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Повторение: Вероятность и комбинаторика</text><text x="230" y="110" fill="#4a9eff" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">Перестановки</text><text x="580" y="110" fill="#4a9eff" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">P(n) = n!</text><line x1="80" y1="125" x2="720" y2="125" stroke="#3d4a5e" stroke-width="0.5"/><text x="230" y="175" fill="#2dd4bf" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">Размещения</text><text x="580" y="175" fill="#2dd4bf" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">A(n,k) = n!/(n−k)!</text><line x1="80" y1="190" x2="720" y2="190" stroke="#3d4a5e" stroke-width="0.5"/><text x="230" y="240" fill="#a78bfa" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">Сочетания</text><text x="580" y="240" fill="#a78bfa" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">C(n,k) = n!/(k!(n−k)!)</text><line x1="80" y1="255" x2="720" y2="255" stroke="#3d4a5e" stroke-width="0.5"/><text x="230" y="305" fill="#34d399" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">Классич. вероятность</text><text x="580" y="305" fill="#34d399" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">P = m/n</text><line x1="80" y1="320" x2="720" y2="320" stroke="#3d4a5e" stroke-width="0.5"/><text x="230" y="370" fill="#f87171" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">Правило умножения</text><text x="580" y="370" fill="#f87171" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">n₁ × n₂ × … × nₖ</text><line x1="80" y1="385" x2="720" y2="385" stroke="#3d4a5e" stroke-width="0.5"/><text x="230" y="430" fill="#fbbf24" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">Бином Ньютона</text><text x="580" y="430" fill="#fbbf24" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">P(k) = C(n,k)·pᵏ·(1−p)ⁿ⁻ᵏ</text><line x1="80" y1="445" x2="720" y2="445" stroke="#3d4a5e" stroke-width="0.5"/></svg>