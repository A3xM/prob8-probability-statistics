<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Правило умножения вероятностей</text><text x="400" y="70" fill="#f87171" font-size="18" text-anchor="middle" font-family="monospace" font-weight="bold">Зависимые события</text><text x="400" y="110" fill="#2dd4bf" font-size="22" text-anchor="middle" font-family="monospace" font-weight="bold">P(A∩B) = P(A) · P(B|A)</text><line x1="100" y1="140" x2="700" y2="140" stroke="#3d4a5e" stroke-width="1"/><text x="400" y="170" fill="#8892a4" font-size="13" text-anchor="middle" font-family="monospace" font-weight="normal">Пример: урна 4К + 6С, извлекаем 2 без возврата</text><text x="400" y="215" fill="#4a9eff" font-size="17" text-anchor="middle" font-family="monospace" font-weight="bold">P(К₁) = 4/10</text><text x="400" y="250" fill="#a78bfa" font-size="17" text-anchor="middle" font-family="monospace" font-weight="bold">P(К₂|К₁) = 3/9</text><text x="400" y="295" fill="#34d399" font-size="17" text-anchor="middle" font-family="monospace" font-weight="bold">P(К₁ и К₂) = 4/10 · 3/9 = 12/90 = 2/15</text><line x1="100" y1="320" x2="700" y2="320" stroke="#3d4a5e" stroke-width="1"/><text x="400" y="360" fill="#4a9eff" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">Независимые события</text><text x="400" y="395" fill="#2dd4bf" font-size="18" text-anchor="middle" font-family="monospace" font-weight="bold">P(A∩B) = P(A) · P(B)</text></svg>