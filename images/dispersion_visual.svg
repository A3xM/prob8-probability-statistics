<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#1e2433" rx="12"/>
  <text x="400" y="40" font-size="19" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Дисперсия: квадраты отклонений от среднего</text>
  <!-- Набор: 2, 4, 6, 8 → x̄=5, отклонения: −3,−1,+1,+3 D=(9+1+1+9)/4=5 -->
  <!-- Числовая прямая -->
  <line x1="80" y1="230" x2="720" y2="230" stroke="#94a3b8" stroke-width="2"/>
  <text x="80" y="255" font-size="13" fill="#94a3b8" text-anchor="middle" font-family="monospace">0</text>
  <!-- Точки данных -->
  <!-- x̄=5 -->
  <line x1="440" y1="200" x2="440" y2="260" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="440" y="280" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="bold" font-family="monospace">x̄=5</text>
  <!-- x=2: позиция = 80 + 2/10*640 = 208 -->
  <circle cx="208" cy="230" r="10" fill="#4a9eff"/>
  <text x="208" y="260" font-size="13" fill="#4a9eff" text-anchor="middle" font-family="monospace">2</text>
  <!-- Стрелка отклонения x=2 → x̄: → 208 to 440, отклонение = −3 -->
  <line x1="208" y1="160" x2="440" y2="160" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="324" y="150" font-size="13" fill="#a78bfa" text-anchor="middle" font-family="monospace">xᵢ−x̄ = −3</text>
  <!-- Квадрат отклонения для x=2 (9 ед²) — маленький квадрат слева -->
  <rect x="100" y="310" width="54" height="54" fill="#a78bfa" opacity="0.3" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="127" y="338" font-size="12" fill="#a78bfa" text-anchor="middle" font-family="monospace">(−3)²</text>
  <text x="127" y="354" font-size="12" fill="#a78bfa" text-anchor="middle" font-family="monospace">= 9</text>
  <!-- x=4: 80+4/10*640=336 -->
  <circle cx="336" cy="230" r="10" fill="#4a9eff"/>
  <text x="336" y="260" font-size="13" fill="#4a9eff" text-anchor="middle" font-family="monospace">4</text>
  <text x="388" y="182" font-size="13" fill="#a78bfa" text-anchor="middle" font-family="monospace">−1</text>
  <rect x="200" y="310" width="18" height="18" fill="#a78bfa" opacity="0.3" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="209" y="325" font-size="10" fill="#a78bfa" text-anchor="middle" font-family="monospace">1</text>
  <!-- x=6: 80+6/10*640=464 -->
  <circle cx="464" cy="230" r="10" fill="#4a9eff"/>  <!-- но 464>440? нет, 80+6*64=464 -->
  <circle cx="464" cy="230" r="10" fill="#4a9eff"/>
  <text x="464" y="260" font-size="13" fill="#4a9eff" text-anchor="middle" font-family="monospace">6</text>
  <text x="492" y="182" font-size="13" fill="#a78bfa" text-anchor="middle" font-family="monospace">+1</text>
  <rect x="480" y="310" width="18" height="18" fill="#a78bfa" opacity="0.3" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="489" y="325" font-size="10" fill="#a78bfa" text-anchor="middle" font-family="monospace">1</text>
  <!-- x=8: 80+8/10*640=592 -->
  <circle cx="592" cy="230" r="10" fill="#4a9eff"/>
  <text x="592" y="260" font-size="13" fill="#4a9eff" text-anchor="middle" font-family="monospace">8</text>
  <text x="516" y="150" font-size="13" fill="#a78bfa" text-anchor="middle" font-family="monospace">xᵢ−x̄ = +3</text>
  <rect x="594" y="310" width="54" height="54" fill="#a78bfa" opacity="0.3" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="621" y="338" font-size="12" fill="#a78bfa" text-anchor="middle" font-family="monospace">(+3)²</text>
  <text x="621" y="354" font-size="12" fill="#a78bfa" text-anchor="middle" font-family="monospace">= 9</text>
  <!-- Формула -->
  <rect x="240" y="390" width="320" height="55" fill="#252d3e" stroke="#2dd4bf" stroke-width="1.5" rx="8"/>
  <text x="400" y="415" font-size="16" fill="#2dd4bf" text-anchor="middle" font-weight="bold" font-family="monospace">D = (9+1+1+9)/4 = 5</text>
  <text x="400" y="437" font-size="13" fill="#8892a4" text-anchor="middle" font-family="monospace">σ = √D = √5 ≈ 2.24</text>
</svg>