<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="30" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Формула включений-исключений</text><text x="400" y="60" fill="#2dd4bf" font-size="18" text-anchor="middle" font-family="monospace" font-weight="bold">|A∪B| = |A| + |B| − |A∩B|</text><circle cx="310" cy="250" r="140" fill="#4a9eff" fill-opacity="0.15" stroke="#4a9eff" stroke-width="2"/><circle cx="490" cy="250" r="140" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-width="2"/><text x="240" y="250" fill="#4a9eff" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">|A| = 20</text><text x="560" y="250" fill="#a78bfa" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">|B| = 15</text><text x="400" y="250" fill="#2dd4bf" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">|A∩B|</text><text x="400" y="272" fill="#2dd4bf" font-size="14" text-anchor="middle" font-family="monospace" font-weight="bold">= 7</text><text x="400" y="360" fill="#34d399" font-size="17" text-anchor="middle" font-family="monospace" font-weight="bold">|A∪B| = 20 + 15 − 7 = 28</text></svg>