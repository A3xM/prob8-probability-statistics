<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#1e2433" rx="12"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="30" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Три типа событий</text><rect x="20" y="80" width="280" height="310" fill="#252d3e" stroke="#34d399" stroke-width="1.5" rx="8"/><text x="160" y="120" font-size="18" fill="#34d399" text-anchor="middle" font-weight="bold" font-family="monospace">Достоверное</text><text x="160" y="170" font-size="22" fill="#34d399" text-anchor="middle" font-weight="bold" font-family="monospace">P(A) = 1</text><rect x="60" y="195" width="200" height="20" fill="#374151" rx="10"/><rect x="60" y="195" width="260" height="20" fill="#34d399" rx="10" opacity="0.7"/><text x="160" y="260" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Монета даст орёл или решку</text><rect x="260" y="80" width="280" height="310" fill="#252d3e" stroke="#f87171" stroke-width="1.5" rx="8"/><text x="400" y="120" font-size="18" fill="#f87171" text-anchor="middle" font-weight="bold" font-family="monospace">Невозможное</text><text x="400" y="170" font-size="22" fill="#f87171" text-anchor="middle" font-weight="bold" font-family="monospace">P(A) = 0</text><rect x="300" y="195" width="200" height="20" fill="#374151" rx="10"/><text x="400" y="260" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">На кубике выпадет 7</text><rect x="500" y="80" width="280" height="310" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="640" y="120" font-size="18" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">Случайное</text><text x="640" y="170" font-size="22" fill="#4a9eff" text-anchor="middle" font-weight="bold" font-family="monospace">0 < P < 1</text><rect x="540" y="195" width="200" height="20" fill="#374151" rx="10"/><rect x="540" y="195" width="130" height="20" fill="#4a9eff" rx="10" opacity="0.7"/><text x="640" y="260" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">На кубике выпадет 3</text><text x="400" y="430" font-size="15" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Вероятность всегда от 0 до 1 включительно</text>
</svg>