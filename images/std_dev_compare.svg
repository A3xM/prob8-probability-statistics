<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Стандартное отклонение σ: мера разброса</text><text x="400" y="65" fill="#2dd4bf" font-size="15" text-anchor="middle" font-family="monospace" font-weight="bold">Малое σ — данные кучнее. Большое σ — данные разбросаны.</text><rect x="120" y="240" width="28" height="10" rx="3" fill="#34d399" opacity="0.7"/><rect x="150" y="225" width="28" height="25" rx="3" fill="#34d399" opacity="0.7"/><rect x="180" y="195" width="28" height="55" rx="3" fill="#34d399" opacity="0.7"/><rect x="210" y="160" width="28" height="90" rx="3" fill="#34d399" opacity="0.7"/><rect x="240" y="130" width="28" height="120" rx="3" fill="#34d399" opacity="0.7"/><rect x="270" y="160" width="28" height="90" rx="3" fill="#34d399" opacity="0.7"/><rect x="300" y="195" width="28" height="55" rx="3" fill="#34d399" opacity="0.7"/><rect x="330" y="225" width="28" height="25" rx="3" fill="#34d399" opacity="0.7"/><rect x="360" y="240" width="28" height="10" rx="3" fill="#34d399" opacity="0.7"/><text x="250" y="320" fill="#34d399" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">σ = 8 (кучно)</text><rect x="430" y="235" width="28" height="15" rx="3" fill="#f87171" opacity="0.7"/><rect x="460" y="225" width="28" height="25" rx="3" fill="#f87171" opacity="0.7"/><rect x="490" y="210" width="28" height="40" rx="3" fill="#f87171" opacity="0.7"/><rect x="520" y="195" width="28" height="55" rx="3" fill="#f87171" opacity="0.7"/><rect x="550" y="185" width="28" height="65" rx="3" fill="#f87171" opacity="0.7"/><rect x="580" y="195" width="28" height="55" rx="3" fill="#f87171" opacity="0.7"/><rect x="610" y="210" width="28" height="40" rx="3" fill="#f87171" opacity="0.7"/><rect x="640" y="225" width="28" height="25" rx="3" fill="#f87171" opacity="0.7"/><rect x="670" y="235" width="28" height="15" rx="3" fill="#f87171" opacity="0.7"/><text x="555" y="320" fill="#f87171" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">σ = 28 (разброс)</text><line x1="70" y1="250" x2="730" y2="250" stroke="#8892a4" stroke-width="1" stroke-dasharray="4"/><text x="400" y="390" fill="#fbbf24" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">σ = √D = √(Σ(xᵢ−x̄)²/n)</text></svg>