<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#1e2433" rx="12"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker><marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/></marker></defs><text x="400" y="40" font-size="20" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="monospace">Формула дисперсии: шаг за шагом</text><rect x="60" y="110" width="680" height="48" fill="#252d3e" stroke="#94a3b8" stroke-width="1.5" rx="8"/><text x="400" y="140" font-size="17" fill="#94a3b8" text-anchor="middle" font-weight="normal" font-family="monospace">Данные: [2, 4, 6]</text><rect x="60" y="172" width="680" height="48" fill="#252d3e" stroke="#2dd4bf" stroke-width="1.5" rx="8"/><text x="400" y="202" font-size="17" fill="#2dd4bf" text-anchor="middle" font-weight="normal" font-family="monospace">Среднее: x̄ = 4</text><rect x="60" y="234" width="680" height="48" fill="#252d3e" stroke="#4a9eff" stroke-width="1.5" rx="8"/><text x="400" y="264" font-size="17" fill="#4a9eff" text-anchor="middle" font-weight="normal" font-family="monospace">Отклонения: [-2.0, 0.0, 2.0]</text><rect x="60" y="296" width="680" height="48" fill="#252d3e" stroke="#a78bfa" stroke-width="1.5" rx="8"/><text x="400" y="326" font-size="17" fill="#a78bfa" text-anchor="middle" font-weight="normal" font-family="monospace">Квадраты: [4.0, 0.0, 4.0]</text><rect x="60" y="358" width="680" height="48" fill="#252d3e" stroke="#fbbf24" stroke-width="1.5" rx="8"/><text x="400" y="388" font-size="17" fill="#fbbf24" text-anchor="middle" font-weight="normal" font-family="monospace">D = (4 + 0 + 4) / 3 = 2.67</text><rect x="220" y="420" width="360" height="22" fill="#252d3e" stroke="#a78bfa" stroke-width="1.5" rx="8"/><text x="400" y="436" font-size="17" fill="#a78bfa" text-anchor="middle" font-weight="bold" font-family="monospace">D = Σ(xᵢ − x̄)²  /  n</text>
</svg>