<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"><rect width="800" height="460" fill="#1e2433"/><text x="400" y="35" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Формула сложения вероятностей — вывод</text><text x="400" y="90" fill="#8892a4" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Начало: P(A∪B) = ?</text><line x1="400" y1="100" x2="400" y2="125" stroke="#3d4a5e" stroke-width="1" stroke-dasharray="3"/><text x="400" y="150" fill="#4a9eff" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Шаг 1: берём P(A) — все исходы A</text><line x1="400" y1="160" x2="400" y2="185" stroke="#3d4a5e" stroke-width="1" stroke-dasharray="3"/><text x="400" y="210" fill="#a78bfa" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Шаг 2: добавляем P(B) — все исходы B</text><line x1="400" y1="220" x2="400" y2="245" stroke="#3d4a5e" stroke-width="1" stroke-dasharray="3"/><text x="400" y="270" fill="#f87171" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Шаг 3: пересечение A∩B посчитано дважды!</text><line x1="400" y1="280" x2="400" y2="305" stroke="#3d4a5e" stroke-width="1" stroke-dasharray="3"/><text x="400" y="330" fill="#2dd4bf" font-size="14" text-anchor="middle" font-family="monospace" font-weight="normal">Шаг 4: вычитаем P(A∩B) один раз</text><line x1="400" y1="340" x2="400" y2="365" stroke="#3d4a5e" stroke-width="1" stroke-dasharray="3"/><text x="400" y="400" fill="#34d399" font-size="16" text-anchor="middle" font-family="monospace" font-weight="bold">Итог: P(A∪B) = P(A) + P(B) − P(A∩B)</text></svg>